name: Announcement Sync

on:
  schedule:
    - cron: '*/15 * * * *' 
  workflow_dispatch: 

jobs:
  sync-to-supabase:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 

      - name: Install Dependencies
        # Manually forcing the installation of the required modules
        run: npm install @supabase/supabase-js discord.js

      - name: Run Discord Sync Bot
        # Updated to target your specific script name
        run: node sync_miko.js 
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
