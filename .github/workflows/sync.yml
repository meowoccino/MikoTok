name: Announcement Sync

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes (adjust as needed)
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  sync-to-supabase:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Upgraded to fix the deprecation warning

      # The 'npm install' step has been completely removed because you do not use a package.json

      - name: Run Discord Sync Bot
        # Updated to perfectly match the file name in your screenshot
        run: node sync_miko.js 
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
