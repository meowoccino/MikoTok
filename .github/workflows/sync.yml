name: Discord Announcement Sync

on:
  schedule:
    # This runs the sync every 5 minutes. Adjust the cron timing as needed.
    - cron: '*/5 * * * *'
  workflow_dispatch: # This allows you to manually click a button to run the sync in GitHub

jobs:
  sync-to-supabase:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js (or Python, depending on your bot)
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Change this if your bot uses Python or a different language

      - name: Install Dependencies
        run: npm install # Or 'pip install -r requirements.txt' if using Python

      - name: Run Discord Sync Bot
        env:
          # This pulls your database URL and the secret key safely from GitHub!
          SUPABASE_URL: "https://yhxcuayiwqpjvalyrcqv.supabase.co"
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }} 
        run: |
          # Replace this line with the command that actually starts your bot
          node sync.js 
