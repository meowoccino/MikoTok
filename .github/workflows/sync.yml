name: Announcement Sync

on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes (adjust as needed)
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  sync-to-supabase:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Upgraded to fix the deprecation warning

      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          else
            echo "No package.json found. Skipping npm install to prevent crashes."
          fi

      - name: Run Discord Sync Bot
        # Ensure 'sync.js' matches the actual name of your bot file in the repository
        run: node sync.js 
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

