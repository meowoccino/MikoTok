name: MikoTok Auto Backend
on:
  repository_dispatch:
    types: [manual_post]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm install @supabase/supabase-js
      - name: Run Manual Sync
        run: node sync_miko.js
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MANUAL_TEXT: ${{ github.event.client_payload.text }}
          MANUAL_SOURCE: ${{ github.event.client_payload.source }}
