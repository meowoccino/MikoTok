<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MikoTok">
    <meta name="theme-color" content="#9146FF">
    <title>MikoTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
        :root { --bg-color: #0b0b0e; --card-bg: #18181b; --primary: #9146FF; --primary-light: #a970ff; --text-main: #ffffff; --text-muted: #adadb8; --border-color: #2f2f35; --danger: #ff4d4d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: var(--text-main); overflow: hidden; display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 480px; height: 100%; position: relative; background: var(--bg-color); overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .simple-logo { display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
        .text-part1 { color: #ffffff; }
        .text-part2 { color: var(--primary); text-shadow: 0 0 12px rgba(145, 70, 255, 0.4); }
        #splash-screen { position: absolute; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; transition: opacity 0.5s ease; }
        #splash-icon { width: 100px; height: 100px; margin-bottom: 15px; }
        .progress-bar { width: 120px; height: 3px; background: #2f2f35; border-radius: 4px; margin-top: 20px; overflow: hidden; position: relative; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: linear-gradient(90deg, transparent 0%, var(--primary) 50%, transparent 100%); animation: load 1.5s infinite ease-in-out; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }
        .app-header { position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: 40px 20px 15px; display: flex; align-items: center; background: linear-gradient(180deg, rgba(145, 70, 255, 0.05) 0%, var(--bg-color) 100%); border-bottom: 1px solid var(--border-color); }
        #feed { height: 100%; width: 100%; overflow-y: auto; padding: 95px 15px 100px; scroll-behavior: smooth; }
        #feed::-webkit-scrollbar { display: none; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); position: relative; animation: slideUp 0.4s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .avatar-ring { width: 42px; height: 42px; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: white; background: linear-gradient(135deg, #2f2f35 0%, #18181b 100%); border: 2px solid var(--primary); box-shadow: 0 0 15px rgba(145, 70, 255, 0.4); }
        .meta-name { font-size: 14px; font-weight: 600; }
        .admin-del { position: absolute; top: 15px; right: 15px; color: var(--danger); cursor: pointer; font-size: 22px; transition: 0.2s; opacity: 0.7; }
        .video-container { width: 100%; border-radius: 12px; overflow: hidden; background: #000; aspect-ratio: 16/9; border: 1px solid var(--border-color); }
        iframe { width: 100%; height: 100%; border: none; }
        .card-actions { display: flex; align-items: center; gap: 15px; margin-top: 12px; }
        .action-btn { display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; cursor: pointer; }
        .action-btn.liked { color: var(--primary-light); }
        .action-btn.liked span { font-variation-settings: 'FILL' 1; }
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(11, 11, 14, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 12px 20px 28px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 60px; color: var(--text-muted); font-size: 10px; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--primary-light); }
        .nav-fab { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #login-modal, #add-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; display: none; flex-direction: column; justify-content: flex-end; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card-bg); border-radius: 24px 24px 0 0; padding: 25px 20px 45px; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-top: 1px solid var(--border-color); }
        .input-box { width: 100%; background: #0e0e10; border: 1px solid var(--border-color); color: white; padding: 14px; border-radius: 10px; outline: none; margin-bottom: 12px; }
        #toast { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 24px; border-radius: 12px; z-index: 9999; display: none; font-weight: 600; }
        .admin-section { margin-top: 20px; text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="splash-screen">
            <div id="splash-icon"></div>
            <div class="simple-logo"><span class="text-part1">Miko</span><span class="text-part2">Tok</span></div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
        <div class="app-header"><div class="simple-logo"><span class="text-part1">Miko</span><span class="text-part2">Tok</span></div></div>
        <div id="toast"></div>
        <div id="feed"><div id="feed-content"></div></div>
        <div id="login-modal"><div class="modal-content" id="login-panel">
            <div id="login-form">
                <input type="text" id="login-nick" class="input-box" placeholder="Username">
                <input type="password" id="login-pass" class="input-box" placeholder="Password">
                <button class="input-box" style="background:var(--primary); font-weight:700;" onclick="handleLogin()">Sign In</button>
            </div>
            <div id="profile-form" style="display:none; text-align:center;">
                <div style="color:var(--primary-light); font-size:10px; font-weight:800;" id="admin-tag">SYSTEM ADMIN</div>
                <h3 id="display-name" style="margin-bottom:20px;"></h3>
                <div id="admin-manager" style="display:none;" class="admin-section">
                    <div style="font-size:11px; font-weight:700; color:var(--text-muted); margin-bottom:10px;">USER MANAGEMENT</div>
                    <div id="user-list-container"></div>
                </div>
                <button class="input-box" style="background:var(--danger); font-weight:700; margin-top:15px;" onclick="logout()">Logout</button>
            </div>
            <button class="input-box" style="background:transparent; border:none; color:var(--text-muted);" onclick="closeModal('login')">Dismiss</button>
        </div></div>
        <div id="add-modal"><div class="modal-content" id="add-panel">
            <input type="text" id="clip-url" class="input-box" placeholder="Twitch Clip URL">
            <button class="input-box" style="background:var(--primary); font-weight:700;" onclick="submitClip()">Upload Clip</button>
            <button class="input-box" style="background:transparent; border:none; color:var(--text-muted);" onclick="closeModal('add')">Cancel</button>
        </div></div>
        <div class="bottom-nav">
            <div class="nav-item active" id="nav-home" onclick="switchTab('home')"><span class="material-symbols-rounded">home</span>Home</div>
            <div class="nav-item" id="nav-community" onclick="switchTab('community')"><span class="material-symbols-rounded">forum</span>Feed</div>
            <div class="nav-fab" onclick="handleUploadClick()" id="upload-btn-container"></div>
            <div class="nav-item" id="nav-clips" onclick="switchTab('clips')"><span class="material-symbols-rounded">favorite</span>Liked</div>
            <div class="nav-item" id="nav-login" onclick="openModal('login')"><span class="material-symbols-rounded">account_circle</span><span id="login-text">Profile</span></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yhxcuayiwqpjvalyrcqv.supabase.co', SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloeGN1YXlpd3FwanZhbHlyY3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Nzk1ODEsImV4cCI6MjA5NDE1NTU4MX0.z7EDgqRz1OT25UdxtmeJxFvwx4UCwaPRwWWJuzd46kc';
        let sbClient = null, currentTab = 'home', currentUser = null, isAdmin = false, globalData = { clips: [], posts: [] };
        let likedIds = JSON.parse(localStorage.getItem('miko_likes') || '[]');
        let currentPlayingFrame = null;

        const getLogoSvg = (id) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" style="width:100%;height:100%"><defs><linearGradient id="grad-${id}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#9146FF"/></linearGradient></defs><circle cx="50" cy="50" r="40" fill="none" stroke="url(#grad-${id})" stroke-width="7"/><path d="M 33 38 L 48 62 L 62 38 L 62 55 Q 62 65 69 64" fill="none" stroke="url(#grad-${id})" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        document.getElementById('upload-btn-container').innerHTML = getLogoSvg('nav');
        document.getElementById('splash-icon').innerHTML = getLogoSvg('splash');

        async function init() {
            if (window.supabase) {
                sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                const saved = localStorage.getItem('miko_user');
                if (saved) { currentUser = saved; isAdmin = (saved === 'tomato_24'); document.getElementById('login-text').innerText = saved; }
                loadData(); setupAutoplay();
            } else { setTimeout(init, 100); }
        }

        async function loadData() {
            const { data: clips } = await sbClient.from('clips').select('*').order('created_at', { ascending: false }).limit(50);
            const { data: posts } = await sbClient.from('posts').select('*').order('created_at', { ascending: false });
            globalData.clips = clips || []; globalData.posts = posts || []; render();
            setTimeout(() => { document.getElementById('splash-screen').style.opacity = '0'; setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500); }, 1200);
        }

        function handleLogin() {
            const n = document.getElementById('login-nick').value.trim(), p = document.getElementById('login-pass').value.trim();
            if (n === 'tomato_24' && p === '9ruwuF') { isAdmin = true; currentUser = n; }
            else if (n && p.length >= 8) { isAdmin = false; currentUser = n; }
            else { showToast("Invalid login"); return; }
            localStorage.setItem('miko_user', currentUser); document.getElementById('login-text').innerText = currentUser; closeModal('login');
        }

        function logout() { localStorage.removeItem('miko_user'); currentUser = null; isAdmin = false; document.getElementById('login-text').innerText = "Profile"; closeModal('login'); render(); }
        function handleUploadClick() { if(!currentUser) openModal('login'); else openModal('add'); }
        async function submitClip() {
            const u = document.getElementById('clip-url').value.trim(); if (!u.includes('twitch.tv')) return;
            const id = u.split('/').pop().split('?')[0];
            await sbClient.from('clips').insert([{ id, title: 'Clip', added_by: currentUser }]);
            closeModal('add'); loadData();
        }

        function toggleLike(id) {
            if (likedIds.includes(id)) likedIds = likedIds.filter(i => i !== id);
            else likedIds.push(id);
            localStorage.setItem('miko_likes', JSON.stringify(likedIds)); render();
        }

        async function deleteItem(table, id) { if(!isAdmin) return; await sbClient.from(table).delete().eq('id', id); loadData(); }

        function setupAutoplay() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const iframe = entry.target;
                    const src = iframe.getAttribute('data-src');
                    if (entry.isIntersecting) {
                        if (currentPlayingFrame && currentPlayingFrame !== iframe) {
                            currentPlayingFrame.src = currentPlayingFrame.getAttribute('data-src') + "&autoplay=false";
                        }
                        iframe.src = src + "&autoplay=true&muted=false";
                        currentPlayingFrame = iframe;
                    }
                });
            }, { threshold: 0.8 });
            window.autoplayObserver = observer;
        }

        function render() {
            const f = document.getElementById('feed-content'); f.innerHTML = '';
            if (currentTab === 'community') {
                if (!currentUser) { f.innerHTML = `<p style="text-align:center; padding:40px; color:var(--text-muted);">Login to view</p>`; return; }
                f.innerHTML = `<div class="card"><textarea id="p-text" class="input-box" style="height:80px;resize:none;" placeholder="Post..."></textarea><button class="input-box" style="background:var(--primary);font-weight:700;" onclick="submitPost()">Post</button></div>`;
                globalData.posts.forEach(p => {
                    f.innerHTML += `<div class="card">${isAdmin ? `<span class="material-symbols-rounded admin-del" onclick="deleteItem('posts', '${p.id}')">delete</span>` : ''}<div class="card-header"><div class="avatar-ring">${p.author[0].toUpperCase()}</div><div class="meta-name">${p.author}</div></div><div class="post-text-content">${p.text}</div></div>`;
                });
            } else {
                const items = currentTab === 'clips' ? globalData.clips.filter(c => likedIds.includes(c.id)) : globalData.clips;
                items.forEach(c => {
                    const isLiked = likedIds.includes(c.id);
                    const avatarChar = (c.added_by === 'CodeMiko' || !c.added_by) ? 'M' : c.added_by[0].toUpperCase();
                    const card = document.createElement('div'); card.className = 'card';
                    card.innerHTML = `${isAdmin ? `<span class="material-symbols-rounded admin-del" onclick="deleteItem('clips', '${c.id}')">delete</span>` : ''}<div class="card-header"><div class="avatar-ring">${avatarChar}</div><div class="meta-name">${c.added_by || 'CodeMiko'}</div></div><div class="video-container"><iframe data-src="https://clips.twitch.tv/embed?clip=${c.id}&parent=${window.location.hostname}" allow="autoplay; fullscreen"></iframe></div><div class="card-actions"><div class="action-btn ${isLiked?'liked':''}" onclick="toggleLike('${c.id}')"><span class="material-symbols-rounded">favorite</span> ${isLiked ? 1 : 0}</div></div>`;
                    f.appendChild(card);
                    autoplayObserver.observe(card.querySelector('iframe'));
                });
            }
        }

        function switchTab(t) { currentTab = t; document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); document.getElementById('nav-' + t).classList.add('active'); render(); }
        function openModal(id) { 
            if(id === 'login' && currentUser) { 
                document.getElementById('login-form').style.display='none'; document.getElementById('profile-form').style.display='block'; 
                document.getElementById('display-name').innerText=currentUser;
                if(isAdmin) { 
                    document.getElementById('admin-tag').style.display='block'; document.getElementById('admin-manager').style.display='block';
                    const users = [...new Set(globalData.posts.map(p => p.author))];
                    const list = document.getElementById('user-list-container'); list.innerHTML = '';
                    users.filter(u => u !== 'tomato_24').forEach(u => {
                        list.innerHTML += `<div class="user-row"><span>${u}</span><span class="material-symbols-rounded" style="color:var(--danger); cursor:pointer;">person_remove</span></div>`;
                    });
                }
            } else { document.getElementById('login-form').style.display='block'; document.getElementById('profile-form').style.display='none'; }
            document.getElementById(id + '-modal').style.display = 'flex'; setTimeout(() => document.getElementById(id + '-panel').style.transform = 'translateY(0)', 10); 
        }
        function closeModal(id) { document.getElementById(id + '-panel').style.transform = 'translateY(100%)'; setTimeout(() => document.getElementById(id + '-modal').style.display = 'none', 300); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
        init();
    </script>
</body>
</html>
