<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <title>MikoTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        :root { --bg-color: #000000; --card-bg: #111113; --primary: #9146FF; --text-main: #ffffff; --text-muted: #71717a; --border-color: #27272a; --danger: #ef4444; --discord: #5865F2; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        
        /* Fixed scrolling logic */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-color); color: var(--text-main); overflow: hidden; }
        
        #app-container { width: 100%; max-width: 480px; height: 100%; margin: 0 auto; position: relative; background: var(--bg-color); }
        [v-cloak] { display: none !important; }

        #splash-screen { position: absolute; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.6s ease; }
        .progress-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; position: relative; margin-top: 20px; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: linear-gradient(90deg, #ffffff, var(--primary)); animation: load 1.5s infinite ease-in-out; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }
        .gradient-text { display: inline-block; background: linear-gradient(135deg, #ffffff 30%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Outfit', sans-serif; }

        .app-header { position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: 50px 20px 15px; display: flex; align-items: center; justify-content: space-between; background: rgba(0, 0, 0, 0.90); backdrop-filter: blur(12px); }
        .header-status-wrapper { position: relative; width: 42px; height: 42px; cursor: pointer; }
        .story-ring { width: 38px; height: 38px; border-radius: 50%; padding: 2px; display: flex; align-items: center; justify-content: center; }
        .story-ring.live { background: linear-gradient(45deg, var(--danger), var(--primary), #ff4685, var(--danger)); animation: storyGlow 3s ease infinite; }
        .story-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .status-badge { position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 7px; font-weight: 900; padding: 1px 5px; border-radius: 4px; border: 1.5px solid #000; text-transform: uppercase; z-index: 2; }

        #feed { height: 100%; width: 100%; overflow-y: scroll; padding: 110px 12px 120px; -webkit-overflow-scrolling: touch; }
        #feed::-webkit-scrollbar { display: none; }

        #live-container { background: linear-gradient(160deg, #160b24 0%, #0a0512 100%); border-radius: 16px; padding: 16px; margin-bottom: 25px; border: 1px solid var(--border-color); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; background: #000; }
        
        .card { background: var(--card-bg); border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border-color); position: relative; }
        .avatar-feed { width: 34px; height: 34px; border-radius: 50%; margin-right: 12px; border: 1px solid var(--primary); overflow: hidden; flex-shrink: 0; }
        .delete-btn { position: absolute; top: 12px; right: 12px; color: var(--text-muted); padding: 5px; }
        
        .thumbnail-wrapper { width: 100%; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; background: #000; position: relative; margin-top: 10px; cursor: pointer; }
        .play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); }

        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 10px 15px 30px; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 50px; color: var(--text-muted); font-size: 10px; gap: 4px; }
        .nav-item.active { color: #fff; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; flex-direction: column; justify-content: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-content { background: #111113; border-radius: 20px 20px 0 0; padding: 10px 20px 40px; border-top: 1px solid var(--border-color); text-align: center; }

        .input-box { width: 100%; background: #000; border: 1px solid var(--border-color); color: white; padding: 14px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; outline: none; }
        @keyframes storyGlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>
    <div id="app-container" v-cloak>
        <div id="splash-screen" v-if="splashVisible" :style="{ opacity: splashOpacity }">
            <div style="width:100px;height:100px;margin-bottom:20px;" v-html="logoSvg('splash')"></div>
            <div class="gradient-text" style="font-size: 32px;">MikoTok</div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>

        <div class="app-content-wrapper" v-if="!splashVisible">
            <header class="app-header">
                <div style="width:28px;height:28px;" v-html="logoSvg('header')"></div>
                <div style="font-size:24px;font-weight:800;"><span class="gradient-text">MikoTok</span></div>
                <div class="header-status-wrapper" @click="modals.profile = true">
                    <div class="story-ring" :class="{ live: isLive }"><img src="1000018850.png?v=2" class="story-avatar"></div>
                    <div class="status-badge" :style="{ background: isLive ? 'var(--danger)' : 'var(--offline-gray)' }">{{ isLive ? 'LIVE' : 'OFFLINE' }}</div>
                </div>
            </header>

            <div id="feed">
                <!-- Home Section -->
                <template v-if="currentTab === 'home'">
                    <div id="live-container">
                        <div style="display:flex;justify-content:space-between;margin-bottom:12px;align-items:center;">
                            <div style="background:rgba(0,0,0,0.4);padding:4px 10px;border-radius:20px;border:1px solid var(--border-color);">
                                <span style="font-size:10px;font-weight:800;letter-spacing:0.5px;" :style="{ color: isLive ? 'var(--danger)' : 'var(--primary)' }">
                                    {{ isMediaClip ? 'CLIP PREVIEW' : (isLive ? 'ONLINE' : 'LATEST VOD') }}
                                </span>
                            </div>
                            <span style="font-size:9px;font-weight:700;opacity:0.5;color:#fff;">FEATURED</span>
                        </div>
                        <div class="player-wrapper">
                            <iframe :src="mediaUrl" referrerpolicy="no-referrer" allowfullscreen="true" style="width:100%; height:100%; border:none;"></iframe>
                        </div>
                    </div>

                    <div class="card" v-for="clip in clips" :key="clip.id">
                        <div style="display:flex;align-items:center;">
                            <div class="avatar-feed"><img src="1000018850.png?v=2" style="width:100%;"></div>
                            <div style="font-weight:700;font-size:14px;">{{ clip.added_by }}</div>
                        </div>
                        <div class="thumbnail-wrapper" @click="playClip(clip.id)">
                            <img :src="clip.thumbnail_url" style="width:100%;height:100%;object-fit:cover;">
                            <div class="play-overlay"><span class="material-symbols-rounded" style="font-size:48px;color:#fff;">play_circle</span></div>
                        </div>
                    </div>
                </template>

                <!-- Chat Section -->
                <div v-if="currentTab === 'chat'" style="height:100%;">
                    <iframe :src="'https://www.twitch.tv/embed/codemiko/chat?parent=' + host + '&parent=meowoccino.github.io&darkpopout'" style="width:100%;height:100%;border:none;"></iframe>
                </div>

                <!-- Feed Section -->
                <template v-if="currentTab === 'community'">
                    <div class="card" v-for="post in posts" :key="post.id">
                        <div v-if="currentUser === 'tomato_24'" class="delete-btn" @click="deletePost(post.id)"><span class="material-symbols-rounded" style="font-size:20px;">delete</span></div>
                        <div style="display:flex; align-items:center; margin-bottom:10px;">
                            <div class="avatar-feed"><img src="1000018850.png?v=2" style="width:100%;"></div>
                            <div>
                                <div style="font-weight:700; font-size:14px; display: flex; align-items: center; gap: 5px;">
                                    {{ post.author }} <span v-if="post.author === 'CodeMiko'" style="background:rgba(88,101,242,0.2);color:#5865F2;padding:2px 5px;border-radius:4px;font-size:8px;font-weight:900;">DISCORD</span>
                                </div>
                                <div style="font-size:10px; color:var(--text-muted);">{{ formatDate(post.created_at) }}</div>
                            </div>
                        </div>
                        <div style="font-size:14px; line-height: 1.5; color:#eee;">{{ post.text }}</div>
                    </div>
                </template>
            </div>

            <nav class="bottom-nav">
                <div class="nav-item" :class="{ active: currentTab === 'home' }" @click="currentTab = 'home'"><span class="material-symbols-rounded">home</span>Home</div>
                <div class="nav-item" :class="{ active: currentTab === 'chat' }" @click="currentTab = 'chat'"><span class="material-symbols-rounded">chat</span>Chat</div>
                <div class="nav-item" :class="{ active: currentTab === 'community' }" @click="currentTab = 'community'"><span class="material-symbols-rounded">forum</span>Feed</div>
                <div class="nav-item" @click="modals.profile = true"><span class="material-symbols-rounded">account_circle</span>Profile</div>
            </nav>
        </div>

        <!-- Modals -->
        <div class="modal-overlay" :class="{ open: modals.profile }" @click.self="modals.profile = false">
            <div class="modal-content">
                <div style="width:40px;height:4px;background:#333;border-radius:10px;margin:0 auto 20px;"></div>
                <div v-if="!currentUser">
                    <input type="text" v-model="loginNick" class="input-box" placeholder="Owner ID">
                    <input type="password" v-model="loginPass" class="input-box" placeholder="Key">
                    <button class="input-box" style="background:var(--primary); font-weight:700;" @click="handleLogin">Authorize</button>
                </div>
                <div v-else>
                    <div class="avatar-feed" style="width:60px;height:60px;margin:0 auto 15px;"><img src="1000018850.png?v=2" style="width:100%;"></div>
                    <h2 style="margin:0 0 20px;">{{ currentUser }}</h2>
                    <textarea v-model="newPostText" class="input-box" placeholder="Post as CodeMiko..." style="height:100px;resize:none;"></textarea>
                    <button class="input-box" style="background:var(--discord); font-weight:700;" @click="dispatchPost">Dispatch Post</button>
                    <button class="input-box" style="background:#222; font-weight:700;" @click="handleSyncClick" :disabled="isSyncing">Force Sync</button>
                    <button class="input-box" style="background:var(--danger); font-weight:700; margin-top:10px;" @click="logout">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const sbClient = supabase.createClient('https://yhxcuayiwqpjvalyrcqv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloeGN1YXlpd3FwanZhbHlyY3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Nzk1ODEsImV4cCI6MjA5NDE1NTU4MX0.z7EDgqRz1OT25UdxtmeJxFvwx4UCwaPRwWWJuzd46kc');

        createApp({
            setup() {
                const splashVisible = ref(true), splashOpacity = ref(1), currentTab = ref('home');
                const isLive = ref(false), isSyncing = ref(false), isMediaClip = ref(false);
                const posts = ref([]), clips = ref([]), modals = ref({ profile: false });
                const currentUser = ref(localStorage.getItem('miko_user')), loginNick = ref(''), loginPass = ref(''), newPostText = ref('');
                const host = window.location.hostname || "meowoccino.github.io";
                const mediaUrl = ref('https://player.twitch.tv/?video=2143719460&parent=' + host + '&autoplay=false&muted=false');

                const logoSvg = (i) => `<svg viewBox="0 0 100 100"><defs><linearGradient id="g-${i}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#9146FF"/></linearGradient></defs><circle cx="50" cy="50" r="40" fill="none" stroke="url(#g-${i})" stroke-width="8"/><path d="M 33 38 L 48 62 L 62 38 L 62 55 Q 62 65 69 64" fill="none" stroke="url(#g-${i})" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

                const loadData = async () => {
                    const { data: p } = await sbClient.from('posts').select('*').order('created_at', { ascending: false });
                    const { data: c } = await sbClient.from('clips').select('*').order('created_at', { ascending: false });
                    posts.value = p || []; clips.value = c || [];
                };

                const playClip = (id) => {
                    isMediaClip.value = true;
                    mediaUrl.value = `https://clips.twitch.tv/embed?clip=${id}&parent=${host}&autoplay=true`;
                    document.getElementById('feed').scrollTo({ top: 0, behavior: 'smooth' });
                };

                const dispatchPost = async () => {
                    if (!newPostText.value) return;
                    await sbClient.from('posts').insert([{ author: 'CodeMiko', text: newPostText.value }]);
                    newPostText.value = ''; await loadData(); alert("Dispatched!");
                };

                const deletePost = async (id) => {
                    if (confirm("Delete this?")) { await sbClient.from('posts').delete().eq('id', id); await loadData(); }
                };

                const handleLogin = () => { if(loginNick.value === 'tomato_24' && loginPass.value === 'codemiko') { localStorage.setItem('miko_user', 'tomato_24'); location.reload(); } };
                const logout = () => { localStorage.removeItem('miko_user'); location.reload(); };
                const formatDate = (d) => new Date(d).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', month: 'short', day: 'numeric' });

                onMounted(() => { 
                    loadData(); 
                    setTimeout(() => { splashOpacity.value = 0; setTimeout(() => splashVisible.value = false, 600); }, 1500); 
                });

                return { splashVisible, splashOpacity, currentTab, isLive, currentUser, posts, clips, modals, host, logoSvg, loginNick, loginPass, handleLogin, logout, isSyncing, newPostText, dispatchPost, deletePost, mediaUrl, playClip, formatDate, isMediaClip };
            }
        }).mount('#app-container');
    </script>
</body>
</html>
