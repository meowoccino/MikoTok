<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <title>MikoTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        :root { --bg-color: #000000; --card-bg: #111113; --primary: #9146FF; --primary-light: #a970ff; --text-main: #ffffff; --text-muted: #71717a; --border-color: #27272a; --danger: #ef4444; --offline-gray: #3f3f46; --discord: #5865F2; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-color); color: var(--text-main); overflow: hidden; display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 480px; height: 100%; position: relative; background: var(--bg-color); overflow: hidden; }
        [v-cloak] { display: none !important; }
        #splash-screen { position: absolute; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.6s ease; }
        #splash-icon { width: 120px; height: 120px; margin-bottom: 20px; }
        .progress-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; position: relative; margin-top: 20px; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: linear-gradient(90deg, #ffffff, var(--primary)); animation: load 1.5s infinite ease-in-out; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }
        .gradient-text { display: inline-block; background: linear-gradient(135deg, #ffffff 30%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Outfit', sans-serif; }
        .app-content-wrapper { position: absolute; inset: 0; width: 100%; height: 100%; overflow: hidden; }
        .app-header { position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: 50px 20px 15px; display: flex; align-items: center; justify-content: space-between; background: rgba(0, 0, 0, 0.90); backdrop-filter: blur(12px); }
        .header-logo { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
        .simple-logo { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .header-status-wrapper { position: relative; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .story-ring { width: 38px; height: 38px; border-radius: 50%; padding: 2px; background: transparent; display: flex; align-items: center; justify-content: center; }
        .story-ring.live { background: linear-gradient(45deg, var(--danger), var(--primary), #ff4685, var(--danger)); background-size: 300% 300%; animation: storyGlow 3s ease infinite; }
        .story-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .status-badge { position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 7px; font-weight: 900; padding: 1px 5px; border-radius: 4px; border: 1.5px solid #000; text-transform: uppercase; z-index: 2; white-space: nowrap; }
        .status-badge.live { background: var(--danger); }
        .status-badge.offline { background: var(--offline-gray); }
        #feed { height: 100%; width: 100%; overflow-y: auto; padding: 110px 12px 100px; scroll-behavior: smooth; }
        #feed::-webkit-scrollbar { display: none; }
        #live-container { background: linear-gradient(160deg, #160b24 0%, #0a0512 100%); border-radius: 16px; padding: 16px; margin-bottom: 25px; border: 1px solid var(--border-color); box-shadow: 0 8px 32px rgba(0,0,0,0.4); position: relative; overflow: hidden; }
        .live-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .status-pill { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; backdrop-filter: blur(4px); }
        .status-tag { font-size: 10px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
        .status-dot { width: 6px; height: 6px; background: var(--offline-gray); border-radius: 50%; }
        .status-dot.active { background: var(--danger); box-shadow: 0 0 10px var(--danger); animation: heartbeatLive 1.8s infinite ease-in-out; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; background: #000; border: 1px solid rgba(255,255,255,0.05); }
        .chat-tab-container { height: 100%; width: 100%; padding: 110px 0 100px; background: #000; }
        .chat-iframe { width: 100%; height: 100%; border: none; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border-color); position: relative; }
        .avatar-ring-feed { width: 38px; height: 38px; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; border: 1px solid var(--primary); background: #000; overflow: hidden; flex-shrink: 0; position: relative; }
        .avatar-ring-feed img { width: 100%; height: 100%; object-fit: cover; }
        .thumbnail-wrapper { width: 100%; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; background: #000; position: relative; margin-top: 5px; border: 1px solid rgba(255,255,255,0.05); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1500; display: flex; flex-direction: column; justify-content: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-content { background: #111113; border-radius: 20px 20px 0 0; padding: 10px 20px 40px; transform: translateY(100%); transition: transform 0.3s ease; border-top: 1px solid var(--border-color); text-align: center; }
        .modal-overlay.open .modal-content { transform: translateY(0); }
        .swipe-handle { width: 40px; height: 4px; background: #333; border-radius: 10px; margin: 10px auto 20px; }
        .input-box { width: 100%; background: #000; border: 1px solid var(--border-color); color: white; padding: 14px; border-radius: 8px; outline: none; margin-bottom: 12px; font-size: 14px; text-align: left; }
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 10px 15px 30px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 50px; color: var(--text-muted); font-size: 10px; gap: 4px; cursor: pointer; transition: color 0.2s; text-decoration: none; }
        .nav-item.active { color: #fff; }
        @keyframes storyGlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes heartbeatLive { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.25); opacity: 0.6; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="app-container" v-cloak>
        <div id="splash-screen" v-if="splashVisible" :style="{ opacity: splashOpacity }">
            <div v-html="logoSvg('splash')" id="splash-icon"></div>
            <div class="gradient-text" style="font-size: 40px;">MikoTok</div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>

        <div class="app-content-wrapper" :style="{ opacity: splashVisible ? 0 : 1 }">
            <header class="app-header">
                <div class="header-logo" v-html="logoSvg('header')"></div>
                <div class="simple-logo"><span class="gradient-text">MikoTok</span></div>
                <div class="header-status-wrapper" @click="modals.profile = true">
                    <div class="story-ring" :class="isLive ? 'live' : 'offline'"><img src="1000018850.png?v=2" class="story-avatar" alt="Miko"></div>
                    <div class="status-badge" :class="isLive ? 'live' : 'offline'">{{ isLive ? 'LIVE' : 'OFFLINE' }}</div>
                </div>
            </header>

            <div id="feed" v-if="currentTab === 'home'">
                <div id="live-container">
                    <div class="live-label">
                        <div class="status-pill">
                            <span class="status-dot" :class="{ active: isLive, vod: !isLive }"></span> 
                            <span class="status-tag" :style="{ color: isLive ? 'var(--danger)' : 'var(--primary)' }">{{ isLive ? 'ONLINE' : 'LATEST VOD' }}</span>
                        </div>
                        <span style="background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 12px; font-size: 9px; font-weight: 700; color: #fff;">FEATURED</span>
                    </div>
                    <div class="player-wrapper">
                        <iframe v-if="isLive" :src="'https://player.twitch.tv/?channel=codemiko&parent=meowoccino.github.io&parent=' + host + '&autoplay=false&muted=true'" referrerpolicy="no-referrer" allowfullscreen="true" style="width:100%; height:100%; border:none;"></iframe>
                        <iframe v-else :src="'https://player.twitch.tv/?video=2143719460&parent=meowoccino.github.io&parent=' + host + '&autoplay=false&muted=true'" referrerpolicy="no-referrer" allowfullscreen="true" style="width:100%; height:100%; border:none;"></iframe>
                    </div>
                </div>
                <div class="card" v-for="clip in clips" :key="clip.id">
                    <div style="display:flex;align-items:center;margin-bottom:10px;">
                        <div class="avatar-ring-feed"><img src="1000018850.png?v=2" alt="Avatar"></div>
                        <div style="font-weight:700;font-size:14px; margin-left: 10px;">{{ clip.added_by }}</div>
                    </div>
                    <div class="thumbnail-wrapper"><img :src="clip.thumbnail_url" style="width:100%; height:100%; object-fit:cover; border-radius:8px;"></div>
                </div>
            </div>

            <div class="chat-tab-container" v-if="currentTab === 'chat'">
                <iframe :src="'https://www.twitch.tv/embed/codemiko/chat?parent=meowoccino.github.io&parent=' + host + '&darkpopout'" referrerpolicy="no-referrer" class="chat-iframe"></iframe>
            </div>

            <div id="feed" v-if="currentTab === 'community'">
                <div class="card" v-for="post in posts" :key="post.id">
                    <div style="display:flex;align-items:center;margin-bottom:10px;">
                        <div class="avatar-ring-feed"><img src="1000018850.png?v=2" alt="Avatar"></div>
                        <div>
                            <div style="font-weight:700; font-size:14px;">{{ post.author }}</div>
                            <div style="font-size:10px; color:var(--text-muted);">{{ new Date(post.created_at).toLocaleDateString() }}</div>
                        </div>
                    </div>
                    <div style="font-size:14px;">{{ post.text }}</div>
                </div>
            </div>

            <nav class="bottom-nav">
                <div class="nav-item" :class="{ active: currentTab === 'home' }" @click="currentTab = 'home'"><span class="material-symbols-rounded">home</span>Home</div>
                <div class="nav-item" :class="{ active: currentTab === 'chat' }" @click="currentTab = 'chat'"><span class="material-symbols-rounded">chat</span>Chat</div>
                <div class="nav-item" :class="{ active: currentTab === 'community' }" @click="currentTab = 'community'"><span class="material-symbols-rounded">forum</span>Feed</div>
                <a href="https://discord.gg/codemiko" target="_blank" class="nav-item"><svg viewBox="0 0 127 96" style="width:24px; height:24px; fill:currentColor; opacity: 0.8;"><path d="M107.7,8.07A105,105,0,0,0,81.47,0a72,72,0,0,0-3.36,6.83,97,97,0,0,0-49,0,72,72,0,0,0-3.36-6.83A105,105,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.1a105,105,0,0,0,32.19,16.18,77,77,0,0,0,6.89-11.11,64,64,0,0,1-10.85-5.18,75,75,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a64,64,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.10,105,105,0,0,0,32.19-16.14c2.72-27.00-4.55-50.87-19.40-72.03ZM42.45,65.69C36.18,65.69,31.00,60,31.00,53s5.12-12.67,11.45-12.67S54,46,54,53s-5.17,12.69-11.55,12.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5.12-12.67,11.44-12.67S96.20,46,96.20,53s-5.14,12.69-9.51,12.69Z"/></svg>Discord</a>
                <div class="nav-item" @click="modals.profile = true"><span class="material-symbols-rounded">account_circle</span>Profile</div>
            </nav>
        </div>

        <div class="modal-overlay" :class="{ open: modals.profile }" @click.self="modals.profile = false">
            <div class="modal-content">
                <div class="swipe-handle"></div>
                <div v-if="!currentUser">
                    <h3 style="margin-bottom: 20px;">Owner Terminal</h3>
                    <input type="text" v-model="loginNick" class="input-box" placeholder="Owner ID">
                    <input type="password" v-model="loginPass" class="input-box" placeholder="Authorization Key">
                    <button class="input-box" style="background:var(--primary); font-weight:700; text-align:center;" @click="handleLogin">Login</button>
                </div>
                <div v-else>
                    <div class="avatar-ring-feed" style="width:64px; height:64px; margin: 0 auto 15px;"><img src="1000018850.png?v=2" alt="Profile"></div>
                    <h2 style="margin-bottom:20px;">tomato_24 Access</h2>
                    <div v-if="showKeyInputs">
                        <input type="text" v-model="tempId" class="input-box" placeholder="Twitch Client ID">
                        <input type="text" v-model="tempTkn" class="input-box" placeholder="Twitch Access Token">
                        <button class="input-box" style="background:var(--primary); font-weight:700; text-align:center;" @click="saveKeysAndSync">Save & Sync</button>
                    </div>
                    <div v-else>
                        <textarea v-model="newPostText" class="input-box" placeholder="Dispatch chaotic post..." style="height:80px; resize:none;"></textarea>
                        <button class="input-box" style="background:var(--discord); font-weight:700; text-align:center;" @click="dispatchPost">Dispatch Post</button>
                        <button class="input-box" style="background:var(--primary); font-weight:700; text-align:center;" @click="handleSyncClick" :disabled="isSyncing">{{ isSyncing ? 'SYNCING...' : 'Force Sync content' }}</button>
                    </div>
                    <button class="input-box" style="background:var(--danger); text-align:center; font-weight:700; margin-top: 10px;" @click="logout">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, computed } = Vue;
        const sbClient = supabase.createClient('https://yhxcuayiwqpjvalyrcqv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloeGN1YXlpd3FwanZhbHlyY3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Nzk1ODEsImV4cCI6MjA5NDE1NTU4MX0.z7EDgqRz1OT25UdxtmeJxFvwx4UCwaPRwWWJuzd46kc');

        createApp({
            setup() {
                const splashVisible = ref(true), splashOpacity = ref(1), currentTab = ref('home');
                const isLive = ref(false), isSyncing = ref(false); 
                const currentUser = ref(localStorage.getItem('miko_user')), loginNick = ref(''), loginPass = ref('');
                const posts = ref([]), clips = ref([]), modals = ref({ profile: false }), showKeyInputs = ref(false), tempId = ref(''), tempTkn = ref(''), newPostText = ref('');
                const host = window.location.hostname || "localhost";

                const logoSvg = (id) => `<svg viewBox="0 0 100 100"><defs><linearGradient id="grad-${id}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#9146FF"/></linearGradient></defs><circle cx="50" cy="50" r="40" fill="none" stroke="url(#grad-${id})" stroke-width="8"/><path d="M 33 38 L 48 62 L 62 38 L 62 55 Q 62 65 69 64" fill="none" stroke="url(#grad-${id})" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

                const loadData = async () => {
                    const { data: p } = await sbClient.from('posts').select('*').order('created_at', { ascending: false });
                    const { data: c } = await sbClient.from('clips').select('*').order('created_at', { ascending: false });
                    posts.value = p || []; clips.value = c || [];
                };

                const handleLogin = () => { if(loginNick.value === 'tomato_24' && loginPass.value === 'codemiko') { localStorage.setItem('miko_user', 'tomato_24'); location.reload(); } };
                const logout = () => { localStorage.removeItem('miko_user'); location.reload(); };
                const dispatchPost = async () => { if (!newPostText.value) return; await sbClient.from('posts').insert([{ author: 'CodeMiko', text: newPostText.value }]); newPostText.value = ''; loadData(); alert("Dispatched!"); };

                const handleSyncClick = () => { if (!localStorage.getItem('tw_id')) { showKeyInputs.value = true; } else { runSync(localStorage.getItem('tw_id'), localStorage.getItem('tw_tk')); } };
                const saveKeysAndSync = () => { localStorage.setItem('tw_id', tempId.value); localStorage.setItem('tw_tk', tempTkn.value); showKeyInputs.value = false; runSync(tempId.value, tempTkn.value); };

                const runSync = async (cid, tkn) => {
                    isSyncing.value = true;
                    try {
                        const h = { 'Client-Id': cid, 'Authorization': `Bearer ${tkn}` };
                        const uR = await fetch('https://api.twitch.tv/helix/users?login=codemiko', { headers: h });
                        const uD = await uR.json();
                        const cR = await fetch(`https://api.twitch.tv/helix/clips?broadcaster_id=${uD.data[0].id}&first=20`, { headers: h });
                        const cD = await cR.json();
                        const ins = cD.data.map(x => ({ id: x.id, added_by: 'CodeMiko', created_at: x.created_at, thumbnail_url: x.thumbnail_url, title: x.title }));
                        await sbClient.from('clips').upsert(ins, { onConflict: 'id' });
                        loadData(); alert("Twitch Content Synced!");
                    } catch (e) { alert("Sync Error. Check Keys."); } finally { isSyncing.value = false; }
                };

                onMounted(() => { loadData(); setTimeout(() => { splashOpacity.value = 0; setTimeout(() => splashVisible.value = false, 600); }, 1500); });
                return { splashVisible, splashOpacity, currentTab, isLive, currentUser, posts, clips, modals, host, logoSvg, loginNick, loginPass, handleLogin, logout, isSyncing, handleSyncClick, showKeyInputs, tempId, tempTkn, saveKeysAndSync, newPostText, dispatchPost };
            }
        }).mount('#app-container');
    </script>
</body>
</html>
