<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <link rel="manifest" href="manifest.json">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000000'/><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23ffffff'/><stop offset='100%25' stop-color='%239146FF'/></linearGradient></defs><circle cx='50' cy='50' r='35' fill='none' stroke='url(%23g)' stroke-width='6'/><path d='M 38 40 L 48 60 L 58 40 L 58 55 Q 58 63 65 62' fill='none' stroke='url(%23g)' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000000'/><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23ffffff'/><stop offset='100%25' stop-color='%239146FF'/></linearGradient></defs><circle cx='50' cy='50' r='35' fill='none' stroke='url(%23g)' stroke-width='6'/><path d='M 38 40 L 48 60 L 58 40 L 58 55 Q 58 63 65 62' fill='none' stroke='url(%23g)' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/></svg>">

    <title>MikoTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <style>
        :root { 
            --bg-color: #000000; --card-bg: #111113; --primary: #9146FF; 
            --primary-light: #a970ff; --text-main: #ffffff; --text-muted: #71717a; 
            --border-color: #27272a; --danger: #ef4444; --offline-gray: #3f3f46;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-color); color: var(--text-main); overflow: hidden; display: flex; justify-content: center; }
        
        /* Fixed App Container */
        #app-container { width: 100%; max-width: 480px; height: 100%; position: relative; background: var(--bg-color); overflow: hidden; }
        [v-cloak] { display: none !important; }

        /* Splash Logic */
        #splash-screen { position: absolute; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.6s ease; }
        #splash-icon { width: 120px; height: 120px; margin-bottom: 20px; }
        .progress-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; position: relative; margin-top: 20px; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: linear-gradient(90deg, #ffffff, var(--primary)); animation: load 1.5s infinite ease-in-out; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }
        .gradient-text { display: inline-block; background: linear-gradient(135deg, #ffffff 30%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Outfit', sans-serif; }

        .app-header { position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: 50px 20px 15px; display: flex; align-items: center; justify-content: space-between; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); }
        .header-logo { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
        .header-status-link { text-decoration: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 40px; }
        .status-dot { width: 6px; height: 6px; background: var(--offline-gray); border-radius: 50%; transition: background 0.3s ease; animation: heartbeat 2.5s infinite ease-in-out; }
        .status-dot.active { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        .simple-logo { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }

        #feed { height: 100%; width: 100%; overflow-y: auto; padding: 110px 12px 100px; scroll-behavior: smooth; }
        #feed::-webkit-scrollbar { display: none; }
        
        #live-container { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 25px; border: 2px solid var(--primary); box-shadow: 0 0 15px rgba(145, 70, 255, 0.4); }
        .live-label { font-size: 11px; font-weight: 900; color: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .status-tag { color: var(--text-muted); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .pinned-tag { background: #333; color: #aaa; padding: 2px 8px; border-radius: 4px; font-size: 9px; text-transform: uppercase; }

        .card { background: var(--card-bg); border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border-color); position: relative; }
        .avatar-ring { width: 38px; height: 38px; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; border: 1px solid var(--primary); background: #000; overflow: hidden; flex-shrink: 0; position: relative; }
        .avatar-ring img { width: 100%; height: 100%; object-fit: cover; }
        
        .view-stat { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 6px; display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; color: #fff; z-index: 5; }

        .thumbnail-wrapper { width: 100%; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; background: #000; position: relative; margin-top: 5px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .thumbnail-wrapper img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: opacity 0.2s; }
        .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; }
        .play-overlay span { font-size: 56px; color: white; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1500; display: flex; flex-direction: column; justify-content: flex-end; opacity: 0; pointer-events: none; transition: 0.3s ease; }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-content { background: #111113; border-radius: 20px 20px 0 0; padding: 10px 20px 40px; transform: translateY(100%); transition: transform 0.3s ease; border-top: 1px solid var(--border-color); text-align: center; }
        .modal-overlay.open .modal-content { transform: translateY(0); }
        .swipe-handle { width: 40px; height: 4px; background: #333; border-radius: 10px; margin: 10px auto 20px; }
        .input-box { width: 100%; background: #000; border: 1px solid var(--border-color); color: white; padding: 14px; border-radius: 8px; outline: none; margin-bottom: 12px; font-size: 14px; text-align: left; }
        
        .clip-player-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .clip-player-overlay.open { opacity: 1; pointer-events: auto; }

        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 10px 15px 30px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 50px; color: var(--text-muted); font-size: 10px; gap: 4px; cursor: pointer; transition: color 0.2s; text-decoration: none; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body>
    <div id="app-container" v-cloak>
        
        <!-- Splash Screen directly controls visibility -->
        <div id="splash-screen" v-if="splashVisible" :style="{ opacity: splashOpacity }">
            <div v-html="logoSvg('splash')" id="splash-icon"></div>
            <div class="gradient-text" style="font-size: 40px;">MikoTok</div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>

        <!-- The main App Content hidden seamlessly under the splash screen -->
        <div :style="{ opacity: splashVisible ? 0 : 1, transition: 'opacity 0.4s ease', pointerEvents: splashVisible ? 'none' : 'auto' }">
            <header class="app-header">
                <div class="header-logo" v-html="logoSvg('header')"></div>
                <div class="simple-logo"><span class="gradient-text">MikoTok</span></div>
                <div class="header-status-link">
                    <div class="status-dot" :class="{ active: isLive }"></div>
                    <span style="font-size: 8px; font-weight: 800; color: var(--text-muted); margin-top: 3px;">{{ isLive ? 'LIVE' : 'OFFLINE' }}</span>
                </div>
            </header>

            <div id="feed">
                <template v-if="currentTab === 'home'">
                    <div id="live-container">
                        <div class="live-label">
                            <div style="display:flex; align-items:center; gap:8px;"><span class="status-dot" :class="{ active: isLive }"></span> <span class="status-tag">{{ isLive ? 'Live' : 'Offline' }}</span></div>
                            <span class="pinned-tag">Pinned</span>
                        </div>
                        <div style="width: 100%; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; background: #000;">
                            <iframe :src="'https://player.twitch.tv/?channel=codemiko&parent=' + host + '&autoplay=false&muted=true'" allowfullscreen="true" style="width:100%; height:100%; border:none;"></iframe>
                        </div>
                    </div>

                    <div class="card" v-for="clip in clips" :key="clip.id">
                        <div style="display:flex;align-items:center;margin-bottom:10px;">
                            <div class="avatar-ring">
                                <img v-if="clip.added_by === 'CodeMiko' || clip.added_by === 'tomato_24'" src="1000018850.png">
                                <span v-else>{{ clip.added_by[0] }}</span>
                            </div>
                            <div>
                                <div style="font-weight:700;font-size:14px;">{{ clip.added_by }}</div>
                            </div>
                        </div>
                        <div class="thumbnail-wrapper" @click="activeClip = clip">
                            <img :src="clip.thumbnail_url">
                            <div class="view-stat">
                                <span class="material-symbols-rounded" style="font-size:14px;">visibility</span>
                                {{ Number(clip.view_count).toLocaleString() }}
                            </div>
                            <div class="play-overlay"><span class="material-symbols-rounded" style="font-size:48px; color:white;">play_circle</span></div>
                        </div>
                    </div>
                </template>

                <template v-if="currentTab === 'community'">
                    <div class="card" v-for="post in posts" :key="post.id">
                        <div style="display:flex; align-items:center; margin-bottom:10px;">
                            <div class="avatar-ring">
                                <img v-if="post.author === 'CodeMiko' || post.author === 'tomato_24'" src="1000018850.png">
                                <span v-else>{{ post.author ? post.author[0] : '?' }}</span>
                            </div>
                            <div>
                                <div style="font-weight:700; font-size:14px;">{{ post.author }}</div>
                                <div style="font-size:10px; color:var(--text-muted);">{{ new Date(post.created_at).toLocaleDateString() }}</div>
                            </div>
                        </div>
                        <div style="font-size:14px;">{{ post.text }}</div>
                    </div>
                </template>
            </div>

            <nav class="bottom-nav">
                <div class="nav-item" :class="{ active: currentTab === 'home' }" @click="currentTab = 'home'"><span class="material-symbols-rounded">home</span>Home</div>
                <div class="nav-item" :class="{ active: currentTab === 'community' }" @click="currentTab = 'community'"><span class="material-symbols-rounded">forum</span>Feed</div>
                <a href="https://discord.gg/codemiko" target="_blank" class="nav-item">
                    <svg viewBox="0 0 127 96" style="width:24px; height:24px; fill:currentColor; opacity: 0.8;"><path d="M107.7,8.07A105,105,0,0,0,81.47,0a72,72,0,0,0-3.36,6.83,97,97,0,0,0-49,0,72,72,0,0,0-3.36-6.83A105,105,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.1a105,105,0,0,0,32.19,16.18,77,77,0,0,0,6.89-11.11,64,64,0,0,1-10.85-5.18,75,75,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a64,64,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.10,105,105,0,0,0,32.19-16.14c2.72-27.00-4.55-50.87-19.40-72.03ZM42.45,65.69C36.18,65.69,31.00,60,31.00,53s5.12-12.67,11.45-12.67S54,46,54,53s-5.17,12.69-11.55,12.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5.12-12.67,11.44-12.67S96.20,46,96.20,53s-5.14,12.69-9.51,12.69Z"/></svg>
                    Discord
                </a>
                <div class="nav-item" @click="modals.profile = true"><span class="material-symbols-rounded">account_circle</span>Profile</div>
            </nav>
        </div>

        <div class="clip-player-overlay" :class="{ open: activeClip }" @click="activeClip = null">
            <div v-if="activeClip" style="width: 100%; max-width: 480px;">
                <div style="width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden;">
                    <iframe :src="'https://clips.twitch.tv/embed?clip=' + activeClip.id + '&parent=' + host + '&autoplay=true&muted=false'" style="width: 100%; height: 100%; border: none;" allow="autoplay; fullscreen" allowfullscreen="true"></iframe>
                </div>
                <p style="text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 12px;">Tap background to close</p>
            </div>
        </div>

        <div class="modal-overlay" :class="{ open: modals.profile }" @click.self="modals.profile = false">
            <div class="modal-content">
                <div class="swipe-handle"></div>
                <div v-if="!currentUser">
                    <input type="text" v-model="loginNick" class="input-box" placeholder="Username">
                    <input type="password" v-model="loginPass" class="input-box" placeholder="Password">
                    <button class="input-box" style="background:var(--primary); font-weight:700; text-align:center;" @click="handleLogin">Sign In</button>
                </div>
                <div v-else>
                    <div class="avatar-ring" style="width:64px; height:64px; margin: 0 auto 15px;">
                        <img v-if="currentUser === 'tomato_24' || currentUser === 'CodeMiko'" src="1000018850.png">
                        <span v-else>{{ currentUser[0] }}</span>
                    </div>
                    <h2 style="margin-bottom:20px;">{{ currentUser }}</h2>
                    <div v-if="isAdmin" style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; margin-bottom:15px;">
                        <h4 style="margin:0 0 10px; color:var(--primary-light);">Admin Panel</h4>
                        <div v-if="showKeyInputs">
                            <input type="text" v-model="tempId" class="input-box" placeholder="Twitch Client ID">
                            <input type="text" v-model="tempTkn" class="input-box" placeholder="Twitch Access Token">
                            <button class="input-box" style="background:var(--primary); font-weight:700; text-align:center;" @click="saveKeysAndSync">Save & Sync</button>
                        </div>
                        <button v-else class="input-box" style="background:var(--primary); font-weight:700; text-align:center;" @click="handleSyncClick" :disabled="isSyncing">
                            {{ isSyncing ? 'SYNCING...' : 'Backup Fetch' }}
                        </button>
                    </div>
                    <button class="input-box" style="background:var(--danger); text-align:center; font-weight:700;" @click="logout">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, computed } = Vue;
        const sbClient = supabase.createClient('https://yhxcuayiwqpjvalyrcqv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloeGN1YXlpd3FwanZhbHlyY3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Nzk1ODEsImV4cCI6MjA5NDE1NTU4MX0.z7EDgqRz1OT25UdxtmeJxFvwx4UCwaPRwWWJuzd46kc');

        createApp({
            setup() {
                const splashVisible = ref(true), splashOpacity = ref(1), currentTab = ref('home'), isLive = ref(false);
                const currentUser = ref(localStorage.getItem('miko_user')), loginNick = ref(''), loginPass = ref('');
                const isAdmin = computed(() => currentUser.value === 'tomato_24');
                const posts = ref([]), clips = ref([]), modals = ref({ profile: false }), activeClip = ref(null), isSyncing = ref(false), host = window.location.hostname || "localhost";
                const showKeyInputs = ref(false), tempId = ref(''), tempTkn = ref('');

                const logoSvg = (id) => `<svg viewBox="0 0 100 100"><defs><linearGradient id="grad-${id}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#9146FF"/></linearGradient></defs><circle cx="50" cy="50" r="40" fill="none" stroke="url(#grad-${id})" stroke-width="8"/><path d="M 33 38 L 48 62 L 62 38 L 62 55 Q 62 65 69 64" fill="none" stroke="url(#grad-${id})" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

                const loadData = async () => {
                    const { data: p } = await sbClient.from('posts').select('*').order('created_at', { ascending: false });
                    const { data: c } = await sbClient.from('clips').select('*').order('created_at', { ascending: false });
                    posts.value = p || []; clips.value = c || [];
                };

                const handleSyncClick = () => {
                    if (!localStorage.getItem('twitch_client_id') || !localStorage.getItem('twitch_access_token')) {
                        showKeyInputs.value = true;
                    } else {
                        runSync(localStorage.getItem('twitch_client_id'), localStorage.getItem('twitch_access_token'));
                    }
                };

                const saveKeysAndSync = () => {
                    if (tempId.value && tempTkn.value) {
                        localStorage.setItem('twitch_client_id', tempId.value);
                        localStorage.setItem('twitch_access_token', tempTkn.value);
                        showKeyInputs.value = false;
                        runSync(tempId.value, tempTkn.value);
                    } else {
                        alert("Please enter both keys");
                    }
                };

                const runSync = async (cid, tkn) => {
                    isSyncing.value = true;
                    try {
                        const h = { 'Client-Id': cid, 'Authorization': `Bearer ${tkn}` };
                        const uR = await fetch('https://api.twitch.tv/helix/users?login=codemiko', { headers: h });
                        const uD = await uR.json();
                        const cR = await fetch(`https://api.twitch.tv/helix/clips?broadcaster_id=${uD.data[0].id}&first=50`, { headers: h });
                        const cD = await cR.json();
                        const ins = cD.data.map(x => ({ id: x.id, added_by: 'CodeMiko', created_at: x.created_at, thumbnail_url: x.thumbnail_url, title: x.title, view_count: x.view_count }));
                        await sbClient.from('clips').upsert(ins, { onConflict: 'id' });
                        loadData(); alert("Sync Success!");
                    } catch (e) { alert("Error syncing. Check keys."); } finally { isSyncing.value = false; }
                };

                const handleLogin = () => { if(loginNick.value) { localStorage.setItem('miko_user', loginNick.value); location.reload(); } };
                const logout = () => { localStorage.removeItem('miko_user'); location.reload(); };

                onMounted(() => { 
                    loadData(); 
                    setTimeout(() => { 
                        splashOpacity.value = 0; 
                        setTimeout(() => splashVisible.value = false, 600); 
                    }, 1500); 

                    if ('serviceWorker' in navigator) { 
                        navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch", (e) => e.respondWith(fetch(e.request)));'); 
                    }
                });

                return { splashVisible, splashOpacity, currentTab, isLive, currentUser, loginNick, loginPass, isAdmin, posts, clips, modals, activeClip, host, logoSvg, isSyncing, handleSyncClick, showKeyInputs, tempId, tempTkn, saveKeysAndSync, handleLogin, logout };
            }
        }).mount('#app-container');
    </script>
</body>
</html>
