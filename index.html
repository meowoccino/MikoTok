<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mikotok</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    
    <style>
        :root { --miko-purple: #9146FF; --tiktok-red: #ff0050; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'Roboto', sans-serif; }

        .video-feed {
            height: 100vh; width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .video-card {
            height: 100vh; width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex; align-items: center;
        }

        iframe { width: 100%; height: 100%; border: none; z-index: 1; }

        .overlay {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 24px; background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 40%);
            z-index: 10;
        }

        .sidebar {
            position: absolute; right: 12px; bottom: 140px;
            display: flex; flex-direction: column; gap: 24px; pointer-events: auto;
        }

        .action-btn { color: white; display: flex; flex-direction: column; align-items: center; font-size: 12px; }
        .action-btn span { font-size: 36px; margin-bottom: 4px; }

        .info { color: white; pointer-events: none; margin-bottom: 20px; }
        .channel { font-weight: bold; font-size: 18px; margin-bottom: 4px; }
        .desc { font-size: 14px; opacity: 0.9; max-width: 80%; line-height: 1.4; }

        .loading-screen {
            position: fixed; inset: 0; background: #000; 
            display: flex; align-items: center; justify-content: center;
            color: white; z-index: 100; font-family: 'Google Sans';
        }
    </style>
</head>
<body>

    <div id="loader" class="loading-screen">
        <div>
            <div style="font-size: 24px; font-weight: bold; color: #9146FF;">Mikotok</div>
            <div style="font-size: 12px; opacity: 0.5; margin-top: 10px;">Fetching latest clips...</div>
        </div>
    </div>

    <div class="video-feed" id="main-feed"></div>
