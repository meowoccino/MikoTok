<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>MikoTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #000000; --card-bg: #111113; --primary: #9146FF; 
            --primary-light: #a970ff; --text-main: #ffffff; --text-muted: #71717a; 
            --border-color: #27272a; --danger: #ef4444; --offline-gray: #3f3f46;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-color); color: var(--text-main); overflow: hidden; display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 480px; height: 100%; position: relative; background: var(--bg-color); overflow: hidden; }

        /* SPLASH */
        #splash-screen { position: absolute; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.6s ease; }
        #splash-icon { width: 120px; height: 120px; margin-bottom: 20px; }
        .progress-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; position: relative; margin-top: 20px; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: linear-gradient(90deg, #ffffff, var(--primary)); animation: load 1.5s infinite ease-in-out; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }
        .gradient-text { display: inline-block; background: linear-gradient(135deg, #ffffff 30%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Outfit', sans-serif; }

        /* HEADER */
        .app-header { position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: 50px 20px 15px; display: flex; align-items: center; justify-content: space-between; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); }
        .header-logo { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
        .header-status-link { text-decoration: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 40px; }
        .status-dot { width: 6px; height: 6px; background: var(--offline-gray); border-radius: 50%; transition: background 0.3s ease; animation: heartbeat 2.5s infinite ease-in-out; }
        .status-dot.active { background: var(--danger); box-shadow: 0 0 10px var(--danger); animation: heartbeatLive 1.8s infinite ease-in-out; }
        #live-text { font-size: 8px; font-weight: 800; color: var(--text-muted); margin-top: 3px; transition: all 0.3s ease; }
        #live-text.active { color: var(--danger); }
        @keyframes heartbeat { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 0.4; } 100% { transform: scale(1); opacity: 0.8; } }
        @keyframes heartbeatLive { 0% { transform: scale(1); opacity: 1; filter: brightness(1); } 50% { transform: scale(1.25); opacity: 0.6; filter: brightness(1.2); } 100% { transform: scale(1); opacity: 1; filter: brightness(1); } }
        .simple-logo { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }

        #feed { height: 100%; width: 100%; overflow-y: auto; padding: 110px 12px 100px; scroll-behavior: smooth; }
        #feed::-webkit-scrollbar { display: none; }
        
        #live-container { 
            background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 25px; 
            border: 2px solid var(--primary); box-shadow: 0 0 15px rgba(145, 70, 255, 0.4); 
            transition: all 0.3s ease; 
        }
        #live-container.is-live { border-color: var(--primary-light); box-shadow: 0 0 25px rgba(145, 70, 255, 0.6); }
        .live-label { font-size: 11px; font-weight: 900; color: #fff; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .status-wrapper { display: flex; align-items: center; gap: 8px; }
        .status-tag { color: var(--text-muted); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .is-live .status-tag { color: var(--danger); }
        .pinned-tag { background: #333; color: #aaa; padding: 2px 8px; border-radius: 4px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; }
        .is-live .pinned-tag { background: var(--primary); color: white; box-shadow: 0 0 8px var(--primary); }

        .video-container { width: 100%; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; background: #000; position: relative; margin-top: 5px; border: 1px solid rgba(255,255,255,0.05); }
        iframe { width: 100%; height: 100%; border: none; opacity: 0; transition: opacity 0.4s; }
        iframe.loaded { opacity: 1; }

        .card { background: var(--card-bg); border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border-color); position: relative; }
        .avatar-ring { width: 38px; height: 38px; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; border: 1px solid var(--primary); background: #000; font-size: 14px; }
        
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 10px 15px 30px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 50px; color: var(--text-muted); font-size: 10px; gap: 4px; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-fab { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* MODALS */
        #login-modal, #add-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 1500; display: none; flex-direction: column; justify-content: flex-end; }
        .modal-content { background: #111113; border-radius: 20px 20px 0 0; padding: 10px 20px 40px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.1, 0.5, 0.1, 1); border-top: 1px solid var(--border-color); touch-action: none; position: relative; }
        .swipe-handle { width: 40px; height: 4px; background: #333; border-radius: 10px; margin: 10px auto 20px; }
        .input-box { width: 100%; background: #000; border: 1px solid var(--border-color); color: white; padding: 14px; border-radius: 8px; outline: none; margin-bottom: 12px; font-size: 14px; }
        
        .card-actions { display: flex; align-items: center; gap: 15px; margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .action-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); cursor: pointer; font-weight: 700; transition: all 0.2s ease; }
        .action-btn.liked { color: var(--primary); }
        .action-btn.liked span { font-variation-settings: 'FILL' 1; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="splash-screen"><div id="splash-icon"></div><div class="gradient-text" style="font-size: 40px;">MikoTok</div><div class="progress-bar"><div class="progress-fill"></div></div></div>
        
        <div class="app-header">
            <div class="header-logo" id="header-logo-slot"></div>
            <div class="simple-logo"><span class="gradient-text">MikoTok</span></div>
            <a href="https://twitch.tv/codemiko" target="_blank" class="header-status-link">
                <div class="status-dot" id="header-dot"></div>
                <span id="live-text">OFFLINE</span>
            </a>
        </div>

        <div id="feed" onscroll="handleScroll()">
            <div id="live-container">
                <div class="live-label">
                    <div class="status-wrapper">
                        <span class="status-dot" id="hub-dot"></span> 
                        <span id="hub-text" class="status-tag">OFFLINE NOW</span>
                    </div>
                    <span class="pinned-tag">Pinned</span>
                </div>
                <div class="video-container">
                    <iframe id="live-player" src="" allowfullscreen="true" onload="this.classList.add('loaded')"></iframe>
                </div>
            </div>
            <div id="feed-content"></div>
        </div>

        <div id="login-modal"><div class="modal-content" id="login-panel"><div class="swipe-handle"></div><div id="login-form"><input type="text" id="login-nick" class="input-box" placeholder="Username"><input type="password" id="login-pass" class="input-box" placeholder="Password"><button class="input-box" style="background:var(--primary); font-weight:700; border:none;" onclick="handleLogin()">Sign In</button></div><div id="profile-form" style="display:none; text-align:center;"><h3 id="display-name" style="margin-bottom:20px;"></h3><button class="input-box" style="background:var(--danger); font-weight:700; border:none;" onclick="logout()">Logout</button></div><button class="input-box" style="background:transparent; border:none; color:var(--text-muted);" onclick="closeModal('login')">Cancel</button></div></div>
        <div id="add-modal"><div class="modal-content" id="add-panel"><div class="swipe-handle"></div><input type="text" id="clip-url" class="input-box" placeholder="Twitch Clip URL"><button class="input-box" style="background:var(--primary); font-weight:700; border:none;" onclick="submitClip()">Add Clip</button></div></div>
        
        <div class="bottom-nav">
            <div class="nav-item active" id="nav-home" onclick="switchTab('home')"><span class="material-symbols-rounded">home</span>Home</div>
            <div class="nav-item" id="nav-community" onclick="switchTab('community')"><span class="material-symbols-rounded">forum</span>Feed</div>
            <div class="nav-fab" onclick="handleUploadClick()" id="upload-btn-container"></div>
            <div class="nav-item" id="nav-clips" onclick="switchTab('clips')"><span class="material-symbols-rounded">favorite</span>Liked</div>
            <div class="nav-item" id="nav-login" onclick="openModal('login')"><span class="material-symbols-rounded">account_circle</span>Profile</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yhxcuayiwqpjvalyrcqv.supabase.co', SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloeGN1YXlpd3FwanZhbHlyY3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Nzk1ODEsImV4cCI6MjA5NDE1NTU4MX0.z7EDgqRz1OT25UdxtmeJxFvwx4UCwaPRwWWJuzd46kc';
        const ADMIN_USERNAME = 'tomato_24', TWITCH_CHANNEL = 'codemiko';
        let sbClient = null, currentTab = 'home', currentUser = null, isAdmin = false, globalData = { clips: [], posts: [], likes: [], counts: {} }, currentPlayingIframe = null;

        const getLogoSvg = (id) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" style="width:100%;height:100%"><defs><linearGradient id="grad-${id}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#9146FF"/></linearGradient></defs><circle cx="50" cy="50" r="40" fill="none" stroke="url(#grad-${id})" stroke-width="8"/><path d="M 33 38 L 48 62 L 62 38 L 62 55 Q 62 65 69 64" fill="none" stroke="url(#grad-${id})" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        document.getElementById('upload-btn-container').innerHTML = getLogoSvg('nav');
        document.getElementById('splash-icon').innerHTML = getLogoSvg('splash');
        document.getElementById('header-logo-slot').innerHTML = getLogoSvg('header');

        async function init() {
            sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            currentUser = localStorage.getItem('miko_user'); 
            isAdmin = (currentUser === ADMIN_USERNAME);
            updateStatus(false);
            await loadData();
            setupSwipe('login-panel', 'login'); setupSwipe('add-panel', 'add');
            setTimeout(() => { document.getElementById('splash-screen').style.opacity='0'; setTimeout(()=>document.getElementById('splash-screen').style.display='none', 600); }, 1500);
        }

        function updateStatus(isOnline) {
            const host = window.location.hostname || "localhost";
            const hDot = document.getElementById('header-dot'), hText = document.getElementById('live-text'), hubContainer = document.getElementById('live-container'), hubDot = document.getElementById('hub-dot'), hubText = document.getElementById('hub-text'), player = document.getElementById('live-player');
            if(isOnline) {
                hDot.classList.add('active'); hText.innerText = "LIVE"; hText.classList.add('active'); hubContainer.classList.add('is-live'); hubDot.classList.add('active'); hubText.innerText = "STREAMING NOW";
                player.src = `https://player.twitch.tv/?channel=${TWITCH_CHANNEL}&parent=${host}&autoplay=true&muted=true`;
            } else {
                hDot.classList.remove('active'); hText.innerText = "OFFLINE"; hText.classList.remove('active'); hubContainer.classList.remove('is-live'); hubDot.classList.remove('active'); hubText.innerText = "OFFLINE NOW";
                player.src = `https://player.twitch.tv/?channel=${TWITCH_CHANNEL}&parent=${host}&video=&autoplay=false`;
            }
        }

        async function loadData() {
            try {
                // Fetch everything in one go
                const { data: clips, error: clipsError } = await sbClient.from('clips').select('*').order('created_at', { ascending: false });
                const { data: posts, error: postsError } = await sbClient.from('posts').select('*').order('created_at', { ascending: false });
                const { data: allLikes, error: likesError } = await sbClient.from('likes').select('clip_id, username');
                
                if (clipsError || postsError || likesError) {
                    console.error("Supabase Error:", clipsError || postsError || likesError);
                    return;
                }

                // Compile total counts mapping
                globalData.counts = {}; 
                if (allLikes) {
                    allLikes.forEach(l => { 
                        globalData.counts[l.clip_id] = (globalData.counts[l.clip_id] || 0) + 1; 
                    });
                }
                
                // Set likes specific to the current user
                if (currentUser) {
                    globalData.likes = allLikes 
                        .filter(l => l.username === currentUser)
                        .map(l => l.clip_id);
                } else {
                    globalData.likes = [];
                }
                
                globalData.clips = clips || []; 
                globalData.posts = posts || []; 
                render();
            } catch (err) {
                console.error("Critical Load Error:", err);
            }
        }

        function render() {
            const f = document.getElementById('feed-content'); f.innerHTML = '';
            document.getElementById('live-container').style.display = (currentTab === 'home') ? 'block' : 'none';

            if (currentTab === 'community') {
                f.innerHTML = `<div class="card"><textarea id="p-text" class="input-box" style="height:60px;resize:none;" placeholder="Say something..."></textarea><button class="input-box" style="background:var(--primary);font-weight:700;margin-bottom:0;border:none;" onclick="submitPost()">Post</button></div>`;
                globalData.posts.forEach(p => { f.innerHTML += `<div class="card"><div style="display:flex;align-items:center;"><div class="avatar-ring">${p.author?p.author[0].toUpperCase():'?'}</div><div style="font-weight:600;font-size:14px;">${p.author}</div></div><div style="margin-top:10px;font-size:14px;">${p.text}</div></div>`; });
            } else if (currentTab === 'clips') {
                const likedOnes = globalData.clips.filter(c => globalData.likes.includes(c.id));
                if(likedOnes.length === 0) f.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-muted);">No liked clips yet!</div>`;
                else likedOnes.forEach(c => renderCard(f, c, true));
            } else { 
                globalData.clips.forEach(c => renderCard(f, c, false)); 
            }
        }

        function renderCard(target, c, forceLoad) {
            const isLiked = globalData.likes.includes(c.id), count = globalData.counts[c.id] || 0;
            const host = window.location.hostname || "localhost";
            const src = `https://clips.twitch.tv/embed?clip=${c.id}&parent=${host}&autoplay=false`;
            
            const iframeTag = forceLoad 
                ? `<iframe src="${src}" class="loaded"></iframe>` 
                : `<iframe data-src="${src}" loading="lazy" onload="this.classList.add('loaded')"></iframe>`;

            target.innerHTML += `
                <div class="card">
                    <div style="display:flex;align-items:center;margin-bottom:10px;">
                        <div class="avatar-ring">${c.added_by?c.added_by[0].toUpperCase():'M'}</div>
                        <div style="font-weight:600;font-size:14px;">${c.added_by||'CodeMiko'}</div>
                    </div>
                    <div class="video-container">
                        ${iframeTag}
                    </div>
                    <div class="card-actions">
                        <div class="action-btn ${isLiked?'liked':''}" onclick="toggleLike('${c.id}')">
                            <span class="material-symbols-rounded">favorite</span> ${count}
                        </div>
                    </div>
                </div>`;
        }

        async function toggleLike(id) {
            if (!currentUser) { openModal('login'); return; }
            const index = globalData.likes.indexOf(id);
            if (index > -1) {
                globalData.likes.splice(index, 1); 
                globalData.counts[id] = Math.max(0, (globalData.counts[id] || 1) - 1);
                await sbClient.from('likes').delete().eq('username', currentUser).eq('clip_id', id);
            } else {
                globalData.likes.push(id); 
                globalData.counts[id] = (globalData.counts[id] || 0) + 1;
                await sbClient.from('likes').insert([{ username: currentUser, clip_id: id }]);
            }
            render();
        }

        function setupSwipe(pid, mkey) {
            const p = document.getElementById(pid); let startY = 0, currentY = 0;
            p.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; p.style.transition = 'none'; }, {passive: true});
            p.addEventListener('touchmove', (e) => { currentY = e.touches[0].clientY - startY; if (currentY > 0) p.style.transform = `translateY(${currentY}px)`; }, {passive: true});
            p.addEventListener('touchend', () => { p.style.transition = 'transform 0.3s cubic-bezier(0.1, 0.5, 0.1, 1)'; if (currentY > 120) closeModal(mkey); else p.style.transform = 'translateY(0)'; currentY = 0; });
        }

        async function handleLogin() { const n = document.getElementById('login-nick').value.trim(); if (n) { localStorage.setItem('miko_user', n); location.reload(); } }
        function logout() { localStorage.removeItem('miko_user'); location.reload(); }
        function openModal(id) { 
            if(id==='login' && currentUser) { document.getElementById('login-form').style.display='none'; document.getElementById('profile-form').style.display='block'; document.getElementById('display-name').innerText=currentUser; }
            document.getElementById(id+'-modal').style.display='flex'; setTimeout(()=>document.getElementById(id+'-panel').style.transform='translateY(0)',10); 
        }
        function closeModal(id) { document.getElementById(id+'-panel').style.transform='translateY(100%)'; setTimeout(()=>document.getElementById(id+'-modal').style.display='none',300); }
        function switchTab(t) { currentTab=t; document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active')); document.getElementById('nav-'+t).classList.add('active'); render(); }
        function handleUploadClick() { if(!currentUser) openModal('login'); else openModal('add'); }
        async function submitPost() { const t = document.getElementById('p-text').value.trim(); if(t && currentUser) { await sbClient.from('posts').insert([{ author: currentUser, text: t }]); loadData(); } }
        async function submitClip() { const u = document.getElementById('clip-url').value.trim(); if(u.includes('twitch.tv')) { const id = u.split('/').pop().split('?')[0]; await sbClient.from('clips').insert([{ id, added_by: currentUser }]); closeModal('add'); loadData(); } }
        
        function handleScroll() {
            const iframes = document.querySelectorAll('iframe:not(#live-player)');
            const host = window.location.hostname || "localhost";
            iframes.forEach(iframe => {
                const rect = iframe.getBoundingClientRect();
                if (rect.top < window.innerHeight && rect.bottom > 0) {
                    if (iframe.getAttribute('data-src') && !iframe.src) {
                        iframe.src = iframe.getAttribute('data-src');
                    }
                    if (rect.top < window.innerHeight/2 && rect.bottom > window.innerHeight/2) {
                        if (currentPlayingIframe !== iframe) {
                            if(currentPlayingIframe) {
                                let oldSrc = currentPlayingIframe.src;
                                if (oldSrc.includes('autoplay=true')) currentPlayingIframe.src = oldSrc.replace('autoplay=true', 'autoplay=false');
                            }
                            let newSrc = iframe.src || iframe.getAttribute('data-src');
                            if (newSrc && !newSrc.includes('autoplay=true')) {
                                iframe.src = newSrc.replace('autoplay=false', 'autoplay=true') + "&muted=true";
                            }
                            currentPlayingIframe = iframe;
                        }
                    }
                }
            });
        }
        window.addEventListener('load', init);
    </script>
</body>
</html>
