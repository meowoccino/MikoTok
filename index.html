<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    
    <title>MikoTok</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@800;900&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    
    <link rel="stylesheet" href="./styles.css">
</head>
<body @click="isFilterMenuOpen = false">

    <div id="debug-error" style="display:none; position:fixed; z-index:999999; background:#111; color:#ff4444; font-family:monospace; font-size:14px; padding:20px; inset:0; overflow:auto;">
        <h3 style="color:white; margin-top:0;">⚠️ App Crashed! Error Log:</h3>
        <div id="error-text"></div>
        <p style="color:#a1a1aa; margin-top:20px; font-size:12px;">(Tell Gemini what this says so we can fix it!)</p>
    </div>

    <script>
        // This script catches background errors and prints them to the screen
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('debug-error').style.display = 'block';
            document.getElementById('error-text').innerHTML += '<p style="border-bottom:1px solid #333; padding-bottom:10px;"><strong>Error:</strong> ' + message + '<br><strong>File:</strong> ' + source + '<br><strong>Line:</strong> ' + lineno + '</p>';
        };
        window.addEventListener('unhandledrejection', function(event) {
            document.getElementById('debug-error').style.display = 'block';
            document.getElementById('error-text').innerHTML += '<p style="border-bottom:1px solid #333; padding-bottom:10px;"><strong>Promise Rejection:</strong> ' + (event.reason.message || event.reason) + '</p>';
        });
    </script>
    <div id="app-container" :class="{'glitch-theme': isGlitchTheme, 'ui-scuffed': uiScuffed}" v-cloak>
        
        <event-overlays 
            :is-cat-zooming="isCatZooming" 
            :show-lumen="showLumen" 
            :show-fake-ban="showFakeBan">
        </event-overlays>

        <toast-popup :toast="toast"></toast-popup>

        <splash-screen 
            :splash-visible="splashVisible" 
            :splash-opacity="splashOpacity" 
            :logo-svg="logoSvg">
        </splash-screen>

        <pull-to-refresh 
            :is-pulling="isPulling" 
            :refresh-transform="refreshTransform" 
            :is-refreshing="isRefreshing">
        </pull-to-refresh>

        <app-header 
            :is-header-visible="isHeaderVisible" 
            :current-tab="currentTab" 
            :is-live="isLive" 
            :logo-svg="logoSvg"
            @open-profile="modals.profile = true"
            @trigger-cat="triggerCatZoomies">
        </app-header>

        <div class="view-port" @touchstart="handlePullStart" @touchmove="handlePullMove" @touchend="handlePullEnd">
            
            <home-view
                :current-tab="currentTab"
                :is-refreshing="isRefreshing"
                :current-vod-index="currentVodIndex"
                :recent-vods="recentVods"
                :is-live="isLive"
                :active-feed-video="activeFeedVideo"
                :hostname="hostname"
                :clips="clips"
                :active-filter-label="activeFilterLabel"
                :optimize-twitch-img="optimizeTwitchImg"
                :format-views="formatViews"
                :format-date="formatDate"
                @scroll="handleScroll"
                @prev-vod="prevVod"
                @next-vod="nextVod"
                @open-filter="isFilterMenuOpen = true"
                @share-clip="shareClip">
            </home-view>

            <div class="chat-container" style="height: calc(100% - 85px); width: 100%;" v-if="currentTab === 'chat'">
                <iframe :src="'https://www.twitch.tv/embed/codemiko/chat?parent=' + hostname + '&darkpopout'" style="width: 100%; height: 100%; border: none;" loading="lazy"></iframe>
            </div>

            <feed-view
                :current-tab="currentTab"
                :is-refreshing="isRefreshing"
                :yt-feed="ytFeed"
                :yt-current-index="ytCurrentIndex"
                :reddit-feed="redditFeed"
                :reddit-current-index="redditCurrentIndex"
                :format-number="formatNumber"
                @prev-yt="prevYt"
                @next-yt="nextYt"
                @prev-reddit="prevReddit"
                @next-reddit="nextReddit">
            </feed-view>

            <gerald-view
                :current-tab="currentTab"
                :gerald-messages="geraldMessages"
                :is-gerald-typing="isGeraldTyping"
                :gerald-input="geraldInput"
                :show-emote-picker="showEmotePicker"
                :show-minigames="showMinigames"
                :custom-emotes="customEmotes"
                :parse-markdown="parseMarkdown"
                @close-pickers="closePickers"
                @insert-emote="insertEmote"
                @play-game="playMinigame"
                @toggle-emotes="toggleEmotes"
                @toggle-minigames="toggleMinigames"
                @update-input="e => geraldInput = e.target.value"
                @key-down="handleGeraldEnter"
                @send="talkToGerald">
            </gerald-view>

        </div>

        <filter-menu
            :is-open="isFilterMenuOpen"
            :current-filter="currentFilter"
            @close="isFilterMenuOpen = false"
            @apply="applyFilter">
        </filter-menu>

        <discord-modal
            :is-open="modals.discord"
            @close="modals.discord = false"
            @touch-start="handleModalTouchStart"
            @touch-move="handleModalTouchMove"
            @touch-end="handleModalTouchEnd">
        </discord-modal>

        <profile-modal
            :is-open="modals.profile"
            :current-user="currentUser"
            :login-email="loginEmail"
            :login-pass="loginPass"
            :api-config="apiConfig"
            :sync-state="syncState"
            :wipe-state="wipeState"
            :logout-state="logoutState"
            @close="modals.profile = false"
            @touch-start="handleModalTouchStart"
            @touch-move="handleModalTouchMove"
            @touch-end="handleModalTouchEnd"
            @update-email="e => loginEmail = e"
            @update-pass="e => loginPass = e"
            @login="handleLogin"
            @update-api="(k, v) => apiConfig[k] = v"
            @sync="runSync"
            @wipe="clearGeraldHistory"
            @logout="handleLogout">
        </profile-modal>

        <bottom-nav
            :current-tab="currentTab"
            @change-tab="tab => { currentTab = tab; isHeaderVisible = true; }"
            @open-discord="modals.discord = true">
        </bottom-nav>

    </div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').then(reg => {
            console.log('Service Worker registered successfully.');
          }).catch(err => {
            console.log('Service Worker registration failed:', err);
          });
        });
      }
    </script>

    <script type="module" src="./app.js"></script>
</body>
</html>
