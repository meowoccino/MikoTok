<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MikoTok</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    
    <style>
        :root { 
            --bg-color: #0b0b0e; 
            --card-bg: #141419;
            --primary: #9146FF; 
            --primary-light: #a970ff;
            --text-main: #ffffff;
            --text-muted: #a0a0ab;
            --border-color: #26262c;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-color); color: var(--text-main); overflow: hidden; }

        /* --- SPLASH SCREEN & AUTH --- */
        #splash-screen {
            position: fixed; inset: 0; background: #0b0b0e; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; transition: opacity 0.5s ease;
        }
        .logo-text { font-size: 42px; font-weight: 700; letter-spacing: -1px; }
        .logo-miko { color: white; }
        .logo-tok { color: var(--primary-light); }
        .progress-bar { width: 150px; height: 4px; background: #222; border-radius: 4px; margin-top: 40px; overflow: hidden; position: relative; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: var(--primary); border-radius: 4px; animation: load 1.5s infinite ease-in-out; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }

        #auth-screen { position: fixed; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1500; text-align: center; }
        .login-btn { background: var(--primary); color: white; padding: 14px 32px; border-radius: 100px; font-weight: 600; text-decoration: none; margin-top: 20px; font-size: 16px; }

        /* --- TOP APP BAR --- */
        .app-header {
            position: fixed; top: 0; left: 0; width: 100%; background: var(--bg-color); z-index: 100;
            padding: 45px 20px 10px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid var(--border-color);
        }
        .header-logo { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }

        /* --- MAIN FEED --- */
        #feed { height: 100vh; width: 100vw; overflow-y: auto; padding: 110px 15px 90px; }
        #feed::-webkit-scrollbar { display: none; }

        /* --- CARD STYLING --- */
        .card { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03); }
        
        .card-header { display: flex; align-items: center; margin-bottom: 12px; }
        .card-avatar { width: 36px; height: 36px; border-radius: 50%; margin-right: 12px; object-fit: cover; }
        .card-meta { flex: 1; }
        .meta-added { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
        .meta-name { font-size: 14px; font-weight: 600; color: var(--primary-light); }
        .meta-time { font-size: 12px; color: var(--text-muted); }

        .video-container { position: relative; width: 100%; border-radius: 10px; overflow: hidden; background: #000; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .play-btn { position: absolute; width: 50px; height: 50px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; backdrop-filter: blur(4px); pointer-events: none; }
        .play-btn .material-symbols-rounded { font-size: 32px; font-variation-settings: 'FILL' 1; }
        .duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); color: white; font-size: 11px; padding: 3px 6px; border-radius: 4px; font-weight: 500; pointer-events: none; }

        .card-info { margin-top: 12px; }
        .clip-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
        .clip-link { font-size: 13px; color: var(--primary-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .clip-link .material-symbols-rounded { font-size: 14px; }

        .card-actions { display: flex; align-items: center; gap: 20px; margin-top: 15px; }
        .action-item { display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; font-weight: 500; cursor: pointer; }
        .action-item .material-symbols-rounded { font-size: 20px; }
        .action-item.liked { color: var(--primary-light); }
        .action-item.liked .material-symbols-rounded { font-variation-settings: 'FILL' 1; }

        /* --- BOTTOM NAVIGATION + FAB --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-color); border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; align-items: center; padding: 10px 20px 25px; z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 10px; font-weight: 500; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--primary-light); }
        .nav-item .material-symbols-rounded { font-size: 26px; }
        
        .nav-fab {
            width: 48px; height: 48px; border-radius: 50%; background: var(--primary-light);
            display: flex; align-items: center; justify-content: center; color: white; cursor: pointer;
            box-shadow: 0 4px 15px rgba(169, 112, 255, 0.4); transform: translateY(-10px);
        }
        .nav-fab .material-symbols-rounded { font-size: 28px; }

        #toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 14px; z-index: 9999; display: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-text"><span class="logo-miko">Miko</span><span class="logo-tok">Tok</span></div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <div id="auth-screen" style="display: none;">
        <div class="logo-text" style="margin-bottom: 10px;"><span class="logo-miko">Miko</span><span class="logo-tok">Tok</span></div>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Connect your Twitch account to view clips.</p>
        <a id="login-url" href="#" class="login-btn">Connect Twitch</a>
    </div>

    <div class="app-header">
        <div class="header-logo"><span class="logo-miko">Miko</span><span class="logo-tok">Tok</span></div>
    </div>

    <div id="toast"></div>
    
    <div id="feed"></div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="scrollToTop()"><span class="material-symbols-rounded">home</span>Home</div>
        
        <div class="nav-fab" onclick="showToast('Upload feature coming soon!')"><span class="material-symbols-rounded">add</span></div>
        
        <div class="nav-item" onclick="scrollToTop()"><span class="material-symbols-rounded">smart_display</span>Clips</div>
    </div>

    <script>
        const CLIENT_ID = '3jj626mx59nwnepdlw2ezlwupu5yzt';
        let redirectUri = window.location.origin + window.location.pathname;
        let streamerProfilePic = 'https://static-cdn.jtvnw.net/jtv_user_pictures/210bde48-7cc7-44f2-a279-dcd541dd4ee1-profile_image-70x70.png';

        const params = new URLSearchParams(window.location.hash.substring(1));
        const token = params.get('access_token');

        if (!token) {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('login-url').href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=`;
        } else {
            window.history.replaceState({}, document.title, window.location.pathname);
            loadLiveClips(token);
        }

        async function loadLiveClips(accessToken) {
            try {
                const userResponse = await fetch(`https://api.twitch.tv/helix/users?login=codemiko`, {
                    headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}` }
                });
                const userData = await userResponse.json();
                
                if (!userData.data || userData.data.length === 0) throw new Error("Channel not found");
                
                const exactMikoId = userData.data[0].id;
                streamerProfilePic = userData.data[0].profile_image_url;

                const clipResponse = await fetch(`https://api.twitch.tv/helix/clips?broadcaster_id=${exactMikoId}&first=20`, {
                    headers: { 'Client-ID': CLIENT_ID, 'Authorization': `Bearer ${accessToken}`, 'Accept-Language': 'en-US' }
                });
                
                const clipData = await clipResponse.json();

                if (clipData.data && clipData.data.length > 0) {
                    renderFeed(clipData.data);
                } else {
                    showToast("No clips available.");
                }
            } catch (err) {
                console.error(err);
                showToast("Error loading clips.");
            } finally {
                setTimeout(() => {
                    document.getElementById('splash-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500);
                }, 800);
            }
        }

        function renderFeed(clips) {
            const feedContainer = document.getElementById('feed');
            
            clips.forEach((clip, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const rawMp4Url = clip.thumbnail_url.replace(/-preview-.*\.jpg/, '.mp4');
                const isLiked = localStorage.getItem(`like_${clip.id}`) === 'true';
                const baseLikes = Math.floor(Math.random() * 50) + 10; 
                const displayLikes = isLiked ? baseLikes + 1 : baseLikes;
                const likedClass = isLiked ? 'liked' : '';
                
                const dateObj = new Date(clip.created_at);
                const dateString = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                card.innerHTML = `
                    <div class="card-header">
                        <img src="${streamerProfilePic}" class="card-avatar" alt="Miko">
                        <div class="card-meta">
                            <div class="meta-added">Added by</div>
                            <div class="meta-name">CodeMiko</div>
                        </div>
                        <div class="meta-time">${dateString}</div>
                    </div>

                    <div class="video-container" onclick="togglePlay(this)">
                        <video src="${rawMp4Url}" poster="${clip.thumbnail_url}" loop playsinline preload="metadata"></video>
                        <div class="play-btn"><span class="material-symbols-rounded">play_arrow</span></div>
                        <div class="duration">${Math.floor(clip.duration)}s</div>
                    </div>

                    <div class="card-info">
                        <div class="clip-title">${clip.title}</div>
                        <div class="clip-link" onclick="shareClip('${clip.url}')">
                            <span class="material-symbols-rounded">link</span> Watch on Twitch
                        </div>
                    </div>

                    <div class="card-actions">
                        <div class="action-item like-btn ${likedClass}" data-id="${clip.id}" data-base="${baseLikes}">
                            <span class="material-symbols-rounded">favorite</span>
                            <span class="like-count">${displayLikes}</span>
                        </div>
                        <div class="action-item" onclick="shareClip('${clip.url}')">
                            <span class="material-symbols-rounded">share</span> Share
                        </div>
                    </div>
                `;
                feedContainer.appendChild(card);
            });

            attachLikeListeners();
        }

        window.togglePlay = function(container) {
            const video = container.querySelector('video');
            const playBtn = container.querySelector('.play-btn');
            
            if (video.paused) {
                video.play();
                playBtn.style.display = 'none';
            } else {
                video.pause();
                playBtn.style.display = 'flex';
            }
        };

        function attachLikeListeners() {
            const likeButtons = document.querySelectorAll('.like-btn');
            likeButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const clipId = this.getAttribute('data-id');
                    const baseLikes = parseInt(this.getAttribute('data-base'));
                    const countText = this.querySelector('.like-count');

                    if (this.classList.contains('liked')) {
                        this.classList.remove('liked');
                        localStorage.setItem(`like_${clipId}`, 'false');
                        countText.innerText = baseLikes;
                    } else {
                        this.classList.add('liked');
                        localStorage.setItem(`like_${clipId}`, 'true');
                        countText.innerText = baseLikes + 1;
                    }
                });
            });
        }

        function shareClip(url) {
            if (navigator.share) {
                navigator.share({ title: 'CodeMiko Clip', url: url });
            } else {
                navigator.clipboard.writeText(url);
                showToast("Link copied!");
            }
        }

        function scrollToTop() {
            document.getElementById('feed').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2500);
        }
    </script>
</body>
</html>
