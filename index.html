<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MikoTok</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Permanent+Marker&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    
    <style>
        :root { 
            --bg-color: #0b0b0e; 
            --card-bg: #141419;
            --primary: #9146FF; 
            --primary-light: #a970ff;
            --text-main: #ffffff;
            --text-muted: #a0a0ab;
            --border-color: #26262c;
            --danger: #ff4d4d;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #000; color: var(--text-main); overflow: hidden; 
            display: flex; justify-content: center;
        }

        #app-container {
            width: 100%; max-width: 480px; height: 100%; position: relative;
            background: var(--bg-color); overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* STYLIZED MIKOTOK LOGO */
        .cyber-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            filter: drop-shadow(0 0 10px var(--primary));
            user-select: none;
        }
        .cyber-miko {
            font-family: 'Permanent Marker', cursive;
            font-size: 32px;
            color: #fff;
            transform: rotate(-2deg);
            text-shadow: 2px 2px 0px var(--primary);
        }
        .cyber-tok {
            font-family: 'Permanent Marker', cursive;
            font-size: 40px;
            color: #b06fff;
            transform: skewX(-5deg);
            text-shadow: 2px 2px 0px #4a008a;
            margin-left: -5px;
        }

        #splash-screen {
            position: absolute; inset: 0; background: #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 2000; transition: opacity 0.5s ease;
        }
        .splash-logo .cyber-miko { font-size: 52px; }
        .splash-logo .cyber-tok { font-size: 65px; }

        .progress-bar { width: 150px; height: 4px; background: #222; border-radius: 4px; margin-top: 40px; overflow: hidden; position: relative; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: var(--primary); border-radius: 4px; animation: load 1.5s infinite ease-in-out; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }

        .app-header {
            position: absolute; top: 0; left: 0; width: 100%; background: var(--bg-color); z-index: 100;
            padding: 50px 20px 10px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid var(--border-color);
        }

        #feed { height: 100%; width: 100%; overflow-y: auto; padding: 130px 15px 90px; }
        #feed::-webkit-scrollbar { display: none; }

        .card { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.03); position: relative; }
        .card-header { display: flex; align-items: center; margin-bottom: 12px; }
        .card-avatar { width: 38px; height: 38px; border-radius: 50%; margin-right: 12px; border: 2px solid rgba(145, 70, 255, 0.5); }
        .meta-name { font-size: 14px; font-weight: 600; color: white; }
        .admin-del { position: absolute; top: 12px; right: 12px; color: var(--danger); cursor: pointer; z-index: 10; display: none; }

        .video-container { position: relative; width: 100%; border-radius: 10px; overflow: hidden; background: #000; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }
        iframe { width: 100%; height: 100%; border: none; }

        .clip-title { font-size: 15px; font-weight: 600; margin: 12px 0 4px; }
        .post-text { font-size: 15px; line-height: 1.5; color: #e0e0e0; margin-top: 8px; white-space: pre-wrap; }

        .card-actions { display: flex; align-items: center; gap: 20px; margin-top: 15px; }
        .action-item { display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; cursor: pointer; }
        .action-item.liked { color: var(--primary-light); }
        .action-item.liked span { font-variation-settings: 'FILL' 1; }

        .bottom-nav {
            position: absolute; bottom: 0; left: 0; width: 100%; background: var(--bg-color); border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; padding: 10px 10px 25px; z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 60px; color: var(--text-muted); font-size: 10px; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--primary-light); }
        
        /* M-LENS UPLOAD BUTTON */
        .nav-fab {
            width: 58px; height: 58px; border-radius: 50%;
            background: #1a1a20;
            display: flex; align-items: center; justify-content: center; transform: translateY(-15px);
            border: 2px solid #333; box-shadow: 0 0 15px rgba(145, 70, 255, 0.4);
            position: relative; overflow: hidden;
        }
        .fab-glow { position: absolute; inset: 0; background: radial-gradient(circle, rgba(145, 70, 255, 0.3) 0%, transparent 70%); }
        .fab-m { font-family: 'Permanent Marker', cursive; font-size: 24px; color: #fff; z-index: 2; text-shadow: 0 0 10px var(--primary-light); }

        /* MODALS */
        #login-modal, #add-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; display: none; flex-direction: column; justify-content: flex-end; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); border-radius: 20px 20px 0 0; padding: 25px 20px 40px; transform: translateY(100%); transition: transform 0.3s; border-top: 1px solid var(--border-color); }
        .input-wrapper { position: relative; width: 100%; margin-bottom: 12px; }
        .input-box { width: 100%; background: #1c1c22; border: 1px solid var(--border-color); color: white; padding: 12px; border-radius: 8px; outline: none; }
        .input-box-pass { padding-right: 45px; }
        .toggle-pass { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; font-size: 20px; }
        .btn-post { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        #toast { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; z-index: 9999; display: none; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; color: var(--text-muted); text-align: center; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="splash-screen">
            <div class="cyber-logo splash-logo">
                <div class="cyber-miko">Miko</div>
                <div class="cyber-tok">Tok</div>
            </div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>

        <div class="app-header">
            <div class="cyber-logo">
                <div class="cyber-miko">Miko</div>
                <div class="cyber-tok">Tok</div>
            </div>
        </div>

        <div id="toast"></div>
        <div id="feed"></div>

        <div id="login-modal">
            <div class="modal-content" id="login-panel">
                <div style="font-size:18px; font-weight:700; color:white; margin-bottom:15px; text-align:center;">Login / Registration</div>
                <div class="input-wrapper"><input type="text" id="login-nick" class="input-box" placeholder="Nickname"></div>
                <div class="input-wrapper">
                    <input type="password" id="login-pass" class="input-box input-box-pass" placeholder="Password">
                    <span class="material-symbols-rounded toggle-pass" onclick="togglePassword()">visibility</span>
                </div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button style="flex:1; background:#222; color:white; border:none; border-radius:8px;" onclick="closeLogin()">Cancel</button>
                    <button class="btn-post" style="flex:1;" onclick="handleLogin()">Login</button>
                </div>
            </div>
        </div>

        <div id="add-modal">
            <div class="modal-content" id="modal-panel">
                <div style="font-size:18px; font-weight:700; color:white; margin-bottom:20px; text-align:center;">Add a New Clip</div>
                <input type="text" id="clip-title" class="input-box" placeholder="Clip Title">
                <input type="url" id="clip-url" class="input-box" placeholder="Twitch Clip URL">
                <div style="display:flex; gap:10px;">
                    <button style="flex:1; background:#222; color:white; border:none; border-radius:8px;" onclick="closeModal()">Cancel</button>
                    <button class="btn-post" style="flex:1;" onclick="submitClip()">Upload</button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" id="nav-home" onclick="switchTab('home')"><span class="material-symbols-rounded">home</span>Home</div>
            <div class="nav-item" id="nav-community" onclick="switchTab('community')"><span class="material-symbols-rounded">forum</span>Community</div>
            <div class="nav-fab" onclick="openModal()"><div class="fab-glow"></div><div class="fab-m">M</div></div>
            <div class="nav-item" id="nav-clips" onclick="switchTab('clips')"><span class="material-symbols-rounded">favorite</span>Favorites</div>
            <div class="nav-item" id="nav-login" onclick="openLogin()"><span class="material-symbols-rounded">account_circle</span><span id="login-text">Login</span></div>
        </div>
    </div>

    <script>
        const BIN_ID = '6a026ec4c0954111d80cc1f9'; 
        const MASTER_KEY = '$2a$10$kP1lbR4aymd6Gv5PkLUHVeum37M4wDDyIc1nCHT5pWK8DeJ5xkSke';
        const ADMIN_USER = 'admin';
        const ADMIN_PASS = '9ruwuF'; 
        
        const parentDomain = window.location.hostname;
        let currentTab = 'home';
        let isAdmin = false;
        let currentUser = localStorage.getItem('miko_user') || null;
        let globalData = { clips: [], posts: [], users: [] };

        function generateAvatar(name) {
            const char = name ? name.charAt(0).toUpperCase() : 'M';
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><linearGradient id="neonG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00f3ff"/><stop offset="100%" stop-color="#9146FF"/></linearGradient></defs><circle cx="50" cy="50" r="48" fill="#141419" stroke="url(#neonG)" stroke-width="4"/><text x="50" y="68" font-family="Arial" font-size="50" font-weight="900" fill="url(#neonG)" text-anchor="middle" style="text-shadow: 0 0 8px rgba(145,70,255,0.6);">${char}</text></svg>`;
            return `data:image/svg+xml;base64,${btoa(svg)}`;
        }

        async function loadData() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': MASTER_KEY, 'X-Bin-Meta': 'false' }});
                globalData = await res.json();
                if(!globalData.users) globalData.users = [];
                if(currentUser) document.getElementById('login-text').innerText = currentUser;
                render();
            } catch (e) { showToast("Cloud Error"); }
            finally { setTimeout(() => { document.getElementById('splash-screen').style.opacity = '0'; setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500); }, 1500); }
        }

        async function sync() { await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY }, body: JSON.stringify(globalData) }); }

        function openLogin() { document.getElementById('login-modal').style.display='flex'; setTimeout(()=>document.getElementById('login-panel').style.transform='translateY(0)', 10); }
        function closeLogin() { document.getElementById('login-panel').style.transform='translateY(100%)'; setTimeout(()=>document.getElementById('login-modal').style.display='none', 300); }

        function togglePassword() {
            const passInput = document.getElementById('login-pass');
            const icon = document.querySelector('.toggle-pass');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                passInput.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        async function handleLogin() {
            const nick = document.getElementById('login-nick').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            if(!nick || !pass) { showToast("Enter Nickname & Password!"); return; }
            if(nick === ADMIN_USER && pass === ADMIN_PASS) { isAdmin = true; currentUser = "Admin"; showToast("Admin Mode!"); closeLogin(); render(); return; }
            const existingUser = globalData.users.find(u => u.nick.toLowerCase() === nick.toLowerCase());
            if (existingUser) {
                if (existingUser.pass === pass) {
                    currentUser = existingUser.nick;
                    localStorage.setItem('miko_user', currentUser);
                    document.getElementById('login-text').innerText = currentUser;
                    showToast("Welcome, " + currentUser);
                    closeLogin(); render();
                } else { showToast("Nickname taken/Wrong pass!"); }
            } else {
                globalData.users.push({ nick: nick, pass: pass });
                currentUser = nick;
                localStorage.setItem('miko_user', nick);
                document.getElementById('login-text').innerText = nick;
                showToast("Nickname registered!");
                await sync(); closeLogin(); render();
            }
        }

        async function deleteItem(type, id) {
            if (!confirm("Confirm Delete?")) return;
            if (type === 'clip') globalData.clips = globalData.clips.filter(c => c.id !== id);
            else globalData.posts = globalData.posts.filter(p => p.id !== id);
            await sync(); render();
        }

        function switchTab(t) {
            currentTab = t;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${t}`).classList.add('active');
            render();
        }

        function render() {
            const f = document.getElementById('feed'); f.innerHTML = '';
            if (currentTab === 'community') renderCommunity(f);
            else {
                let items = globalData.clips || [];
                if (currentTab === 'clips') items = items.filter(i => (i.likedBy || []).includes(currentUser));
                renderClips(f, items);
            }
        }

        function renderClips(f, items) {
            if (!items.length) { f.innerHTML = '<div class="empty-state"><h2>Feed is empty</h2></div>'; return; }
            items.forEach(c => {
                const div = document.createElement('div'); div.className = 'card';
                const hasLiked = (c.likedBy || []).includes(currentUser);
                div.innerHTML = `
                    ${isAdmin ? `<div class="admin-del" style="display:block" onclick="deleteItem('clip', '${c.id}')"><span class="material-symbols-rounded">delete</span></div>` : ''}
                    <div class="card-header"><img src="${generateAvatar(c.addedBy)}" class="card-avatar"><div class="meta-name">${c.addedBy}</div></div>
                    <div class="video-container"><iframe src="https://clips.twitch.tv/embed?clip=${c.id}&parent=${parentDomain}&autoplay=false"></iframe></div>
                    <div class="clip-title">${c.title}</div>
                    <div class="card-actions">
                        <div class="action-item ${hasLiked?'liked':''}" onclick="toggleLike('clip', '${c.id}')">
                            <span class="material-symbols-rounded">favorite</span> ${(c.likedBy || []).length}
                        </div>
                    </div>`;
                f.appendChild(div);
            });
        }

        function renderCommunity(f) {
            const box = document.createElement('div'); box.className = 'card';
            box.innerHTML = `<textarea id="p-text" class="input-box" style="height:60px" placeholder="Discuss..."></textarea><button class="btn-post" onclick="submitPost()">Post</button>`;
            f.appendChild(box);
            (globalData.posts || []).forEach(p => {
                const div = document.createElement('div'); div.className = 'card';
                const hasLiked = (p.likedBy || []).includes(currentUser);
                div.innerHTML = `
                    ${isAdmin ? `<div class="admin-del" style="display:block" onclick="deleteItem('post', ${p.id})"><span class="material-symbols-rounded">delete</span></div>` : ''}
                    <div class="card-header"><img src="${generateAvatar(p.author)}" class="card-avatar"><div class="meta-name">${p.author}</div></div>
                    <div class="post-text">${p.text}</div>
                    <div class="card-actions">
                        <div class="action-item ${hasLiked?'liked':''}" onclick="toggleLike('post', '${p.id}')">
                            <span class="material-symbols-rounded">favorite</span> ${(p.likedBy || []).length}
                        </div>
                    </div>`;
                f.appendChild(div);
            });
        }

        async function toggleLike(type, id) {
            if(!currentUser) { showToast("Login to like!"); openLogin(); return; }
            const list = type === 'clip' ? globalData.clips : globalData.posts;
            const item = list.find(i => i.id.toString() === id.toString());
            if(!item.likedBy) item.likedBy = [];
            if (item.likedBy.includes(currentUser)) item.likedBy = item.likedBy.filter(u => u !== currentUser);
            else item.likedBy.push(currentUser);
            render(); await sync();
        }

        async function submitClip() {
            if(!currentUser) { showToast("Login first!"); openLogin(); return; }
            const url = document.getElementById('clip-url').value;
            if (!url.includes('twitch')) return;
            const id = url.split('/').pop().split('?')[0];
            globalData.clips.unshift({ id, title: document.getElementById('clip-title').value || 'Clip', addedBy: currentUser, likedBy: [] });
            closeModal(); await sync(); render();
        }

        async function submitPost() {
            if(!currentUser) { showToast("Login first!"); openLogin(); return; }
            const text = document.getElementById('p-text').value; if (!text) return;
            globalData.posts.unshift({ id: Date.now(), author: currentUser, text, likedBy: [] });
            await sync(); render();
        }

        function openModal() { document.getElementById('add-modal').style.display='flex'; setTimeout(()=>document.getElementById('modal-panel').style.transform='translateY(0)', 10); }
        function closeModal() { document.getElementById('modal-panel').style.transform='translateY(100%)'; setTimeout(()=>document.getElementById('add-modal').style.display='none', 300); }
        function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }

        loadData();
    </script>
</body>
</html>
