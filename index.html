<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MikoTok</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    
    <style>
        :root { 
            --bg-color: #0b0b0e; 
            --card-bg: #141419;
            --primary: #9146FF; 
            --primary-light: #a970ff;
            --neon-pink: #ff007f;
            --neon-cyan: #00f3ff;
            --text-main: #ffffff;
            --text-muted: #a0a0ab;
            --border-color: #26262c;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #000; color: var(--text-main); overflow: hidden; 
            display: flex; justify-content: center;
        }

        #app-container {
            width: 100%; max-width: 480px; height: 100%; position: relative;
            background: var(--bg-color); overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* SPLASH SCREEN & LOGO COLORS */
        #splash-screen {
            position: absolute; inset: 0; background: #0b0b0e; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 2000; transition: opacity 0.5s ease;
        }
        .logo-text { font-size: 42px; font-weight: 700; letter-spacing: -1px; }
        .header-logo { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .logo-miko { color: white; }
        .logo-tok { color: var(--primary-light); }
        
        .progress-bar { width: 150px; height: 4px; background: #222; border-radius: 4px; margin-top: 40px; overflow: hidden; position: relative; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: var(--primary); border-radius: 4px; animation: load 1.5s infinite ease-in-out; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }

        /* TOP APP BAR */
        .app-header {
            position: absolute; top: 0; left: 0; width: 100%; background: var(--bg-color); z-index: 100;
            padding: 45px 20px 15px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid var(--border-color);
        }

        /* MAIN FEED */
        #feed { height: 100%; width: 100%; overflow-y: auto; padding: 110px 15px 90px; }
        #feed::-webkit-scrollbar { display: none; }

        /* EMPTY STATE */
        .empty-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 50vh; text-align: center; color: var(--text-muted); padding: 0 30px;
        }
        .empty-state .material-symbols-rounded { font-size: 64px; color: #222; margin-bottom: 15px; }
        .empty-state h2 { font-size: 18px; color: white; margin: 0 0 8px 0; }
        .empty-state p { font-size: 14px; margin: 0; line-height: 1.5; }

        /* CARD STYLING */
        .card { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03); }
        .card-header { display: flex; align-items: center; margin-bottom: 12px; }
        .card-avatar { width: 36px; height: 36px; border-radius: 50%; margin-right: 12px; object-fit: cover; background: #111; box-shadow: 0 0 8px rgba(145, 70, 255, 0.4); }
        .card-meta { flex: 1; }
        .meta-added { font-size: 14px; font-weight: 600; color: white; }
        .meta-time { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        /* IFRAME VIDEO CONTAINER */
        .video-container { position: relative; width: 100%; border-radius: 10px; overflow: hidden; background: #000; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }
        iframe { width: 100%; height: 100%; border: none; }

        .card-info { margin-top: 12px; }
        .clip-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
        .clip-link { font-size: 13px; color: var(--primary-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; cursor: pointer; text-decoration: none; }
        .clip-link .material-symbols-rounded { font-size: 14px; }
        
        .post-text { font-size: 15px; line-height: 1.5; color: #e0e0e0; margin-top: 8px; white-space: pre-wrap; }

        .card-actions { display: flex; align-items: center; gap: 20px; margin-top: 15px; }
        .action-item { display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; font-weight: 500; cursor: pointer; }
        .action-item .material-symbols-rounded { font-size: 20px; transition: color 0.2s, transform 0.2s; }
        .action-item.liked { color: var(--primary-light); }
        .action-item.liked .material-symbols-rounded { font-variation-settings: 'FILL' 1; text-shadow: 0 0 10px var(--primary-light); }

        /* BOTTOM NAVIGATION (5 Items) */
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; width: 100%; background: var(--bg-color); border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; padding: 10px 10px 25px; z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 60px; color: var(--text-muted); font-size: 10px; font-weight: 500; gap: 4px; cursor: pointer; transition: color 0.2s; }
        .nav-item.active { color: var(--primary-light); }
        .nav-item .material-symbols-rounded { font-size: 24px; }
        
        /* RESTORED MIKOTOK CAMERA M-BUTTON */
        .nav-fab {
            width: 60px; height: 44px; border-radius: 12px; 
            background: linear-gradient(135deg, #a970ff, #9146FF);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 6px 20px rgba(145, 70, 255, 0.4); transform: translateY(-12px); transition: transform 0.2s;
            border: 2px solid rgba(255,255,255,0.15); flex-shrink: 0; margin: 0 5px; position: relative;
        }
        .nav-fab:active { transform: translateY(-8px) scale(0.95); }
        .fab-camera-top {
            position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
            width: 24px; height: 10px; background: #a970ff; border-radius: 6px 6px 0 0;
            border-top: 2px solid rgba(255,255,255,0.15); border-left: 2px solid rgba(255,255,255,0.15); border-right: 2px solid rgba(255,255,255,0.15);
            z-index: 1;
        }
        .fab-lens {
            width: 26px; height: 26px; border: 3px solid white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; z-index: 2;
            background: radial-gradient(circle, #9146FF, #7020e8);
        }
        .fab-lens span { color: white; font-weight: 900; font-size: 13px; font-family: 'Inter', sans-serif; }
        .fab-flash {
            position: absolute; top: 8px; right: 10px; width: 5px; height: 5px; background: white; border-radius: 50%; z-index: 2;
        }

        /* INPUTS & MODALS */
        .post-input-box { width: 100%; background: #1c1c22; border: 1px solid var(--border-color); color: white; padding: 12px 15px; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; margin-bottom: 10px; }
        .post-input-box:focus { border-color: var(--primary); }
        .post-textarea { height: 80px; resize: none; }
        .btn-post { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: background 0.2s; }
        .btn-post:active { background: var(--primary-light); }

        #add-modal {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500;
            display: none; flex-direction: column; justify-content: flex-end; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--card-bg); border-top-left-radius: 20px; border-top-right-radius: 20px;
            padding: 25px 20px 40px; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-top: 1px solid var(--border-color);
        }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; text-align: center; color: white; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 25px; }
        .btn-cancel { flex: 1; background: #222; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; }

        #toast { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 14px; z-index: 9999; display: none; white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="splash-screen">
            <div class="logo-text"><span class="logo-miko">Miko</span><span class="logo-tok">Tok</span></div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>

        <div class="app-header">
            <div class="header-logo"><span class="logo-miko">Miko</span><span class="logo-tok">Tok</span></div>
        </div>

        <div id="toast"></div>
        
        <div id="feed"></div>

        <div id="add-modal">
            <div class="modal-content" id="modal-panel">
                <div class="modal-title">Add a New Clip</div>
                
                <div class="input-group">
                    <label>Added by (Your Name)</label>
                    <input type="text" id="input-name" class="post-input-box" placeholder="e.g. Kitsu" autocomplete="off">
                </div>

                <div class="input-group">
                    <label>Clip Title</label>
                    <input type="text" id="input-title" class="post-input-box" placeholder="e.g. Insane 1v3 Clutch!" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label>Twitch Clip URL</label>
                    <input type="url" id="input-url" class="post-input-box" placeholder="https://clips.twitch.tv/..." autocomplete="off">
                </div>
                
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button class="btn-post" onclick="submitClip()">Add Clip</button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" id="nav-home" onclick="switchTab('home')">
                <span class="material-symbols-rounded">home</span>Home
            </div>
            
            <div class="nav-item" id="nav-community" onclick="switchTab('community')">
                <span class="material-symbols-rounded">forum</span>Community
            </div>
            
            <div class="nav-fab" onclick="openModal()">
                <div class="fab-camera-top"></div>
                <div class="fab-lens">
                    <span>M</span>
                </div>
                <div class="fab-flash"></div>
            </div>
            
            <div class="nav-item" id="nav-clips" onclick="switchTab('clips')">
                <span class="material-symbols-rounded">favorite</span>Favorites
            </div>
            
            <div class="nav-item" id="nav-login" onclick="showToast('DEEZ NUTS')">
                <span class="material-symbols-rounded">login</span>Login
            </div>
        </div>
    </div>

    <script>
        const parentDomain = window.location.hostname || 'localhost';
        const STORAGE_KEY_CLIPS = 'mikoTok_clips_v4';
        const STORAGE_KEY_POSTS = 'mikoTok_posts_v1';
        const LIKES_KEY_PREFIX = 'like_v4_';

        let currentTab = 'home';

        function generateNeonAvatar(name) {
            const initial = name ? name.charAt(0).toUpperCase() : 'M';
            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00f3ff"/>
                            <stop offset="50%" stop-color="#9146FF"/>
                            <stop offset="100%" stop-color="#ff007f"/>
                        </linearGradient>
                    </defs>
                    <rect width="100" height="100" fill="#111" rx="50"/>
                    <circle cx="50" cy="50" r="46" fill="none" stroke="url(#grad)" stroke-width="4"/>
                    <text x="50" y="66" font-family="Arial" font-size="46" font-weight="bold" fill="url(#grad)" text-anchor="middle">${initial}</text>
                </svg>
            `;
            return `data:image/svg+xml;base64,${btoa(svg)}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                loadContent();
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500);
            }, 1200);
        });

        function switchTab(tabName) {
            currentTab = tabName;
            
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-community').classList.remove('active');
            document.getElementById('nav-clips').classList.remove('active');
            
            if (tabName === 'home') document.getElementById('nav-home').classList.add('active');
            if (tabName === 'community') document.getElementById('nav-community').classList.add('active');
            if (tabName === 'clips') document.getElementById('nav-clips').classList.add('active');

            loadContent();
            scrollToTop();
        }

        function loadContent() {
            if (currentTab === 'community') {
                renderCommunity();
            } else {
                let savedClips = JSON.parse(localStorage.getItem(STORAGE_KEY_CLIPS)) || [];
                if (currentTab === 'clips') {
                    savedClips = savedClips.filter(clip => localStorage.getItem(`${LIKES_KEY_PREFIX}${clip.id}`) === 'true');
                }
                renderClips(savedClips);
            }
        }

        // --- CLIPS RENDERER ---
        function renderClips(clips) {
            const feedContainer = document.getElementById('feed');
            feedContainer.innerHTML = ''; 
            
            if (clips.length === 0) {
                if (currentTab === 'home') {
                    feedContainer.innerHTML = `
                        <div class="empty-state">
                            <span class="material-symbols-rounded">videocam_off</span>
                            <h2>No clips yet!</h2>
                            <p>Your feed is completely fresh. Tap the central Camera button to add a Twitch clip.</p>
                        </div>
                    `;
                } else if (currentTab === 'clips') {
                    feedContainer.innerHTML = `
                        <div class="empty-state">
                            <span class="material-symbols-rounded">heart_broken</span>
                            <h2>No favorites yet!</h2>
                            <p>Go back to Home and tap the heart icon on a video to save it to your Favorites.</p>
                        </div>
                    `;
                }
                return;
            }
            
            clips.forEach((clip) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const isLiked = localStorage.getItem(`${LIKES_KEY_PREFIX}${clip.id}`) === 'true';
                const displayLikes = isLiked ? 1 : 0;
                const likedClass = isLiked ? 'liked' : '';
                
                const avatarSrc = generateNeonAvatar(clip.addedBy);
                const embedUrl = `https://clips.twitch.tv/embed?clip=${clip.id}&parent=${parentDomain}&autoplay=false&muted=false`;

                card.innerHTML = `
                    <div class="card-header">
                        <img src="${avatarSrc}" class="card-avatar" alt="Avatar">
                        <div class="card-meta">
                            <div class="meta-added">${clip.addedBy}</div>
                            <div class="meta-time">Just now</div>
                        </div>
                    </div>

                    <div class="video-container">
                        <iframe src="${embedUrl}" allowfullscreen="true" scrolling="no"></iframe>
                    </div>

                    <div class="card-info">
                        <div class="clip-title">${clip.title}</div>
                        <a href="${clip.url}" target="_blank" class="clip-link">
                            <span class="material-symbols-rounded">link</span> Watch on Twitch
                        </a>
                    </div>

                    <div class="card-actions">
                        <div class="action-item like-btn ${likedClass}" data-id="${clip.id}">
                            <span class="material-symbols-rounded">favorite</span>
                            <span class="like-count">${displayLikes}</span>
                        </div>
                        <div class="action-item" onclick="shareLink('${clip.url}')">
                            <span class="material-symbols-rounded">share</span> Share
                        </div>
                    </div>
                `;
                feedContainer.appendChild(card);
            });

            attachLikeListeners();
        }

        // --- COMMUNITY RENDERER ---
        function renderCommunity() {
            const feedContainer = document.getElementById('feed');
            feedContainer.innerHTML = ''; 

            // Add the Create Post Box
            const createBox = document.createElement('div');
            createBox.className = 'card';
            createBox.innerHTML = `
                <div style="font-size:16px; font-weight:700; color:white; margin-bottom:12px;">Create a Post</div>
                <input type="text" id="post-name" class="post-input-box" placeholder="Your Name" autocomplete="off">
                <textarea id="post-text" class="post-input-box post-textarea" placeholder="What's on your mind?"></textarea>
                <button class="btn-post" onclick="submitPost()">Post to Community</button>
            `;
            feedContainer.appendChild(createBox);

            // Load and display posts
            let savedPosts = JSON.parse(localStorage.getItem(STORAGE_KEY_POSTS)) || [];

            if (savedPosts.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.style.height = '30vh';
                empty.innerHTML = `
                    <span class="material-symbols-rounded">forum</span>
                    <h2>It's quiet here...</h2>
                    <p>Be the first to say hello!</p>
                `;
                feedContainer.appendChild(empty);
                return;
            }

            savedPosts.forEach((post) => {
                const card = document.createElement('div');
                card.className = 'card';
                const avatarSrc = generateNeonAvatar(post.author);
                
                // Use a unique ID structure for posts to avoid crossing over with clip likes
                const postDataId = `post_${post.id}`;
                const isLiked = localStorage.getItem(`${LIKES_KEY_PREFIX}${postDataId}`) === 'true';
                const displayLikes = isLiked ? 1 : 0;
                const likedClass = isLiked ? 'liked' : '';

                card.innerHTML = `
                    <div class="card-header">
                        <img src="${avatarSrc}" class="card-avatar" alt="Avatar">
                        <div class="card-meta">
                            <div class="meta-added">${post.author}</div>
                            <div class="meta-time">${post.time}</div>
                        </div>
                    </div>
                    <div class="card-info" style="margin-top:0;">
                        <div class="post-text">${post.text}</div>
                    </div>
                    <div class="card-actions">
                        <div class="action-item like-btn ${likedClass}" data-id="${postDataId}">
                            <span class="material-symbols-rounded">favorite</span>
                            <span class="like-count">${displayLikes}</span>
                        </div>
                    </div>
                `;
                feedContainer.appendChild(card);
            });
            
            // Attach the like button logic to the new community post buttons!
            attachLikeListeners();
        }

        function submitPost() {
            const nameInput = document.getElementById('post-name').value.trim() || 'Anonymous';
            const textInput = document.getElementById('post-text').value.trim();

            if (!textInput) {
                showToast("Post cannot be empty!");
                return;
            }

            const newPost = {
                id: Date.now().toString(),
                author: nameInput,
                text: textInput,
                time: 'Just now'
            };

            let savedPosts = JSON.parse(localStorage.getItem(STORAGE_KEY_POSTS)) || [];
            savedPosts.unshift(newPost);
            localStorage.setItem(STORAGE_KEY_POSTS, JSON.stringify(savedPosts));

            showToast("Posted to community!");
            renderCommunity(); // Reload community feed
        }

        // --- CLIP ADDING MODAL ---
        function openModal() {
            const modal = document.getElementById('add-modal');
            const panel = document.getElementById('modal-panel');
            modal.style.display = 'flex';
            setTimeout(() => { panel.style.transform = 'translateY(0)'; }, 10);
        }

        function closeModal() {
            const panel = document.getElementById('modal-panel');
            panel.style.transform = 'translateY(100%)';
            setTimeout(() => { document.getElementById('add-modal').style.display = 'none'; }, 300);
            
            document.getElementById('input-name').value = '';
            document.getElementById('input-title').value = '';
            document.getElementById('input-url').value = '';
        }

        function submitClip() {
            const nameInput = document.getElementById('input-name').value.trim() || 'Anonymous';
            const titleInput = document.getElementById('input-title').value.trim() || `${nameInput}'s Clip`;
            const urlInput = document.getElementById('input-url').value.trim();

            if (!urlInput.includes('twitch.tv')) {
                showToast("Please enter a valid Twitch clip URL!");
                return;
            }

            let clipId = urlInput.split('/').pop().split('?')[0];

            const newClip = {
                id: clipId,
                title: titleInput, 
                url: urlInput,
                addedBy: nameInput
            };

            let savedClips = JSON.parse(localStorage.getItem(STORAGE_KEY_CLIPS)) || [];
            if (!savedClips.some(c => c.id === newClip.id)) {
                savedClips.unshift(newClip); 
                localStorage.setItem(STORAGE_KEY_CLIPS, JSON.stringify(savedClips));
            }

            closeModal();
            switchTab('home'); // Go to home to see the clip
            showToast("Clip added successfully!");
        }

        // --- INTERACTIONS ---
        function attachLikeListeners() {
            const likeButtons = document.querySelectorAll('.like-btn');
            likeButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-id');
                    const countText = this.querySelector('.like-count');

                    if (this.classList.contains('liked')) {
                        this.classList.remove('liked');
                        localStorage.setItem(`${LIKES_KEY_PREFIX}${id}`, 'false');
                        countText.innerText = '0';
                        
                        this.querySelector('.material-symbols-rounded').style.transform = 'scale(0.8)';
                        setTimeout(() => this.querySelector('.material-symbols-rounded').style.transform = 'scale(1)', 150);

                        if (currentTab === 'clips') {
                            setTimeout(() => loadContent(), 200); 
                        }
                    } else {
                        this.classList.add('liked');
                        localStorage.setItem(`${LIKES_KEY_PREFIX}${id}`, 'true');
                        countText.innerText = '1';
                        
                        this.querySelector('.material-symbols-rounded').style.transform = 'scale(1.3)';
                        setTimeout(() => this.querySelector('.material-symbols-rounded').style.transform = 'scale(1)', 150);
                    }
                });
            });
        }

        function shareLink(url) {
            if (navigator.share) {
                navigator.share({ title: 'MikoTok Shared Link', url: url });
            } else {
                navigator.clipboard.writeText(url);
                showToast("Link copied!");
            }
        }

        function scrollToTop() {
            document.getElementById('feed').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
