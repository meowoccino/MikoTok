<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>MikoTok</title>

<link
  href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
  rel="stylesheet"
/>

<style>
:root{
  --purple:#9146FF;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Roboto,sans-serif;
  color:white;
}

#feed{
  width:100vw;
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
  scroll-behavior:smooth;
}

.video-card{
  width:100vw;
  height:100vh;
  position:relative;
  scroll-snap-align:start;
  background:#000;
  overflow:hidden;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

.overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:20px;
  pointer-events:none;
  background:linear-gradient(
    0deg,
    rgba(0,0,0,.8) 0%,
    rgba(0,0,0,.2) 30%,
    transparent 60%
  );
}

.top-title{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
  padding:50px 20px 20px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  letter-spacing:1px;
  color:var(--purple);
  background:linear-gradient(
    180deg,
    rgba(0,0,0,.8),
    transparent
  );
  pointer-events:none;
}

.sidebar{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:24px;
  pointer-events:auto;
}

.btn{
  text-align:center;
  cursor:pointer;
}

.icon{
  font-size:38px;
  display:block;
}

.text{
  font-size:13px;
  font-weight:bold;
}

.like-btn.liked .icon{
  color:var(--purple);
  font-variation-settings:'FILL' 1;
}

.username{
  font-weight:700;
  font-size:18px;
}

.clip-title{
  margin-top:6px;
  font-size:14px;
  opacity:.92;
  max-width:85%;
}

.loading{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:5000;
  background:#000;
  font-size:18px;
}

.toast{
  position:fixed;
  top:100px;
  left:50%;
  transform:translateX(-50%);
  background:var(--purple);
  padding:12px 18px;
  border-radius:10px;
  font-weight:700;
  z-index:9999;
  display:none;
}

.error{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:30px;
  background:#000;
  z-index:9999;
  line-height:1.6;
}
</style>
</head>

<body>

<div class="top-title">MikoTok</div>

<div class="loading" id="loading">
Loading clips...
</div>

<div class="toast" id="toast"></div>

<div id="feed"></div>

<script>
/*
========================================
IMPORTANT
========================================

You NEED a backend endpoint.

Because Twitch API requires a token.

Simplest option:
- Cloudflare Worker
- Netlify Function
- Vercel Function

This frontend expects:
GET /api/clips

Returning:
[
  {
    id,
    url,
    embed_url,
    title,
    creator_name,
    view_count,
    thumbnail_url
  }
]

========================================
*/

const feed = document.getElementById("feed");
const loading = document.getElementById("loading");

async function loadClips() {

  try {

    // CHANGE THIS
    const response = await fetch("./clips.json");

    if(!response.ok){
      throw new Error("Failed to fetch clips");
    }

    const clips = await response.json();

    renderClips(clips);

    loading.style.display = "none";

  } catch(err){

    console.error(err);

    loading.innerHTML = `
      Failed loading clips.<br><br>
      Your backend/api is probably dead.<br>
      Modern web development. A carnival of misery.
    `;
  }
}

function renderClips(clips){

  const parentDomain = window.location.hostname;

  clips.forEach((clip,index)=>{

    const card = document.createElement("div");
    card.className = "video-card";

    const liked =
      localStorage.getItem("liked_" + clip.id) === "true";

    const likes =
      formatViews(clip.view_count);

    card.innerHTML = `

      <iframe
        src="https://clips.twitch.tv/embed?clip=${clip.id}&parent=${parentDomain}&autoplay=true"
        allowfullscreen="true">
      </iframe>

      <div class="overlay">

        <div class="sidebar">

          <div class="btn like-btn ${liked ? "liked" : ""}"
            data-id="${clip.id}">

            <span class="icon material-symbols-rounded">
              favorite
            </span>

            <span class="text">${likes}</span>

          </div>

          <div class="btn share-btn"
            data-url="${clip.url}">

            <span class="icon material-symbols-rounded">
              share
            </span>

            <span class="text">
              Share
            </span>

          </div>

        </div>

        <div class="username">
          @CodeMiko
        </div>

        <div class="clip-title">
          ${escapeHtml(clip.title)}
        </div>

      </div>
    `;

    feed.appendChild(card);
  });

  setupLikes();
  setupShares();
}

function setupLikes(){

  document.querySelectorAll(".like-btn")
    .forEach(btn=>{

      btn.addEventListener("click",()=>{

        const id = btn.dataset.id;

        btn.classList.toggle("liked");

        localStorage.setItem(
          "liked_" + id,
          btn.classList.contains("liked")
        );
      });
    });
}

function setupShares(){

  document.querySelectorAll(".share-btn")
    .forEach(btn=>{

      btn.addEventListener("click", async ()=>{

        const url = btn.dataset.url;

        try{

          if(navigator.share){

            await navigator.share({
              title:"MikoTok",
              url
            });

          } else {

            await navigator.clipboard.writeText(url);

            showToast("Copied link");
          }

        } catch(e){}
      });
    });
}

function formatViews(v){

  if(v >= 1000000){
    return (v/1000000).toFixed(1)+"M";
  }

  if(v >= 1000){
    return (v/1000).toFixed(1)+"K";
  }

  return v;
}

function showToast(msg){

  const toast =
    document.getElementById("toast");

  toast.innerText = msg;

  toast.style.display = "block";

  setTimeout(()=>{
    toast.style.display = "none";
  },2000);
}

function escapeHtml(text){

  const div = document.createElement("div");

  div.innerText = text;

  return div.innerHTML;
}

loadClips();
</script>

</body>
</html>
<button onclick="callWorker()">Call</button>

<script>
async function callWorker() {
  const res = await fetch("https://mikotok-api.m-cihra.workers.dev.");
  const text = await res.text();
  console.log(text);
}
</script>
