<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    
    <title>MikoTok v2</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@800;900&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    
    <link rel="stylesheet" href="./styles.css?v=85">
    
    <style>
        [v-cloak] > *:not(#splash-screen) { display: none !important; }
        [v-cloak] #splash-screen { display: flex !important; opacity: 1 !important; }

        @keyframes spin-anim { 100% { transform: rotate(360deg); } }
        @keyframes shake-anim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
        @keyframes pulse-glow { 0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 50% { transform: scale(1.3); opacity: 0.5; box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } }

        .spin-anim { animation: spin-anim 1s linear infinite !important; display: inline-block; }
        .shake-anim { animation: shake-anim 0.4s ease-in-out infinite !important; display: inline-block; }
        .pulse-glow { animation: pulse-glow 2.5s infinite !important; }

        .safe-top-padding { padding-top: max(env(safe-area-inset-top, 24px), 24px); }
    </style>
</head>
<body>
    <div id="app-container" v-cloak :class="['theme-' + appTheme, {'gerald-theme': currentTab === 'gerald'}]" @click="closeFilterMenu">
        
        <splash-screen 
            :splash-visible="splashVisible" 
            :splash-opacity="splashOpacity" 
            :logo-svg="logoSvg">
        </splash-screen>

        <app-header 
            :is-header-visible="isHeaderVisible" 
            :current-tab="currentTab" 
            :logo-svg="logoSvg"
            :app-theme="appTheme"
            @open-profile="modals.profile = true"
            @toggle-theme="toggleTheme">
        </app-header>

        <div class="view-port" @touchstart="handleSwipeStart" @touchend="handleSwipeEnd">
            <div class="tab-slider" :style="{ transform: 'translate3d(' + tabOffset + '%, 0, 0)' }">
                
                <div class="tab-view scroll-area home-scroll" id="home-scroll" @scroll="handleScroll">
                    <home-view
                        :current-tab="currentTab"
                        :current-vod-index="currentVodIndex"
                        :recent-vods="recentVods"
                        :is-live="isLive"
                        :hostname="hostname"
                        :clips="clips"
                        :active-filter-label="activeFilterLabel"
                        :optimize-twitch-img="optimizeTwitchImg"
                        :format-views="formatViews"
                        :format-date="formatDate"
                        :active-clip-id="activeClipId"
                        @prev-vod="prevVod"
                        @next-vod="nextVod"
                        @open-filter="isFilterMenuOpen = true"
                        @play-clip="playClip">
                    </home-view>
                </div>

                <div class="tab-view">
                    <chat-view
                        :current-tab="currentTab"
                        :chat-messages="chatMessages"
                        :is-logged-in="!!twitchChatToken"
                        :twitch-auth-url="twitchAuthUrl"
                        :custom-emotes="customEmotes"
                        :twitch-username="twitchUsername"
                        @send-chat="sendTwitchChatMessage"
                        @insert-chat-emote="insertEmote"
                        @disconnect-public-twitch="disconnectTwitch"
                        @close-login-popup="showLoginPopup = false">
                    </chat-view>
                </div>

                <div class="tab-view">
                    <gerald-view
                        :current-tab="currentTab"
                        :gerald-messages="geraldMessages"
                        :is-gerald-typing="isGeraldTyping"
                        :gerald-input="geraldInput"
                        :show-emote-picker="showEmotePicker"
                        :show-minigames="showMinigames"
                        :custom-emotes="customEmotes"
                        :parse-markdown="parseMarkdown"
                        :gemini-status="geminiStatus"
                        :sys-stats="sysStats"
                        @close-pickers="closePickers"
                        @insert-emote="insertEmote"
                        @play-game="triggerAiMinigame"
                        @toggle-emotes="toggleEmotes"
                        @toggle-minigames="toggleMinigames"
                        @update-input="e => geraldInput = e"
                        @key-down="handleGeraldEnter"
                        @send="talkToGerald">
                    </gerald-view>
                </div>

                <div class="tab-view scroll-area more-scroll" style="display: flex; flex-direction: column;">
                    <more-view></more-view>
                </div>

            </div>
        </div>

        <filter-menu
            :is-open="isFilterMenuOpen"
            :current-filter="currentFilter"
            @close="isFilterMenuOpen = false"
            @apply="applyFilter">
        </filter-menu>

        <clip-modal
            :clip="selectedClip"
            :hostname="hostname"
            @close="selectedClip = null">
        </clip-modal>

        <profile-modal
            :is-open="modals.profile"
            :current-user="currentUser"
            :login-email="loginEmail"
            :login-pass="loginPass"
            :api-config="apiConfig"
            :sync-state="syncState"
            :wipe-state="wipeState"
            :nuke-state="nukeState"
            :logout-state="logoutState"
            :save-state="saveState"
            @close="modals.profile = false"
            @touch-start="handleModalTouchStart"
            @touch-move="handleModalTouchMove"
            @touch-end="handleModalTouchEnd"
            @update-email="e => loginEmail = e"
            @update-pass="e => loginPass = e"
            @login="handleLogin"
            @save-keys="saveApiKeys"
            @sync="runSync"
            @wipe="clearGeraldHistory"
            @logout="handleLogout"
            @nuke-cache="nukeCache">
        </profile-modal>

        <bottom-nav
            :current-tab="currentTab"
            @change-tab="switchTab">
        </bottom-nav>

    </div>

    <script src="./app.js?v=116"></script>
</body>
</html>
