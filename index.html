<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#9146FF">
    <title>MikoTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
        :root { --bg-color: #0b0b0e; --card-bg: #18181b; --primary: #9146FF; --primary-light: #a970ff; --text-main: #ffffff; --text-muted: #adadb8; --border-color: #2f2f35; --danger: #ff4d4d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #1a0b2e; color: var(--text-main); overflow: hidden; display: flex; justify-content: center; }
        
        #app-container { width: 100%; max-width: 480px; height: 100%; position: relative; background: radial-gradient(circle at top, #1a0b2e 0%, #000 100%); overflow: hidden; }

        /* RESTORED ORIGINAL SPLASH SCREEN */
        #splash-screen { position: absolute; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease; }
        #splash-icon { width: 100px; height: 100px; margin-bottom: 15px; }
        .progress-bar { width: 120px; height: 3px; background: #2f2f35; border-radius: 4px; margin-top: 20px; overflow: hidden; position: relative; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: linear-gradient(90deg, transparent 0%, var(--primary) 50%, transparent 100%); animation: load 1.5s infinite ease-in-out; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }

        /* TRIPLE THREAT HEADER */
        .app-header { 
            position: absolute; top: 0; left: 0; width: 100%; z-index: 100; 
            padding: 45px 20px 15px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(26, 11, 46, 0.7); backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(145, 70, 255, 0.1); 
        }
        .header-icon { color: var(--text-muted); font-size: 24px; width: 40px; display: flex; justify-content: center; }
        .live-dot { width: 8px; height: 8px; background: #444; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .simple-logo { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 800; }
        .text-part2 { color: var(--primary); text-shadow: 0 0 12px rgba(145, 70, 255, 0.4); }

        #feed { height: 100%; width: 100%; overflow-y: auto; padding: 115px 15px 100px; scroll-behavior: smooth; }
        #feed::-webkit-scrollbar { display: none; }
        .card { background: var(--card-bg); border-radius: 18px; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .video-container { width: 100%; border-radius: 12px; overflow: hidden; background: #000; aspect-ratio: 16/9; border: 1px solid var(--border-color); }
        iframe { width: 100%; height: 100%; border: none; }
        
        .locked-view { text-align: center; padding-top: 80px; color: var(--text-muted); opacity: 0.6; }
        .locked-view span { font-size: 56px; margin-bottom: 15px; display: block; color: var(--primary-light); }

        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(11, 11, 14, 0.85); backdrop-filter: blur(25px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 12px 20px 28px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 60px; color: var(--text-muted); font-size: 10px; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--primary-light); }
        .nav-item.active span { text-shadow: 0 0 20px var(--primary-light); font-variation-settings: 'FILL' 1; }
        .nav-fab { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .nav-fab.logged-in svg { filter: drop-shadow(0 0 8px var(--primary)); }

        #login-modal, #add-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; display: none; flex-direction: column; justify-content: flex-end; backdrop-filter: blur(8px); }
        .modal-content { background: var(--card-bg); border-radius: 28px 28px 0 0; padding: 25px 20px 50px; transform: translateY(100%); transition: transform 0.4s; }
        .input-box { width: 100%; background: #0e0e10; border: 1px solid var(--border-color); color: white; padding: 14px; border-radius: 10px; outline: none; margin-bottom: 12px; }
        #toast { position: absolute; top: 110px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 24px; border-radius: 12px; z-index: 9999; display: none; text-align: center; }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- ORIGINAL SPLASH -->
        <div id="splash-screen">
            <div id="splash-icon"></div>
            <div class="simple-logo"><span>Miko</span><span class="text-part2">Tok</span></div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>

        <div class="app-header">
            <div class="header-icon"><span class="material-symbols-rounded">menu</span></div>
            <div class="simple-logo"><span>Miko</span><span class="text-part2">Tok</span></div>
            <div class="header-icon"><div class="live-dot"></div><span style="font-size:10px;font-weight:700;">LIVE</span></div>
        </div>

        <div id="toast"></div>
        <div id="feed" onscroll="handleScroll()"><div id="feed-content"></div></div>

        <div id="login-modal"><div class="modal-content" id="login-panel">
            <div id="login-form">
                <input type="text" id="login-nick" class="input-box" placeholder="Username">
                <input type="password" id="login-pass" class="input-box" placeholder="Minimum 6 characters">
                <button class="input-box" id="login-btn" style="background:var(--primary); font-weight:700;" onclick="handleLogin()">Sign In / Register</button>
            </div>
            <div id="profile-form" style="display:none; text-align:center;">
                <h3 id="display-name" style="margin-bottom:10px;"></h3>
                <div id="admin-tag" style="color:var(--primary-light); font-size:10px; font-weight:800; margin-bottom:15px; display:none;">SYSTEM ADMIN</div>
                <button class="input-box" style="background:var(--danger); font-weight:700;" onclick="logout()">Logout</button>
            </div>
            <button class="input-box" style="background:transparent; border:none; color:var(--text-muted);" onclick="closeModal('login')">Dismiss</button>
        </div></div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('home')"><span class="material-symbols-rounded">home</span>Home</div>
            <div class="nav-item" onclick="switchTab('community')"><span class="material-symbols-rounded">forum</span>Feed</div>
            <div class="nav-fab" onclick="handleUploadClick()" id="upload-btn-container"></div>
            <div class="nav-item" onclick="switchTab('clips')"><span class="material-symbols-rounded">favorite</span>Liked</div>
            <div class="nav-item" onclick="openModal('login')"><span class="material-symbols-rounded">account_circle</span><span>Profile</span></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yhxcuayiwqpjvalyrcqv.supabase.co', SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloeGN1YXlpd3FwanZhbHlyY3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Nzk1ODEsImV4cCI6MjA5NDE1NTU4MX0.z7EDgqRz1OT25UdxtmeJxFvwx4UCwaPRwWWJuzd46kc';
        let sbClient = null, currentTab = 'home', currentUser = null, isAdmin = false, globalData = { clips: [], posts: [], users: [] };
        let likedIds = JSON.parse(localStorage.getItem('miko_likes') || '[]'), currentPlayingIframe = null;

        const getLogoSvg = (id) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" style="width:100%;height:100%"><defs><linearGradient id="grad-${id}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#9146FF"/></linearGradient></defs><circle cx="50" cy="50" r="40" fill="none" stroke="url(#grad-${id})" stroke-width="7"/><path d="M 33 38 L 48 62 L 62 38 L 62 55 Q 62 65 69 64" fill="none" stroke="url(#grad-${id})" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        document.getElementById('upload-btn-container').innerHTML = getLogoSvg('nav');
        document.getElementById('splash-icon').innerHTML = getLogoSvg('splash');

        async function init() {
            // SAFETY: Force splash hide after 4 seconds even if Supabase fails
            setTimeout(hideSplash, 4000);
            
            try {
                sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                const saved = localStorage.getItem('miko_user');
                if (saved) { currentUser = saved; isAdmin = (saved === 'tomato_24'); document.getElementById('upload-btn-container').classList.add('logged-in'); }
                await loadData();
            } catch (e) { console.error(e); hideSplash(); }
        }

        async function loadData() {
            const { data: clips } = await sbClient.from('clips').select('*').order('created_at', { ascending: false });
            globalData.clips = clips || [];
            render();
            // Original 2-second experience
            setTimeout(hideSplash, 2000);
        }

        function hideSplash() {
            const s = document.getElementById('splash-screen');
            if(s && s.style.display !== 'none') {
                s.style.opacity='0';
                setTimeout(() => { 
                    s.style.display='none'; 
                    // AUTO-PLAY FIX: Kickstart first video
                    const first = document.querySelector('iframe');
                    if(first) playVideo(first);
                }, 600);
            }
        }

        function playVideo(iframe) {
            if (currentPlayingIframe && currentPlayingIframe !== iframe) {
                currentPlayingIframe.src = currentPlayingIframe.getAttribute('data-src') + "&autoplay=false";
            }
            iframe.src = iframe.getAttribute('data-src') + "&autoplay=true&muted=false";
            currentPlayingIframe = iframe;
        }

        function handleScroll() {
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(iframe => {
                const rect = iframe.getBoundingClientRect();
                const inView = (rect.top >= 50 && rect.bottom <= window.innerHeight - 50);
                if (inView && currentPlayingIframe !== iframe) playVideo(iframe);
            });
        }

        function render() {
            const f = document.getElementById('feed-content'); f.innerHTML = '';
            if ((currentTab === 'community' || currentTab === 'clips') && !currentUser) {
                f.innerHTML = `<div class="locked-view"><span class="material-symbols-rounded">lock</span><p>Authentication required</p></div>`;
                return;
            }
            globalData.clips.forEach(c => {
                const isLiked = likedIds.includes(c.id);
                if(currentTab === 'clips' && !isLiked) return;
                f.innerHTML += `<div class="card"><div style="display:flex; align-items:center; margin-bottom:10px;"><div class="avatar-ring">M</div><div style="font-weight:600;">CodeMiko</div></div><div class="video-container"><iframe data-src="https://clips.twitch.tv/embed?clip=${c.id}&parent=${window.location.hostname}" title="Twitch Clip"></iframe></div></div>`;
            });
        }

        function openModal(id) { 
            if(id === 'login' && currentUser) { 
                document.getElementById('login-form').style.display='none'; document.getElementById('profile-form').style.display='block'; document.getElementById('display-name').innerText=currentUser;
                if(isAdmin) document.getElementById('admin-tag').style.display='block';
            } else { document.getElementById('login-form').style.display='block'; document.getElementById('profile-form').style.display='none'; }
            document.getElementById(id + '-modal').style.display = 'flex'; setTimeout(() => document.getElementById(id + '-panel').style.transform = 'translateY(0)', 10); 
        }
        function closeModal(id) { document.getElementById(id + '-panel').style.transform = 'translateY(100%)'; setTimeout(() => document.getElementById(id + '-modal').style.display = 'none', 300); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
        window.addEventListener('load', init);
    </script>
</body>
</html>
