<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MikoTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        :root { --bg-color: #000000; --card-bg: #111113; --primary: #9146FF; --text-main: #ffffff; --text-muted: #71717a; --border-color: #27272a; --danger: #ef4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-color); color: var(--text-main); overflow: hidden; }
        #app-container { width: 100%; max-width: 480px; height: 100vh; margin: 0 auto; position: relative; display: flex; flex-direction: column; }
        
        /* Fixed Scroll Fix */
        .content-area { flex: 1; overflow-y: auto; padding: 110px 12px 100px; -webkit-overflow-scrolling: touch; }
        .content-area::-webkit-scrollbar { display: none; }

        .app-header { position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: 50px 20px 15px; display: flex; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .gradient-text { background: linear-gradient(135deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Outfit', sans-serif; font-weight: 800; }
        
        .card { background: var(--card-bg); border-radius: 12px; padding: 14px; margin-bottom: 16px; border: 1px solid var(--border-color); }
        .clip-meta { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-muted); margin-top: 8px; }
        .view-count { display: flex; align-items: center; gap: 4px; color: var(--primary); font-weight: 600; }
        
        .thumbnail-wrapper { width: 100%; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; background: #000; position: relative; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .thumbnail-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; }

        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; padding: 10px 15px 30px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); font-size: 10px; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: #fff; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .input-box { width: 100%; background: #1c1c1e; border: 1px solid var(--border-color); color: white; padding: 14px; border-radius: 8px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div id="app-container" v-cloak>
        <header class="app-header">
            <div style="flex:1; text-align:center;"><span class="gradient-text" style="font-size:24px;">MikoTok</span></div>
        </header>

        <!-- Main Feed (Scrollable) -->
        <div class="content-area" v-if="currentTab === 'home'">
            <div class="card" v-for="clip in clips" :key="clip.id">
                <div style="display:flex; align-items:center; margin-bottom:10px;">
                    <img src="1000018850.png?v=2" style="width:32px; height:32px; border-radius:50%; border:1px solid var(--primary);">
                    <div style="margin-left:10px;">
                        <div style="font-weight:700; font-size:14px;">{{ clip.added_by }}</div>
                        <div style="font-size:10px; color:var(--text-muted);">{{ formatDate(clip.created_at) }}</div>
                    </div>
                </div>
                <div class="thumbnail-wrapper" @click="activeClip = clip">
                    <img :src="clip.thumbnail_url">
                    <div class="play-overlay"><span class="material-symbols-rounded" style="font-size:48px; color:#fff;">play_circle</span></div>
                </div>
                <div class="clip-meta">
                    <div class="view-count">
                        <span class="material-symbols-rounded" style="font-size:14px;">visibility</span>
                        {{ formatViews(clip.view_count) }} views
                    </div>
                    <div style="max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{ clip.title }}</div>
                </div>
            </div>
        </div>

        <!-- Community Feed -->
        <div class="content-area" v-if="currentTab === 'community'">
            <div class="card">
                <div style="display:flex; align-items:center; margin-bottom:12px;">
                    <img src="1000018850.png?v=2" style="width:32px; height:32px; border-radius:50%;">
                    <div style="margin-left:10px;"><div style="font-weight:700;">CodeMiko</div><div style="font-size:10px; color:var(--text-muted);">Just now</div></div>
                </div>
                <div style="font-size:14px;">Test text placeholder</div>
            </div>
            <div class="card" v-for="post in posts" :key="post.id">
                <div style="display:flex; align-items:center; margin-bottom:12px;">
                    <img src="1000018850.png?v=2" style="width:32px; height:32px; border-radius:50%;">
                    <div style="margin-left:10px;"><div style="font-weight:700;">{{ post.author }}</div><div style="font-size:10px; color:var(--text-muted);">{{ formatDate(post.created_at) }}</div></div>
                </div>
                <div style="font-size:14px;">{{ post.text }}</div>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item" :class="{active: currentTab === 'home'}" @click="currentTab = 'home'"><span class="material-symbols-rounded">home</span>Home</div>
            <div class="nav-item" :class="{active: currentTab === 'community'}" @click="currentTab = 'community'"><span class="material-symbols-rounded">forum</span>Feed</div>
            <div class="nav-item" @click="modals.profile = true"><span class="material-symbols-rounded">account_circle</span>Admin</div>
        </nav>

        <!-- Clip Player -->
        <div class="modal-overlay" :class="{ open: activeClip }" @click="activeClip = null">
            <div v-if="activeClip" style="width:100%; aspect-ratio:16/9; background:#000;">
                <iframe :src="'https://clips.twitch.tv/embed?clip=' + activeClip.id + '&parent=' + host + '&autoplay=true'" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Admin Modal -->
        <div class="modal-overlay" :class="{ open: modals.profile }" @click.self="modals.profile = false" style="align-items:flex-end;">
            <div style="background:#111113; width:100%; padding:30px 20px; border-radius:20px 20px 0 0;">
                <div v-if="!currentUser">
                    <input type="text" v-model="loginEmail" class="input-box" placeholder="Username">
                    <input type="password" v-model="loginPass" class="input-box" placeholder="Password">
                    <button class="input-box" style="background:var(--primary); font-weight:700;" @click="handleLogin">Sign In</button>
                </div>
                <div v-else>
                    <button class="input-box" style="background:var(--primary); font-weight:700;" @click="runSync" :disabled="isSyncing">Manual Sync (50 Clips)</button>
                    <button class="input-box" style="background:var(--danger);" @click="logout">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const sbClient = supabase.createClient('https://yhxcuayiwqpjvalyrcqv.supabase.co', 'sb_publishable_VyFcNARHblJg10qlC_O7Dg_coouXK92');

        createApp({
            setup() {
                const currentTab = ref('home'), clips = ref([]), posts = ref([]), activeClip = ref(null), modals = ref({profile: false}), isSyncing = ref(false), currentUser = ref(null), loginEmail = ref(''), loginPass = ref('');
                const host = window.location.hostname;

                const loadData = async () => {
                    const { data: c } = await sbClient.from('clips').select('*').order('created_at', { ascending: false });
                    const { data: p } = await sbClient.from('posts').select('*').order('created_at', { ascending: false });
                    clips.value = c || []; posts.value = p || [];
                };

                const runSync = async () => {
                    isSyncing.value = true;
                    try {
                        const cid = 'gp762nuuoqcoxypju8c569th9wz7q5', tkn = localStorage.getItem('twitch_access_token');
                        const uR = await fetch('https://api.twitch.tv/helix/users?login=codemiko', { headers: {'Client-Id': cid, 'Authorization': `Bearer ${tkn}`} });
                        const uD = await uR.json();
                        const cR = await fetch(`https://api.twitch.tv/helix/clips?broadcaster_id=${uD.data[0].id}&first=50`, { headers: {'Client-Id': cid, 'Authorization': `Bearer ${tkn}`} });
                        const cD = await cR.json();
                        const ins = cD.data.map(x => ({ id: x.id, thumbnail_url: x.thumbnail_url, title: x.title, view_count: x.view_count, created_at: x.created_at, added_by: 'CodeMiko' }));
                        await sbClient.from('clips').upsert(ins);
                        loadData(); alert("Sync Success!");
                    } catch (e) { alert("Sync Error. Check Token."); } finally { isSyncing.value = false; }
                };

                const handleLogin = async () => {
                    const email = loginEmail.value.includes('@') ? loginEmail.value : `${loginEmail.value}@mikotok.com`;
                    const { data, error } = await sbClient.auth.signInWithPassword({ email, password: loginPass.value });
                    if (error) alert(error.message); else location.reload();
                };

                onMounted(async () => {
                    const { data: { session } } = await sbClient.auth.getSession();
                    currentUser.value = session?.user.id || null;
                    loadData();
                });

                return { currentTab, clips, posts, activeClip, modals, isSyncing, currentUser, loginEmail, loginPass, host, runSync, handleLogin, logout: () => { sbClient.auth.signOut(); location.reload(); }, formatDate: (d) => new Date(d).toLocaleDateString([], {month:'short', day:'numeric'}), formatViews: (v) => v?.toLocaleString() };
            }
        }).mount('#app-container');
    </script>
</body>
</html>
