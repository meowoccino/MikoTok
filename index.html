<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MikoTok</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    
    <style>
        :root { 
            --bg-color: #0b0b0e; 
            --card-bg: #141419;
            --primary: #9146FF; 
            --primary-light: #a970ff;
            --neon-cyan: #00f3ff;
            --text-main: #ffffff;
            --text-muted: #a0a0ab;
            --border-color: #26262c;
            --danger: #ff4d4d;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #000; color: var(--text-main); overflow: hidden; 
            display: flex; justify-content: center;
        }

        #app-container {
            width: 100%; max-width: 480px; height: 100%; position: relative;
            background: var(--bg-color); overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* NEON LOGO */
        .logo-text { font-weight: 700; letter-spacing: -1.5px; font-style: italic; }
        .logo-miko { color: white; text-shadow: 0 0 10px rgba(255,255,255,0.4), 0 0 20px rgba(0,243,255,0.2); }
        .logo-tok { color: var(--primary-light); font-weight: 800; text-shadow: 0 0 10px var(--primary), 0 0 20px rgba(145, 70, 255, 0.5); }

        /* SPLASH */
        #splash-screen {
            position: absolute; inset: 0; background: #0b0b0e; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 2000; transition: opacity 0.5s ease;
        }
        .splash-logo { font-size: 52px; animation: neonPulse 2s infinite ease-in-out; }
        @keyframes neonPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.85; transform: scale(0.98); } }

        .progress-bar { width: 150px; height: 4px; background: #222; border-radius: 4px; margin-top: 40px; overflow: hidden; position: relative; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: var(--primary); border-radius: 4px; animation: load 1.5s infinite ease-in-out; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }

        /* HEADER */
        .app-header {
            position: absolute; top: 0; left: 0; width: 100%; background: var(--bg-color); z-index: 100;
            padding: 45px 20px 15px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid var(--border-color);
        }
        .header-logo { font-size: 28px; }

        #feed { height: 100%; width: 100%; overflow-y: auto; padding: 110px 15px 90px; }
        #feed::-webkit-scrollbar { display: none; }

        /* CARDS */
        .card { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03); position: relative; }
        .card-header { display: flex; align-items: center; margin-bottom: 12px; }
        
        /* NEW NEON INITIAL AVATAR */
        .card-avatar { 
            width: 38px; height: 38px; border-radius: 50%; margin-right: 12px; 
            border: 2px solid rgba(145, 70, 255, 0.5);
            box-shadow: 0 0 10px rgba(145, 70, 255, 0.2);
        }
        
        .meta-name { font-size: 14px; font-weight: 600; color: white; }
        .admin-del { position: absolute; top: 12px; right: 12px; color: var(--danger); cursor: pointer; z-index: 10; display: none; }

        .video-container { position: relative; width: 100%; border-radius: 10px; overflow: hidden; background: #000; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }
        iframe { width: 100%; height: 100%; border: none; }

        .clip-title { font-size: 15px; font-weight: 600; margin: 12px 0 4px; }
        .post-text { font-size: 15px; line-height: 1.5; color: #e0e0e0; margin-top: 8px; white-space: pre-wrap; }

        .card-actions { display: flex; align-items: center; gap: 20px; margin-top: 15px; }
        .action-item { display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; cursor: pointer; transition: 0.2s; }
        .action-item.liked { color: var(--primary-light); }
        .action-item.liked span { font-variation-settings: 'FILL' 1; }

        /* NAV */
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; width: 100%; background: var(--bg-color); border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; padding: 10px 10px 25px; z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 60px; color: var(--text-muted); font-size: 10px; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--primary-light); }
        
        .nav-fab {
            width: 60px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, #a970ff, #9146FF);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transform: translateY(-12px);
            border: 2px solid rgba(255,255,255,0.15); position: relative;
        }
        .fab-camera-top { position: absolute; top: -8px; width: 24px; height: 10px; background: #a970ff; border-radius: 6px 6px 0 0; border: 2px solid rgba(255,255,255,0.15); border-bottom: none; }
        .fab-lens { width: 26px; height: 26px; border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #9146FF, #7020e8); }
        .fab-lens span { color: white; font-weight: 900; font-size: 13px; }

        /* MODALS */
        #add-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; display: none; flex-direction: column; justify-content: flex-end; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); border-radius: 20px 20px 0 0; padding: 25px 20px 40px; transform: translateY(100%); transition: transform 0.3s; border-top: 1px solid var(--border-color); }
        .input-box { width: 100%; background: #1c1c22; border: 1px solid var(--border-color); color: white; padding: 12px; border-radius: 8px; margin-bottom: 12px; outline: none; }
        .btn-post { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        #toast { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; z-index: 9999; display: none; }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50vh; color: var(--text-muted); text-align: center; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="splash-screen">
            <div class="logo-text splash-logo"><span class="logo-miko">Miko</span><span class="logo-tok">Tok</span></div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>

        <div class="app-header">
            <div class="logo-text header-logo"><span class="logo-miko">Miko</span><span class="logo-tok">Tok</span></div>
        </div>

        <div id="toast"></div>
        <div id="feed"></div>

        <div id="add-modal">
            <div class="modal-content" id="modal-panel">
                <div style="font-size:18px; font-weight:700; color:white; margin-bottom:20px; text-align:center;">Add a New Clip</div>
                <input type="text" id="clip-name" class="input-box" placeholder="Your Name">
                <input type="text" id="clip-title" class="input-box" placeholder="Clip Title">
                <input type="url" id="clip-url" class="input-box" placeholder="Twitch Clip URL">
                <div style="display:flex; gap:10px;">
                    <button style="flex:1; background:#222; color:white; border:none; border-radius:8px;" onclick="closeModal()">Cancel</button>
                    <button class="btn-post" style="flex:1;" onclick="submitClip()">Upload</button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" id="nav-home" onclick="switchTab('home')"><span class="material-symbols-rounded">home</span>Home</div>
            <div class="nav-item" id="nav-community" onclick="switchTab('community')"><span class="material-symbols-rounded">forum</span>Community</div>
            <div class="nav-fab" onclick="openModal()"><div class="fab-camera-top"></div><div class="fab-lens"><span>M</span></div></div>
            <div class="nav-item" id="nav-clips" onclick="switchTab('clips')"><span class="material-symbols-rounded">favorite</span>Favorites</div>
            <div class="nav-item" id="nav-login" onclick="adminLogin()"><span class="material-symbols-rounded">login</span>Login</div>
        </div>
    </div>

    <script>
        const BIN_ID = '6a026ec4c0954111d80cc1f9'; 
        const MASTER_KEY = '$2a$10$kP1lbR4aymd6Gv5PkLUHVeum37M4wDDyIc1nCHT5pWK8DeJ5xkSke';
        const ADMIN_PASS = 'mikoadmin'; 
        
        const parentDomain = window.location.hostname;
        let currentTab = 'home';
        let isAdmin = false;
        let globalData = { clips: [], posts: [] };

        // RESTORED CLEAN NEON AVATARS
        function generateAvatar(name) {
            const char = name ? name.charAt(0).toUpperCase() : 'M';
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="neonG" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00f3ff"/>
                        <stop offset="100%" stop-color="#9146FF"/>
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="48" fill="#141419" stroke="url(#neonG)" stroke-width="4"/>
                <text x="50" y="68" font-family="Arial" font-size="50" font-weight="900" fill="url(#neonG)" text-anchor="middle" style="text-shadow: 0 0 8px rgba(145,70,255,0.6);">${char}</text>
            </svg>`;
            return `data:image/svg+xml;base64,${btoa(svg)}`;
        }

        async function loadData() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { 
                    headers: { 'X-Master-Key': MASTER_KEY, 'X-Bin-Meta': 'false' }
                });
                globalData = await res.json();
                render();
            } catch (e) { showToast("Cloud Error"); }
            finally { 
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500);
            }
        }

        async function sync() {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                body: JSON.stringify(globalData)
            });
        }

        function adminLogin() {
            if (isAdmin) { isAdmin = false; showToast("Logged out"); render(); return; }
            const p = prompt("Admin Password:");
            if (p === ADMIN_PASS) { isAdmin = true; render(); }
        }

        async function deleteItem(type, id) {
            if (!confirm("Delete this?")) return;
            if (type === 'clip') globalData.clips = globalData.clips.filter(c => c.id !== id);
            else globalData.posts = globalData.posts.filter(p => p.id !== id);
            await sync(); render();
        }

        function switchTab(t) {
            currentTab = t;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${t}`).classList.add('active');
            render();
        }

        function render() {
            const f = document.getElementById('feed'); f.innerHTML = '';
            if (currentTab === 'community') renderCommunity(f);
            else {
                let items = globalData.clips || [];
                if (currentTab === 'clips') {
                    const myLikes = JSON.parse(localStorage.getItem('my_likes') || '[]');
                    items = items.filter(i => myLikes.includes(i.id));
                }
                renderClips(f, items);
            }
        }

        function renderClips(f, items) {
            if (!items.length) { f.innerHTML = '<div class="empty-state"><h2>Empty Feed</h2></div>'; return; }
            items.forEach(c => {
                const div = document.createElement('div'); div.className = 'card';
                const isLiked = JSON.parse(localStorage.getItem('my_likes') || '[]').includes(c.id);
                div.innerHTML = `
                    ${isAdmin ? `<div class="admin-del" style="display:block" onclick="deleteItem('clip', '${c.id}')"><span class="material-symbols-rounded">delete</span></div>` : ''}
                    <div class="card-header">
                        <img src="${generateAvatar(c.addedBy)}" class="card-avatar">
                        <div class="meta-name">${c.addedBy}</div>
                    </div>
                    <div class="video-container"><iframe src="https://clips.twitch.tv/embed?clip=${c.id}&parent=${parentDomain}&autoplay=false"></iframe></div>
                    <div class="clip-title">${c.title}</div>
                    <div class="card-actions">
                        <div class="action-item ${isLiked?'liked':''}" onclick="toggleLike('clip', '${c.id}')">
                            <span class="material-symbols-rounded">favorite</span> ${c.likes || 0}
                        </div>
                    </div>`;
                f.appendChild(div);
            });
        }

        function renderCommunity(f) {
            const box = document.createElement('div'); box.className = 'card';
            box.innerHTML = `<input id="p-name" class="input-box" placeholder="Your Name"><textarea id="p-text" class="input-box" style="height:60px" placeholder="Discuss..."></textarea><button class="btn-post" onclick="submitPost()">Post</button>`;
            f.appendChild(box);
            (globalData.posts || []).forEach(p => {
                const div = document.createElement('div'); div.className = 'card';
                const isLiked = JSON.parse(localStorage.getItem('my_likes') || '[]').includes(p.id.toString());
                div.innerHTML = `
                    ${isAdmin ? `<div class="admin-del" style="display:block" onclick="deleteItem('post', ${p.id})"><span class="material-symbols-rounded">delete</span></div>` : ''}
                    <div class="card-header">
                        <img src="${generateAvatar(p.author)}" class="card-avatar">
                        <div class="meta-name">${p.author}</div>
                    </div>
                    <div class="post-text">${p.text}</div>
                    <div class="card-actions">
                        <div class="action-item ${isLiked?'liked':''}" onclick="toggleLike('post', '${p.id}')">
                            <span class="material-symbols-rounded">favorite</span> ${p.likes || 0}
                        </div>
                    </div>`;
                f.appendChild(div);
            });
        }

        async function toggleLike(type, id) {
            let myLikes = JSON.parse(localStorage.getItem('my_likes') || '[]');
            const list = type === 'clip' ? globalData.clips : globalData.posts;
            const item = list.find(i => i.id.toString() === id.toString());
            
            if (myLikes.includes(id.toString())) {
                myLikes = myLikes.filter(i => i !== id.toString());
                item.likes = Math.max(0, (item.likes || 0) - 1);
            } else {
                myLikes.push(id.toString());
                item.likes = (item.likes || 0) + 1;
            }
            
            localStorage.setItem('my_likes', JSON.stringify(myLikes));
            render();
            await sync();
        }

        async function submitClip() {
            const url = document.getElementById('clip-url').value;
            if (!url.includes('twitch')) return;
            const id = url.split('/').pop().split('?')[0];
            globalData.clips.unshift({ id, title: document.getElementById('clip-title').value || 'Clip', addedBy: document.getElementById('clip-name').value || 'Anon', likes: 0 });
            closeModal(); await sync(); render();
        }

        async function submitPost() {
            const text = document.getElementById('p-text').value; if (!text) return;
            globalData.posts.unshift({ id: Date.now(), author: document.getElementById('p-name').value || 'Anon', text, likes: 0 });
            await sync(); render();
        }

        function openModal() { document.getElementById('add-modal').style.display='flex'; setTimeout(()=>document.getElementById('modal-panel').style.transform='translateY(0)', 10); }
        function closeModal() { document.getElementById('modal-panel').style.transform='translateY(100%)'; setTimeout(()=>document.getElementById('add-modal').style.display='none', 300); }
        function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }

        loadData();
    </script>
</body>
</html>
