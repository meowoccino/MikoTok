<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mikotok</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    
    <style>
        :root { --miko-purple: #9146FF; --tiktok-red: #ff0050; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: white; overflow: hidden; font-family: 'Roboto', sans-serif; }

        /* The TikTok Snap Feed */
        #feed {
            height: 100vh; width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .video-card {
            height: 100vh; width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex; align-items: center;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* M3 Auth Screen */
        #auth-screen {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center;
        }

        .login-btn {
            background: var(--miko-purple); color: white;
            padding: 16px 32px; border-radius: 100px;
            font-weight: bold; text-decoration: none; font-size: 18px;
            margin-top: 20px; box-shadow: 0 4px 20px rgba(145,70,255,0.5);
        }

        /* Overlay Elements */
        .overlay {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 30px 20px; background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 40%);
        }

        .sidebar {
            position: absolute; right: 15px; bottom: 120px;
            display: flex; flex-direction: column; gap: 24px; pointer-events: auto;
        }

        .btn { color: white; text-align: center; }
        .btn span { font-size: 38px; display: block; margin-bottom: 4px; }

        .info { margin-bottom: 10px; }
        .channel { font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <div id="auth-screen" style="display: none;">
        <h1 style="color:var(--miko-purple); font-size: 40px;">Mikotok</h1>
        <p style="opacity:0.6;">Auto-updates clips from CodeMiko</p>
        <a id="login-url" href="#" class="login-btn">Login with Twitch</a>
    </div>

    <div id="feed"></div>

    <script>
        const CLIENT_ID = '3jj626mx59nwnepdlw2ezlwupu5yzt';
        const MIKO_ID = '117181054';
        const domain = window.location.hostname;
        const redirectUri = window.location.origin + window.location.pathname;

        // 1. Check for token in the URL after Login
        const params = new URLSearchParams(window.location.hash.substring(1));
        const token = params.get('access_token');

        if (!token) {
            // SHOW LOGIN SCREEN
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('login-url').href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=`;
        } else {
            // LOGGED IN: Clear the hash from the URL for a clean look
            window.history.replaceState({}, document.title, window.location.pathname);
            loadLiveClips(token);
        }

        async function loadLiveClips(accessToken) {
            try {
                // Fetch the 20 most recent clips automatically
                const response = await fetch(`https://api.twitch.tv/helix/clips?broadcaster_id=${MIKO_ID}&first=20`, {
                    headers: {
                        'Client-ID': CLIENT_ID,
                        'Authorization': `Bearer ${accessToken}`
                    }
                });
                const result = await response.json();
                renderFeed(result.data);
            } catch (err) {
                document.body.innerHTML = "<h2 style='color:white; text-align:center; padding-top:50px;'>Error loading clips. Please refresh.</h2>";
            }
        }

        function renderFeed(clips) {
            const feedContainer = document.getElementById('feed');
            
            clips.forEach((clip, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                
                // Construct Twitch Player URL
                const playerUrl = `https://clips.twitch.tv/embed?clip=${clip.id}&parent=${domain}&autoplay=${index === 0}&muted=false`;

                card.innerHTML = `
                    <iframe src="${playerUrl}" allowfullscreen="true"></iframe>
                    <div class="overlay">
                        <div class="sidebar">
                            <div class="btn"><span class="material-symbols-rounded" style="color:var(--tiktok-red)">favorite</span>${Math.round(clip.view_count/1000)}K</div>
                            <div class="btn"><span class="material-symbols-rounded">share</span></div>
                        </div>
                        <div class="info">
                            <div class="channel">@CodeMiko</div>
                            <div style="font-size:14px; opacity:0.8;">${clip.title}</div>
                        </div>
                    </div>
                `;
                feedContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
