<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    
    <title>MikoTok</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@800;900&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    
    <link rel="stylesheet" href="./styles.css?v=29">
</head>
<body @click="closeFilterMenu">
    <div id="app-container" v-cloak :class="{'gerald-theme': currentTab === 'gerald'}">
        
        <toast-popup :toast="toast"></toast-popup>

        <splash-screen 
            :splash-visible="splashVisible" 
            :splash-opacity="splashOpacity" 
            :logo-svg="logoSvg">
        </splash-screen>

        <pull-to-refresh 
            :is-pulling="isPulling" 
            :refresh-transform="refreshTransform" 
            :is-refreshing="isRefreshing">
        </pull-to-refresh>

        <app-header 
            :is-header-visible="isHeaderVisible" 
            :current-tab="currentTab" 
            :is-live="isLive" 
            :logo-svg="logoSvg"
            @open-profile="modals.profile = true">
        </app-header>

        <div class="view-port" @touchstart="handlePullStart" @touchmove="handlePullMove" @touchend="handlePullEnd">
            
            <home-view
                :current-tab="currentTab"
                :is-refreshing="isRefreshing"
                :current-vod-index="currentVodIndex"
                :recent-vods="recentVods"
                :is-live="isLive"
                :hostname="hostname"
                :clips="clips"
                :active-filter-label="activeFilterLabel"
                :optimize-twitch-img="optimizeTwitchImg"
                :format-views="formatViews"
                :format-date="formatDate"
                @scroll="handleScroll"
                @prev-vod="prevVod"
                @next-vod="nextVod"
                @open-filter="isFilterMenuOpen = true"
                @share-clip="shareClip"
                @play-clip="playClip">
            </home-view>

            <chat-view
                :current-tab="currentTab"
                :chat-messages="chatMessages"
                :chat-input="chatInput"
                :is-logged-in="!!twitchChatToken"
                @update-input="e => chatInput = e"
                @send-chat="sendTwitchChatMessage"
                @login-twitch="loginToTwitch">
            </chat-view>

            <feed-view
                :current-tab="currentTab"
                :is-refreshing="isRefreshing"
                :active-feed-source="activeFeedSource"
                :yt-feed="ytFeed"
                :reddit-feed="redditFeed"
                :format-number="formatNumber"
                @set-feed="s => activeFeedSource = s"
                @play-yt="playYt">
            </feed-view>

            <gerald-view
                :current-tab="currentTab"
                :gerald-messages="geraldMessages"
                :is-gerald-typing="isGeraldTyping"
                :gerald-input="geraldInput"
                :show-emote-picker="showEmotePicker"
                :show-minigames="showMinigames"
                :custom-emotes="customEmotes"
                :parse-markdown="parseMarkdown"
                @close-pickers="closePickers"
                @insert-emote="insertEmote"
                @play-game="playMinigame"
                @toggle-emotes="toggleEmotes"
                @toggle-minigames="toggleMinigames"
                @update-input="e => geraldInput = e"
                @key-down="handleGeraldEnter"
                @send="talkToGerald">
            </gerald-view>

        </div>

        <filter-menu
            :is-open="isFilterMenuOpen"
            :current-filter="currentFilter"
            @close="isFilterMenuOpen = false"
            @apply="applyFilter">
        </filter-menu>

        <clip-modal
            :clip="selectedClip"
            :hostname="hostname"
            @close="selectedClip = null">
        </clip-modal>

        <profile-modal
            :is-open="modals.profile"
            :current-user="currentUser"
            :login-email="loginEmail"
            :login-pass="loginPass"
            :api-config="apiConfig"
            :sync-state="syncState"
            :wipe-state="wipeState"
            :logout-state="logoutState"
            @close="modals.profile = false"
            @touch-start="handleModalTouchStart"
            @touch-move="handleModalTouchMove"
            @touch-end="handleModalTouchEnd"
            @update-email="e => loginEmail = e"
            @update-pass="e => loginPass = e"
            @login="handleLogin"
            @update-api="(k, v) => apiConfig[k] = v"
            @sync="runSync"
            @wipe="clearGeraldHistory"
            @logout="handleLogout"
            @open-discord="modals.discord = true">
        </profile-modal>

        <discord-modal
            :is-open="modals.discord"
            @close="modals.discord = false">
        </discord-modal>

        <bottom-nav
            :current-tab="currentTab"
            @change-tab="tab => { currentTab = tab; isHeaderVisible = true; }">
        </bottom-nav>

    </div>

    <script src="./app.js?v=29"></script>
</body>
</html>
