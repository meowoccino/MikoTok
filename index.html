<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>MikoTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #000000; 
            --card-bg: #111113; 
            --primary: #9146FF; 
            --text-main: #ffffff; 
            --text-muted: #71717a; 
            --border-color: #27272a; 
            --danger: #ef4444; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-color); color: var(--text-main); overflow: hidden; display: flex; justify-content: center; }
        
        #app-container { width: 100%; max-width: 480px; height: 100%; position: relative; background: var(--bg-color); overflow: hidden; }

        #splash-screen { position: absolute; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.6s ease; }
        #splash-icon { width: 120px; height: 120px; margin-bottom: 20px; }
        
        .progress-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; position: relative; margin-top: 20px; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: linear-gradient(90deg, #ffffff, var(--primary)); animation: load 1.5s infinite ease-in-out; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }

        .gradient-text {
            display: inline-block;
            background: linear-gradient(135deg, #ffffff 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Outfit', sans-serif;
        }

        .app-header { 
            position: absolute; top: 0; left: 0; width: 100%; z-index: 100; 
            padding: 50px 20px 15px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
        }
        .header-logo { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
        .header-status-link { text-decoration: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 40px; }
        .live-dot { width: 6px; height: 6px; background: #3f3f46; border-radius: 50%; margin-bottom: 3px; }
        .live-dot.active { background: var(--danger); animation: pulse 2s infinite; }
        #live-text { font-size: 8px; font-weight: 800; color: var(--text-muted); }
        #live-text.active { color: var(--danger); }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        .simple-logo { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }

        #feed { height: 100%; width: 100%; overflow-y: auto; padding: 110px 12px 100px; scroll-behavior: smooth; }
        #feed::-webkit-scrollbar { display: none; }
        
        .card { background: var(--card-bg); border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border-color); position: relative; }
        .avatar-ring { width: 38px; height: 38px; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; border: 1px solid var(--primary); background: #000; font-size: 14px; }
        .admin-del { position: absolute; top: 12px; right: 12px; color: var(--text-muted); cursor: pointer; font-size: 20px; }
        
        .video-container { width: 100%; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; background: #000; position: relative; margin: 10px 0; }
        iframe { width: 100%; height: 100%; border: none; opacity: 0; transition: opacity 0.4s; }
        iframe.loaded { opacity: 1; }

        .card-actions { display: flex; align-items: center; gap: 16px; padding-top: 4px; }
        .action-btn { display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; cursor: pointer; }
        .action-btn.liked { color: var(--primary); }
        .action-btn.liked span { font-variation-settings: 'FILL' 1; }

        .bottom-nav { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: #000; border-top: 1px solid var(--border-color); 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 15px 30px; z-index: 100; 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 50px; color: var(--text-muted); font-size: 10px; gap: 4px; cursor: pointer; }
        .nav-item.active { color: #fff; }
        .nav-fab { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        #login-modal, #add-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 1500; display: none; flex-direction: column; justify-content: flex-end; }
        .modal-content { background: #111113; border-radius: 20px 20px 0 0; padding: 25px 20px 40px; transform: translateY(100%); transition: transform 0.3s ease-out; border-top: 1px solid var(--border-color); }
        .input-box { width: 100%; background: #000; border: 1px solid var(--border-color); color: white; padding: 14px; border-radius: 8px; outline: none; margin-bottom: 12px; font-size: 14px; }
        
        /* RESTORED EYE POSITIONING */
        .pass-wrapper { position: relative; width: 100%; margin-bottom: 12px; }
        .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); cursor: pointer; user-select: none; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="splash-screen">
            <div id="splash-icon"></div>
            <div class="gradient-text" style="font-size: 40px;">MikoTok</div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>

        <div class="app-header">
            <div class="header-logo" id="header-logo-slot"></div>
            <div class="simple-logo"><span class="gradient-text">MikoTok</span></div>
            <a href="https://twitch.tv/codemiko" target="_blank" class="header-status-link">
                <div class="live-dot" id="live-dot"></div>
                <span id="live-text">OFFLINE</span>
            </a>
        </div>
        
        <div id="feed" onscroll="handleScroll()"><div id="feed-content"></div></div>

        <div id="login-modal"><div class="modal-content" id="login-panel">
            <div id="login-form">
                <input type="text" id="login-nick" class="input-box" placeholder="Username">
                <div class="pass-wrapper">
                    <input type="password" id="login-pass" class="input-box" placeholder="Password" style="margin-bottom:0; padding-right: 45px;">
                    <span class="material-symbols-rounded eye-btn" id="eye-icon" onclick="togglePassword()">visibility</span>
                </div>
                <button class="input-box" style="background:var(--primary); font-weight:700; border:none;" onclick="handleLogin()">Sign In</button>
            </div>
            <div id="profile-form" style="display:none; text-align:center;">
                <h3 id="display-name" style="margin-bottom:20px;"></h3>
                <button class="input-box" style="background:var(--danger); font-weight:700; border:none;" onclick="logout()">Logout</button>
            </div>
            <button class="input-box" style="background:transparent; border:none; color:var(--text-muted);" onclick="closeModal('login')">Cancel</button>
        </div></div>

        <div id="add-modal"><div class="modal-content" id="add-panel"><input type="text" id="clip-url" class="input-box" placeholder="Twitch Clip URL"><button class="input-box" style="background:var(--primary); font-weight:700; border:none;" onclick="submitClip()">Add Clip</button></div></div>
        
        <div class="bottom-nav">
            <div class="nav-item active" id="nav-home" onclick="switchTab('home')"><span class="material-symbols-rounded">home</span>Home</div>
            <div class="nav-item" id="nav-community" onclick="switchTab('community')"><span class="material-symbols-rounded">forum</span>Feed</div>
            <div class="nav-fab" onclick="handleUploadClick()" id="upload-btn-container"></div>
            <div class="nav-item" id="nav-clips" onclick="switchTab('clips')"><span class="material-symbols-rounded">favorite</span>Liked</div>
            <div class="nav-item" id="nav-login" onclick="openModal('login')"><span class="material-symbols-rounded">account_circle</span>Profile</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yhxcuayiwqpjvalyrcqv.supabase.co', SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloeGN1YXlpd3FwanZhbHlyY3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Nzk1ODEsImV4cCI6MjA5NDE1NTU4MX0.z7EDgqRz1OT25UdxtmeJxFvwx4UCwaPRwWWJuzd46kc';
        const ADMIN_USERNAME = 'tomato_24';
        let sbClient = null, currentTab = 'home', currentUser = null, isAdmin = false, globalData = { clips: [], posts: [] };
        let likedIds = JSON.parse(localStorage.getItem('miko_likes') || '[]'), currentPlayingIframe = null;

        const getLogoSvg = (id) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" style="width:100%;height:100%"><defs><linearGradient id="grad-${id}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#9146FF"/></linearGradient></defs><circle cx="50" cy="50" r="40" fill="none" stroke="url(#grad-${id})" stroke-width="8"/><path d="M 33 38 L 48 62 L 62 38 L 62 55 Q 62 65 69 64" fill="none" stroke="url(#grad-${id})" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        
        document.getElementById('upload-btn-container').innerHTML = getLogoSvg('nav');
        document.getElementById('splash-icon').innerHTML = getLogoSvg('splash');
        document.getElementById('header-logo-slot').innerHTML = getLogoSvg('header');

        async function init() {
            sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const saved = localStorage.getItem('miko_user');
            if (saved) { 
                currentUser = saved; 
                isAdmin = (saved === ADMIN_USERNAME); 
            }
            await loadData();
        }

        async function loadData() {
            const { data: clips } = await sbClient.from('clips').select('*').order('created_at', { ascending: false });
            const { data: posts } = await sbClient.from('posts').select('*').order('created_at', { ascending: false });
            globalData.clips = clips || []; globalData.posts = posts || []; render(); 
            setTimeout(() => { document.getElementById('splash-screen').style.opacity='0'; setTimeout(()=>document.getElementById('splash-screen').style.display='none',600); }, 2000);
        }

        function handleScroll() {
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(iframe => {
                const rect = iframe.getBoundingClientRect();
                if (rect.top >= 50 && rect.bottom <= window.innerHeight - 50 && currentPlayingIframe !== iframe) playVideo(iframe);
            });
        }

        function playVideo(iframe) {
            if (currentPlayingIframe && currentPlayingIframe !== iframe) { currentPlayingIframe.src = currentPlayingIframe.getAttribute('data-src') + "&autoplay=false"; }
            iframe.src = iframe.getAttribute('data-src') + "&autoplay=true&muted=false";
            currentPlayingIframe = iframe;
        }

        function render() {
            const f = document.getElementById('feed-content'); f.innerHTML = '';
            if (currentTab === 'community') {
                f.innerHTML = `<div class="card"><textarea id="p-text" class="input-box" style="height:60px;resize:none;" placeholder="Write something..."></textarea><button class="input-box" style="background:var(--primary);font-weight:700;margin-bottom:0;border:none;" onclick="submitPost()">Post</button></div>`;
                globalData.posts.forEach(p => {
                    const avatarChar = p.author === ADMIN_USERNAME ? 'T' : (p.author ? p.author[0].toUpperCase() : '?');
                    f.innerHTML += `<div class="card">${isAdmin ? `<span class="material-symbols-rounded admin-del" onclick="deleteItem('posts', '${p.id}')">delete</span>` : ''}<div style="display:flex; align-items:center;"><div class="avatar-ring">${avatarChar}</div><div><div style="font-weight:600; font-size:14px;">${p.author}</div></div></div><div style="font-size:14px; color:#ddd; margin-top:10px;">${p.text}</div></div>`;
                });
            } else if (currentTab === 'clips') {
                globalData.clips.filter(c => likedIds.includes(c.id)).forEach(c => renderCard(f, c));
            } else { globalData.clips.forEach(c => renderCard(f, c)); }
        }

        function renderCard(target, c) {
            const isLiked = likedIds.includes(c.id);
            const authorName = c.added_by || 'CodeMiko';
            const avatarChar = authorName === ADMIN_USERNAME ? 'T' : (authorName === 'CodeMiko' ? 'M' : authorName[0].toUpperCase());
            target.innerHTML += `<div class="card">${isAdmin ? `<span class="material-symbols-rounded admin-del" onclick="deleteItem('clips', '${c.id}')">delete</span>` : ''}<div style="display:flex; align-items:center;"><div class="avatar-ring">${avatarChar}</div><div><div style="font-weight:600; font-size:14px;">${authorName}</div></div></div><div class="video-container"><iframe data-src="https://clips.twitch.tv/embed?clip=${c.id}&parent=${window.location.hostname}" onload="this.classList.add('loaded')"></iframe></div><div class="card-actions"><div class="action-btn ${isLiked?'liked':''}" onclick="toggleLike('${c.id}')"><span class="material-symbols-rounded">favorite</span> ${isLiked ? 1 : 0}</div></div></div>`;
        }

        async function handleLogin() {
            const n = document.getElementById('login-nick').value.trim(), p = document.getElementById('login-pass').value.trim();
            if (n && p.length >= 6) { 
                localStorage.setItem('miko_user', n); 
                currentUser = n; 
                isAdmin = (n === ADMIN_USERNAME);
                location.reload(); 
            }
        }

        function logout() { localStorage.removeItem('miko_user'); location.reload(); }
        function handleUploadClick() { if(!currentUser) openModal('login'); else openModal('add'); }
        async function submitPost() { const t = document.getElementById('p-text').value.trim(); if (t) { await sbClient.from('posts').insert([{ author: currentUser, text: t }]); loadData(); } }
        async function submitClip() { const u = document.getElementById('clip-url').value.trim(); if (u.includes('twitch.tv')) { const id = u.split('/').pop().split('?')[0]; await sbClient.from('clips').insert([{ id, added_by: currentUser }]); closeModal('add'); loadData(); } }
        function toggleLike(id) { if (!currentUser) return; if (likedIds.includes(id)) likedIds = likedIds.filter(i => i !== id); else likedIds.push(id); localStorage.setItem('miko_likes', JSON.stringify(likedIds)); render(); }
        async function deleteItem(table, id) { await sbClient.from(table).delete().eq('id', id); loadData(); }
        function switchTab(t) { currentTab = t; document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); document.getElementById('nav-' + t).classList.add('active'); render(); }
        
        function openModal(id) { 
            if(id === 'login') {
                if(currentUser) {
                    document.getElementById('login-form').style.display='none';
                    document.getElementById('profile-form').style.display='block';
                    document.getElementById('display-name').innerText=currentUser;
                } else {
                    document.getElementById('login-form').style.display='block';
                    document.getElementById('profile-form').style.display='none';
                }
            }
            document.getElementById(id + '-modal').style.display = 'flex'; 
            setTimeout(() => document.getElementById(id + '-panel').style.transform = 'translateY(0)', 10); 
        }
        
        function closeModal(id) { document.getElementById(id + '-panel').style.transform = 'translateY(100%)'; setTimeout(() => document.getElementById(id + '-modal').style.display = 'none', 300); }
        
        function togglePassword() {
            const input = document.getElementById('login-pass');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }
        
        window.addEventListener('load', init);
    </script>
</body>
</html>
