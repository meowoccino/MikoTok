<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <link rel="manifest" href="manifest.json">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000000'/><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23ffffff'/><stop offset='100%25' stop-color='%239146FF'/></linearGradient></defs><circle cx='50' cy='50' r='35' fill='none' stroke='url(%23g)' stroke-width='6'/><path d='M 38 40 L 48 60 L 58 40 L 58 55 Q 58 63 65 62' fill='none' stroke='url(%23g)' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000000'/><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%23ffffff'/><stop offset='100%25' stop-color='%239146FF'/></linearGradient></defs><circle cx='50' cy='50' r='35' fill='none' stroke='url(%23g)' stroke-width='6'/><path d='M 38 40 L 48 60 L 58 40 L 58 55 Q 58 63 65 62' fill='none' stroke='url(%23g)' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/></svg>">

    <title>MikoTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <style>
        :root { 
            --bg-color: #000000; --card-bg: #111113; --primary: #9146FF; 
            --primary-light: #a970ff; --text-main: #ffffff; --text-muted: #71717a; 
            --border-color: #27272a; --danger: #ef4444; --offline-gray: #3f3f46;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-color); color: var(--text-main); overflow: hidden; display: flex; justify-content: center; }
        
        #app-container { width: 100%; max-width: 480px; height: 100%; position: relative; background: var(--bg-color); overflow: hidden; }
        [v-cloak] { display: none !important; }

        #splash-screen { position: absolute; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.6s ease; }
        #splash-icon { width: 120px; height: 120px; margin-bottom: 20px; }
        .progress-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; position: relative; margin-top: 20px; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: linear-gradient(90deg, #ffffff, var(--primary)); animation: load 1.5s infinite ease-in-out; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }
        .gradient-text { display: inline-block; background: linear-gradient(135deg, #ffffff 30%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Outfit', sans-serif; }

        .app-content-wrapper { position: absolute; inset: 0; width: 100%; height: 100%; overflow: hidden; }

        .app-header { 
            position: absolute; top: 0; left: 0; width: 100%; z-index: 100; 
            padding: 50px 20px 15px; display: flex; align-items: center; justify-content: space-between; 
            background: rgba(0, 0, 0, 0.90); backdrop-filter: blur(12px); 
            border-bottom: 1px solid var(--border-color);
        }
        
        .header-logo { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
        .simple-logo { flex-grow: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }

        /* Header Avatar with Status Text underneath */
        .header-status-group { display: flex; flex-direction: column; align-items: center; width: 44px; cursor: pointer; }
        .story-ring { width: 34px; height: 34px; border-radius: 50%; padding: 2px; background: transparent; position: relative; display: flex; align-items: center; justify-content: center; }
        .story-ring.live { background: linear-gradient(45deg, var(--danger), var(--primary), #ff4685, var(--danger)); background-size: 300% 300%; animation: storyGlow 3s ease infinite; }
        .story-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; transition: opacity 0.3s ease; }
        .story-ring.live .story-avatar { border: 2px solid #000; } 
        .story-ring.offline .story-avatar { opacity: 0.5; border: 1px solid var(--border-color); }
        
        .live-badge-mini { position: absolute; top: -2px; right: -2px; background: var(--danger); color: #fff; font-size: 6px; font-weight: 900; padding: 1px 4px; border-radius: 4px; border: 1px solid #000; text-transform: uppercase; z-index: 2; }
        
        .status-label-under { font-size: 8px; font-weight: 800; margin-top: 4px; letter-spacing: 0.2px; transition: color 0.3s ease; }
        .status-label-under.live { color: var(--danger); text-shadow: 0 0 5px rgba(239, 68, 68, 0.5); animation: heartbeatText 1.8s infinite ease-in-out; }
        .status-label-under.offline { color: var(--offline-gray); }

        @keyframes storyGlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes heartbeatText { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        #feed { height: 100%; width: 100%; overflow-y: auto; padding: 110px 12px 100px; scroll-behavior: smooth; }
        #feed::-webkit-scrollbar { display: none; }
        
        #live-container { 
            background: linear-gradient(160deg, #160b24 0%, #0a0512 100%); 
            border-radius: 16px; 
            padding: 16px; 
            margin-bottom: 25px; 
            border: 1px solid rgba(145, 70, 255, 0.3); 
            box-shadow: 0 8px 32px rgba(145, 70, 255, 0.15), inset 0 1px 0 rgba(255,255,255,0.05); 
            position: relative; 
            overflow: hidden; 
        }
        #live-container::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 0%, rgba(145, 70, 255, 0.15), transparent 50%);
            pointer-events: none; z-index: 0;
        }
        .banner-content { position: relative; z-index: 1; }
        .live-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        
        .status-pill { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; backdrop-filter: blur(4px); transition: border-color 0.3s ease; }
        .status-tag { font-size: 10px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; transition: color 0.3s ease; }
        
        .status-dot { width: 6px; height: 6px; background: var(--offline-gray); border-radius: 50%; transition: background 0.3s ease, box-shadow 0.3s ease; }
        .status-dot.active { background: var(--danger); box-shadow: 0 0 10px var(--danger); animation: heartbeatLive 1.8s infinite ease-in-out; }
        .status-dot.vod { background: var(--primary); box-shadow: 0 0 8px var(--primary); animation: heartbeatVod 3s infinite ease-in-out; }

        @keyframes heartbeatLive { 0% { transform: scale(1); opacity: 1; filter: brightness(1); } 50% { transform: scale(1.25); opacity: 0.6; filter: brightness(1.2); } 100% { transform: scale(1); opacity: 1; filter: brightness(1); } }
        @keyframes heartbeatVod { 0% { transform: scale(1); opacity: 0.8; filter: brightness(1); } 50% { transform: scale(1.1); opacity: 0.5; filter: brightness(1.2); } 100% { transform: scale(1); opacity: 0.8; filter: brightness(1); } }
        
        .pinned-tag { background: rgba(255,255,255,0.1); color: #fff; padding: 4px 10px; border-radius: 12px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .player-wrapper { width: 100%; aspect-ratio: 16/9; border-radius: 10px; overflow: hidden; background: #000; box-shadow: 0 4px 20px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); }

        .card { background: var(--card-bg); border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border-color); position: relative; }
        .avatar-ring-feed { width: 38px; height: 38px; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; border: 1px solid var(--primary); background: #000; overflow: hidden; flex-shrink: 0; position: relative; }
        .avatar-ring-feed img { width: 100%; height: 100%; object-fit: cover; }
        
        .thumbnail-wrapper { width: 100%; border-radius: 8px; overflow: hidden; aspect-ratio: 16/9; background: #000; position: relative; margin-top: 5px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .thumbnail-wrapper img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: opacity 0.2s; }
        .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; }
        .play-overlay span { font-size: 56px; color: white; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }

        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 10px 15px 30px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 50px; color: var(--text-muted); font-size: 10px; gap: 4px; cursor: pointer; transition: color 0.2s; text-decoration: none; }
        .nav-item.active { color: #fff; }
    </style>
</head>
<body>
    <div id="app-container" v-cloak>
        <div id="splash-screen" v-if="splashVisible" :style="{ opacity: splashOpacity }">
            <div v-html="logoSvg('splash')" id="splash-icon"></div>
            <div class="gradient-text" style="font-size: 40px;">MikoTok</div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>

        <div class="app-content-wrapper" :style="{ opacity: splashVisible ? 0 : 1, transition: 'opacity 0.4s ease', pointerEvents: splashVisible ? 'none' : 'auto' }">
            <header class="app-header">
                <div class="header-logo" v-html="logoSvg('header')"></div>
                <div class="simple-logo"><span class="gradient-text">MikoTok</span></div>
                
                <!-- Status Group: Avatar + Text Label -->
                <div class="header-status-group">
                    <div class="story-ring" :class="isLive ? 'live' : 'offline'">
                        <img src="1000018850.png?v=2" class="story-avatar" alt="Miko">
                        <div v-if="isLive" class="live-badge-mini">LIVE</div>
                    </div>
                    <span class="status-label-under" :class="isLive ? 'live' : 'offline'">
                        {{ isLive ? 'LIVE' : 'OFFLINE' }}
                    </span>
                </div>
            </header>

            <div id="feed">
                <template v-if="currentTab === 'home'">
                    <div id="live-container">
                        <div class="banner-content">
                            <div class="live-label">
                                <div class="status-pill" :style="{ borderColor: isLive ? 'rgba(239, 68, 68, 0.4)' : 'rgba(145, 70, 255, 0.3)' }">
                                    <span class="status-dot" :class="{ active: isLive, vod: !isLive }"></span> 
                                    <span class="status-tag" :style="{ color: isLive ? 'var(--danger)' : 'var(--primary)' }">{{ isLive ? 'LIVE' : 'LATEST VOD' }}</span>
                                </div>
                                <span class="pinned-tag">Featured</span>
                            </div>
                            <div class="player-wrapper">
                                <iframe v-if="isLive" :src="'https://player.twitch.tv/?channel=codemiko&parent=' + host + '&autoplay=false&muted=true'" allowfullscreen="true" style="width:100%; height:100%; border:none;"></iframe>
                                <iframe v-else :src="'https://player.twitch.tv/?video=2135000000&parent=' + host + '&autoplay=false&muted=true'" allowfullscreen="true" style="width:100%; height:100%; border:none;"></iframe>
                            </div>
                        </div>
                    </div>

                    <div class="card" v-for="clip in clips" :key="clip.id">
                        <div style="display:flex;align-items:center;margin-bottom:10px;">
                            <div class="avatar-ring-feed"><img v-if="clip.added_by === 'CodeMiko' || clip.added_by === 'tomato_24'" src="1000018850.png?v=2" alt="Avatar"></div>
                            <div style="font-weight:700;font-size:14px;">{{ clip.added_by }}</div>
                        </div>
                        <div class="thumbnail-wrapper" @click="activeClip = clip">
                            <img :src="clip.thumbnail_url" alt="Thumbnail">
                            <div class="play-overlay"><span class="material-symbols-rounded" style="font-size:48px; color:white;">play_circle</span></div>
                        </div>
                    </div>
                </template>

                <template v-if="currentTab === 'community'">
                    <div class="card">
                        <div style="display:flex; align-items:center; margin-bottom:12px;">
                            <div class="avatar-ring-feed"><img src="1000018850.png?v=2" alt="CodeMiko"></div>
                            <div>
                                <div style="font-weight:700; font-size:14px; display: flex; align-items: center; gap: 6px;">CodeMiko <span style="background: rgba(88, 101, 242, 0.15); color: #5865F2; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase;">Discord</span></div>
                                <div style="font-size:10px; color:var(--text-muted); margin-top: 3px;">Today at 9:02 AM</div>
                            </div>
                        </div>
                        <div style="font-size:14px; line-height: 1.5; color: var(--text-main);">Love you chatties</div>
                    </div>
                </template>
            </div>

            <nav class="bottom-nav">
                <div class="nav-item" :class="{ active: currentTab === 'home' }" @click="currentTab = 'home'"><span class="material-symbols-rounded">home</span>Home</div>
                <div class="nav-item" :class="{ active: currentTab === 'community' }" @click="currentTab = 'community'"><span class="material-symbols-rounded">forum</span>Feed</div>
                <a href="https://discord.gg/codemiko" target="_blank" class="nav-item">
                    <svg viewBox="0 0 127 96" style="width:24px; height:24px; fill:currentColor; opacity: 0.8;"><path d="M107.7,8.07A105,105,0,0,0,81.47,0a72,72,0,0,0-3.36,6.83,97,97,0,0,0-49,0,72,72,0,0,0-3.36-6.83A105,105,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.1a105,105,0,0,0,32.19,16.18,77,77,0,0,0,6.89-11.11,64,64,0,0,1-10.85-5.18,75,75,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a64,64,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.10,105,105,0,0,0,32.19-16.14c2.72-27.00-4.55-50.87-19.40-72.03ZM42.45,65.69C36.18,65.69,31.00,60,31.00,53s5.12-12.67,11.45-12.67S54,46,54,53s-5.17,12.69-11.55,12.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5.12-12.67,11.44-12.67S96.20,46,96.20,53s-5.14,12.69-9.51,12.69Z"/></svg>
                    Discord
                </a>
                <div class="nav-item" @click="modals.profile = true"><span class="material-symbols-rounded">account_circle</span>Profile</div>
            </nav>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, computed } = Vue;
        const sbClient = supabase.createClient('https://yhxcuayiwqpjvalyrcqv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloeGN1YXlpd3FwanZhbHlyY3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Nzk1ODEsImV4cCI6MjA5NDE1NTU4MX0.z7EDgqRz1OT25UdxtmeJxFvwx4UCwaPRwWWJuzd46kc');

        createApp({
            setup() {
                const splashVisible = ref(true), splashOpacity = ref(1), currentTab = ref('home');
                
                // Toggle to true to see the glowing Live effects!
                const isLive = ref(false); 

                const currentUser = ref(localStorage.getItem('miko_user')), isAdmin = computed(() => currentUser.value === 'tomato_24');
                const posts = ref([]), clips = ref([]), modals = ref({ profile: false }), activeClip = ref(null), host = window.location.hostname || "localhost";

                const logoSvg = (id) => `<svg viewBox="0 0 100 100"><defs><linearGradient id="grad-${id}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#9146FF"/></linearGradient></defs><circle cx="50" cy="50" r="40" fill="none" stroke="url(#grad-${id})" stroke-width="8"/><path d="M 33 38 L 48 62 L 62 38 L 62 55 Q 62 65 69 64" fill="none" stroke="url(#grad-${id})" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

                const loadData = async () => {
                    const { data: p } = await sbClient.from('posts').select('*').order('created_at', { ascending: false });
                    const { data: c } = await sbClient.from('clips').select('*').order('created_at', { ascending: false });
                    posts.value = p || []; clips.value = c || [];
                };

                onMounted(() => { 
                    loadData(); 
                    setTimeout(() => { splashOpacity.value = 0; setTimeout(() => splashVisible.value = false, 600); }, 1500); 
                });

                return { splashVisible, splashOpacity, currentTab, isLive, currentUser, isAdmin, posts, clips, modals, activeClip, host, logoSvg };
            }
        }).mount('#app-container');
    </script>
</body>
</html>
