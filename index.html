<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MikoTok</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    
    <style>
        :root { 
            --bg-color: #0b0b0e; 
            --card-bg: #141419;
            --primary: #9146FF; 
            --primary-light: #a970ff;
            --text-main: #ffffff;
            --text-muted: #a0a0ab;
            --border-color: #26262c;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #000; color: var(--text-main); overflow: hidden; 
            display: flex; justify-content: center;
        }

        #app-container {
            width: 100%; max-width: 480px; height: 100%; position: relative;
            background: var(--bg-color); overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* LOGO COLORS */
        .logo-miko { color: white; }
        .logo-tok { color: var(--primary-light); }

        /* SPLASH SCREEN */
        #splash-screen {
            position: absolute; inset: 0; background: #0b0b0e; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 2000; transition: opacity 0.5s ease;
        }
        .logo-text { font-size: 42px; font-weight: 700; letter-spacing: -1px; }
        .progress-bar { width: 150px; height: 4px; background: #222; border-radius: 4px; margin-top: 40px; overflow: hidden; position: relative; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; width: 50%; background: var(--primary); border-radius: 4px; animation: load 1.5s infinite ease-in-out; }
        @keyframes load { 0% { left: -50%; } 100% { left: 100%; } }

        /* TOP APP BAR */
        .app-header {
            position: absolute; top: 0; left: 0; width: 100%; background: var(--bg-color); z-index: 100;
            padding: 45px 20px 15px; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid var(--border-color);
        }
        .header-logo { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }

        /* FEED */
        #feed { height: 100%; width: 100%; overflow-y: auto; padding: 110px 15px 90px; }
        #feed::-webkit-scrollbar { display: none; }

        /* CARDS */
        .card { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.03); }
        .card-header { display: flex; align-items: center; margin-bottom: 12px; }
        .card-avatar { width: 36px; height: 36px; border-radius: 50%; margin-right: 12px; object-fit: cover; background: #111; box-shadow: 0 0 8px rgba(145, 70, 255, 0.4); }
        .meta-name { font-size: 14px; font-weight: 600; color: white; }
        .meta-time { font-size: 12px; color: var(--text-muted); }

        .video-container { position: relative; width: 100%; border-radius: 10px; overflow: hidden; background: #000; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }
        iframe { width: 100%; height: 100%; border: none; }

        .clip-title { font-size: 15px; font-weight: 600; margin: 12px 0 4px; }
        .clip-link { font-size: 13px; color: var(--primary-light); text-decoration: none; display: flex; align-items: center; gap: 4px; }
        .post-text { font-size: 15px; line-height: 1.5; color: #e0e0e0; margin-top: 8px; white-space: pre-wrap; }

        .card-actions { display: flex; align-items: center; gap: 20px; margin-top: 15px; }
        .action-item { display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 13px; cursor: pointer; }
        .action-item.liked { color: var(--primary-light); }
        .action-item.liked span { font-variation-settings: 'FILL' 1; }

        /* BOTTOM NAVIGATION (5 Items) */
        .bottom-nav {
            position: absolute; bottom: 0; left: 0; width: 100%; background: var(--bg-color); border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; padding: 10px 10px 25px; z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 60px; color: var(--text-muted); font-size: 10px; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--primary-light); }
        
        /* PURPLE CAMERA BUTTON */
        .nav-fab {
            width: 60px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, #a970ff, #9146FF);
            display: flex; align-items: center; justify-content: center; cursor: pointer; transform: translateY(-12px);
            border: 2px solid rgba(255,255,255,0.15); position: relative;
        }
        .fab-camera-top { position: absolute; top: -8px; width: 24px; height: 10px; background: #a970ff; border-radius: 6px 6px 0 0; border: 2px solid rgba(255,255,255,0.15); border-bottom: none; }
        .fab-lens { width: 26px; height: 26px; border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #9146FF, #7020e8); }
        .fab-lens span { color: white; font-weight: 900; font-size: 13px; }

        /* MODAL */
        #add-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; display: none; flex-direction: column; justify-content: flex-end; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); border-radius: 20px 20px 0 0; padding: 25px 20px 40px; transform: translateY(100%); transition: transform 0.3s; border-top: 1px solid var(--border-color); }
        .input-group input { width: 100%; background: #1c1c22; border: 1px solid var(--border-color); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .btn-post { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        #toast { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; z-index: 9999; display: none; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="splash-screen">
            <div class="logo-text"><span class="logo-miko">Miko</span><span class="logo-tok">Tok</span></div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>

        <div class="app-header">
            <div class="header-logo"><span class="logo-miko">Miko</span><span class="logo-tok">Tok</span></div>
        </div>

        <div id="toast"></div>
        <div id="feed"></div>

        <div id="add-modal">
            <div class="modal-content" id="modal-panel">
                <div style="font-size:18px; font-weight:700; color:white; margin-bottom:20px; text-align:center;">Add a New Clip</div>
                <div class="input-group">
                    <input type="text" id="input-name" placeholder="Your Name">
                    <input type="text" id="input-title" placeholder="Clip Title">
                    <input type="url" id="input-url" placeholder="Twitch Clip URL">
                </div>
                <div style="display:flex; gap:10px;">
                    <button style="flex:1; background:#222; color:white; border:none; border-radius:8px;" onclick="closeModal()">Cancel</button>
                    <button class="btn-post" style="flex:1;" onclick="submitClip()">Add Clip</button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" id="nav-home" onclick="switchTab('home')"><span class="material-symbols-rounded">home</span>Home</div>
            <div class="nav-item" id="nav-community" onclick="switchTab('community')"><span class="material-symbols-rounded">forum</span>Community</div>
            <div class="nav-fab" onclick="openModal()"><div class="fab-camera-top"></div><div class="fab-lens"><span>M</span></div></div>
            <div class="nav-item" id="nav-clips" onclick="switchTab('clips')"><span class="material-symbols-rounded">favorite</span>Favorites</div>
            <div class="nav-item" id="nav-login" onclick="showToast('DEEZ NUTS')"><span class="material-symbols-rounded">login</span>Login</div>
        </div>
    </div>

    <script>
        const BIN_ID = '6a026ec4c0954111d80cc1f9'; 
        const MASTER_KEY = '$2a$10$kP1lbR4aymd6Gv5PkLUHVeum37M4wDDyIc1nCHT5pWK8DeJ5xkSke';
        const parentDomain = window.location.hostname || 'localhost';

        let currentTab = 'home';
        let globalData = { clips: [], posts: [] };

        async function loadData() {
            try {
                // Use the latest version of the bin
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { 
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const data = await res.json();
                globalData = data.record;
                render();
            } catch (e) { 
                showToast("Cloud sync failed. Start your bin with {'clips':[],'posts':[]}"); 
            }
            finally { 
                setTimeout(() => {
                    document.getElementById('splash-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500);
                }, 1000);
            }
        }

        async function sync() {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json', 
                    'X-Master-Key': MASTER_KEY 
                },
                body: JSON.stringify(globalData)
            });
        }

        function switchTab(t) {
            currentTab = t;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${t}`).classList.add('active');
            render();
        }

        function render() {
            const f = document.getElementById('feed'); f.innerHTML = '';
            if (currentTab === 'community') {
                renderCommunity(f);
            } else {
                let items = globalData.clips || [];
                if (currentTab === 'clips') {
                    const favs = JSON.parse(localStorage.getItem('favs') || '[]');
                    items = items.filter(i => favs.includes(i.id));
                }
                renderClips(f, items);
            }
        }

        function renderClips(f, items) {
            if (!items.length) { 
                f.innerHTML = `<div class="empty-state"><span class="material-symbols-rounded">videocam_off</span><h2>No clips yet!</h2><p>Tap the Purple Camera to add one.</p></div>`; 
                return; 
            }
            items.forEach(c => {
                const div = document.createElement('div'); div.className = 'card';
                const isLiked = JSON.parse(localStorage.getItem('favs') || '[]').includes(c.id);
                div.innerHTML = `
                    <div class="card-header"><div class="meta-name">${c.addedBy}</div></div>
                    <div class="video-container"><iframe src="https://clips.twitch.tv/embed?clip=${c.id}&parent=${parentDomain}&autoplay=false"></iframe></div>
                    <div class="clip-title">${c.title}</div>
                    <div class="card-actions">
                        <div class="action-item ${isLiked?'liked':''}" onclick="toggleLike('${c.id}')"><span class="material-symbols-rounded">favorite</span> Like</div>
                    </div>`;
                f.appendChild(div);
            });
        }

        function renderCommunity(f) {
            const box = document.createElement('div'); box.className = 'card';
            box.innerHTML = `
                <input type="text" id="p-name" class="post-input-box" placeholder="Your Name" style="margin-bottom:8px; background:#1c1c22; border:1px solid #26262c; color:white; width:100%; border-radius:8px; padding:10px;">
                <textarea id="p-text" class="post-input-box" style="width:100%; height:60px; background:#1c1c22; border:1px solid #26262c; color:white; border-radius:8px; padding:10px;" placeholder="Say something..."></textarea>
                <button class="btn-post" onclick="submitPost()" style="margin-top:10px;">Post</button>`;
            f.appendChild(box);
            
            const posts = globalData.posts || [];
            posts.forEach(p => {
                const div = document.createElement('div'); div.className = 'card';
                const pId = `post_${p.id}`;
                const isLiked = JSON.parse(localStorage.getItem('post_likes') || '[]').includes(pId);
                div.innerHTML = `<div class="meta-name">${p.author}</div><div class="post-text">${p.text}</div>
                                 <div class="card-actions"><div class="action-item ${isLiked?'liked':''}" onclick="togglePostLike('${pId}')"><span class="material-symbols-rounded">favorite</span> Like</div></div>`;
                f.appendChild(div);
            });
        }

        async function submitClip() {
            const name = document.getElementById('input-name').value || 'Anon';
            const url = document.getElementById('input-url').value;
            if (!url.includes('twitch')) return;
            const id = url.split('/').pop().split('?')[0];
            globalData.clips.unshift({ id, title: document.getElementById('input-title').value || 'Clip', addedBy: name });
            closeModal(); showToast("Syncing..."); await sync(); render();
        }

        async function submitPost() {
            const name = document.getElementById('p-name').value || 'Anon';
            const text = document.getElementById('p-text').value; if (!text) return;
            globalData.posts.unshift({ id: Date.now(), author: name, text });
            showToast("Syncing..."); await sync(); render();
        }

        function toggleLike(id) {
            let favs = JSON.parse(localStorage.getItem('favs') || '[]');
            if (favs.includes(id)) favs = favs.filter(i => i !== id);
            else favs.push(id);
            localStorage.setItem('favs', JSON.stringify(favs));
            render();
        }

        function togglePostLike(id) {
            let likes = JSON.parse(localStorage.getItem('post_likes') || '[]');
            if (likes.includes(id)) likes = likes.filter(i => i !== id);
            else likes.push(id);
            localStorage.setItem('post_likes', JSON.stringify(likes));
            render();
        }

        function openModal() { document.getElementById('add-modal').style.display='flex'; setTimeout(()=>document.getElementById('modal-panel').style.transform='translateY(0)', 10); }
        function closeModal() { document.getElementById('modal-panel').style.transform='translateY(100%)'; setTimeout(()=>document.getElementById('add-modal').style.display='none', 300); }
        function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }

        loadData();
    </script>
</body>
</html>
