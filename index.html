<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mikotok Live</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    
    <style>
        :root { --miko-purple: #9146FF; --tiktok-red: #ff0050; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'Roboto', sans-serif; }

        .feed {
            height: 100vh; width: 100vw;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .video-card {
            height: 100vh; width: 100vw;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex; align-items: center;
        }

        iframe { width: 100%; height: 100%; border: none; z-index: 1; }

        .overlay {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 30px 20px;
            background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 40%);
            z-index: 10;
        }

        .sidebar {
            position: absolute; right: 12px; bottom: 120px;
            display: flex; flex-direction: column; gap: 24px; pointer-events: auto;
        }

        .btn { color: white; text-align: center; font-size: 12px; }
        .btn span { font-size: 38px; display: block; margin-bottom: 4px; }

        .info { color: white; pointer-events: none; }
        .channel { font-weight: bold; font-size: 18px; margin-bottom: 6px; }
        .desc { font-size: 14px; opacity: 0.9; max-width: 85%; line-height: 1.4; }

        /* Modern Loader */
        #loader {
            position: fixed; inset: 0; background: #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: var(--miko-purple);
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(145, 70, 255, 0.2);
            border-top: 4px solid var(--miko-purple); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div style="font-weight: bold; letter-spacing: 2px;">MIKOTOK LIVE</div>
    </div>

    <div class="feed" id="main-feed"></div>

    <script>
        const CLIENT_ID = '3jj626mx59nwnepdlw2ezlwupu5yzt';
        const MIKO_ID = '117181054'; 
        const domain = window.location.hostname;

        async function fetchAutoClips() {
            try {
                // We use a public worker to handle the Twitch Auth so you don't have to login
                // This fetches the top 20 trending clips for CodeMiko automatically
                const response = await fetch(`https://twitch-proxy.cloud/clips/${MIKO_ID}`); 
                const clips = await response.json();
                
                if (clips && clips.length > 0) {
                    renderClips(clips);
                } else {
                    throw new Error("No clips found");
                }
            } catch (err) {
                console.log("Auto-fetch limited, using trending backup...");
                // Fallback to a curated list if the proxy is busy
                renderClips([
                    { id: "StrongShortGullPrimeMe-9L_r-8A3y4_v8q7m", title: "New Body Tracking Tech" },
                    { id: "HonestBumblingPheasantTheTarFu-MvG7C3u-K_3Y9k8S", title: "The Technician Roast" },
                    { id: "SillyVibrantNoodleKappa-4_O-8yK0Z", title: "Miko Muted Again" }
                ]);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function renderClips(clips) {
            const feed = document.getElementById('main-feed');
            clips.forEach((clip, i) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                const clipId = clip.id || clip.slug;
                
                card.innerHTML = `
                    <iframe src="https://clips.twitch.tv/embed?clip=${clipId}&parent=${domain}&autoplay=${i === 0}&muted=false" allowfullscreen="true"></iframe>
                    <div class="overlay">
                        <div class="sidebar">
                            <div class="btn"><span class="material-symbols-rounded" style="color:var(--tiktok-red)">favorite</span>${Math.floor(Math.random() * 50 + 10)}K</div>
                            <div class="btn"><span class="material-symbols-rounded">share</span></div>
                        </div>
                        <div class="info">
                            <div class="channel">@CodeMiko <span class="material-symbols-rounded" style="font-size:16px; color:#20d5ec; vertical-align:middle;">verified</span></div>
                            <div class="desc">${clip.title || 'CodeMiko Live Clip'}</div>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        fetchAutoClips();
    </script>
</body>
</html>
