<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mikotok</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
        :root { --miko-purple: #9146FF; --tiktok-red: #ff0050; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: white; overflow: hidden; font-family: 'Roboto', sans-serif; }

        #feed { height: 100vh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .video-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; }
        .iframe-wrapper { width: 100%; height: 100%; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }

        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .login-btn { background: var(--miko-purple); color: white; padding: 16px 32px; border-radius: 100px; font-weight: bold; text-decoration: none; margin-top: 20px; }

        .overlay { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: flex-end; padding: 30px 20px; background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 40%); z-index: 5; }
        .sidebar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 24px; pointer-events: auto; }
        .btn { color: white; text-align: center; }
        .btn span { font-size: 38px; display: block; }

        /* Toast Notification for UI Feedback */
        #toast { 
            position: fixed; top: 50px; left: 50%; transform: translateX(-50%); 
            background: rgba(255,255,255,0.95); color: black; padding: 10px 20px; 
            border-radius: 20px; font-weight: bold; font-size: 14px; 
            z-index: 9999; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="auth-screen" style="display: none;">
        <h1 style="color:var(--miko-purple);">Mikotok</h1>
        <a id="login-url" href="#" class="login-btn">Login with Twitch</a>
    </div>

    <div id="toast"></div>
    <div id="feed"></div>

    <script>
        const CLIENT_ID = '3jj626mx59nwnepdlw2ezlwupu5yzt';
        const MIKO_ID = '117181054'; 
        const domain = window.location.hostname;
        let redirectUri = window.location.origin + window.location.pathname;

        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        const error = params.get('error');

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        if (error) {
            document.getElementById('auth-screen').style.display = 'none';
            alert("Login Failed. Check Twitch settings.");
        } 
        else if (!token) {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('login-url').href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=`;
        } 
        else {
            window.history.replaceState({}, document.title, window.location.pathname);
            loadLiveClips(token);
        }

        async function loadLiveClips(accessToken) {
            try {
                const response = await fetch(`https://api.twitch.tv/helix/clips?broadcaster_id=${MIKO_ID}&first=20`, {
                    headers: { 
                        'Client-ID': CLIENT_ID, 
                        'Authorization': `Bearer ${accessToken}`,
                        'Accept-Language': 'en-US' // Prevents the mobile empty array bug
                    }
                });
                
                const result = await response.json();

                if (result.data && result.data.length > 0) {
                    renderFeed(result.data);
                } else {
                    // Fallback logic kicks in here
                    showToast("Twitch API empty. Loading offline library...");
                    loadFallback();
                }

            } catch (err) {
                showToast("Network error. Loading offline library...");
                loadFallback();
            }
        }

        function loadFallback() {
            const fallbackClips = [
                { id: "StrongShortGullPrimeMe-9L_r-8A3y4_v8q7m", title: "Unreal Engine 5 Body Tracking", view_count: 102000 },
                { id: "HonestBumblingPheasantTheTarFu-MvG7C3u-K_3Y9k8S", title: "Miko vs The Technician", view_count: 45000 },
                { id: "SillyVibrantNoodleKappa-4_O-8yK0Z", title: "Miko forgets she is muted", view_count: 88000 },
                { id: "EphemeralTenuousTroutAsianGlow-p9R3qf9N-oVp6m5B", title: "Miko avatar tech", view_count: 76000 }
            ];
            renderFeed(fallbackClips);
        }

        function renderFeed(clips) {
            const feedContainer = document.getElementById('feed');
            
            clips.forEach((clip, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                
                const playerUrl = `https://clips.twitch.tv/embed?clip=${clip.id}&parent=${domain}&autoplay=true&muted=true`;

                card.innerHTML = `
                    <div class="iframe-wrapper">
                        <iframe src="${playerUrl}" allowfullscreen="true" scrolling="no"></iframe>
                    </div>
                    <div class="overlay">
                        <div class="sidebar">
                            <div class="btn"><span class="material-symbols-rounded" style="color:var(--tiktok-red)">favorite</span>${Math.round(clip.view_count/1000)}K</div>
                            <div class="btn"><span class="material-symbols-rounded">share</span></div>
                        </div>
                        <div style="font-weight:bold; font-size:18px;">@CodeMiko</div>
                        <div style="font-size:14px; opacity:0.8;">${clip.title}</div>
                    </div>
                `;
                feedContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
