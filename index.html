<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mikotok</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@500&family=Roboto:wght@400;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    
    <style>
        :root { --miko-purple: #9146FF; --tiktok-red: #ff0050; }
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; overflow: hidden; font-family: 'Roboto', sans-serif;
        }

        /* Snap Feed */
        .video-feed {
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }

        .video-card {
            height: 100vh; width: 100vw;
            scroll-snap-align: start; position: relative;
            background: #000; display: flex; align-items: center;
        }

        iframe { width: 100%; height: 100%; border: none; z-index: 1; }

        /* M3 Login Screen */
        .auth-screen {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center; color: white;
        }

        .m3-button {
            background: var(--miko-purple); color: white;
            padding: 16px 32px; border-radius: 100px;
            font-family: 'Google Sans'; font-weight: 500;
            text-decoration: none; font-size: 18px;
            margin-top: 30px; box-shadow: 0 4px 15px rgba(145, 70, 255, 0.4);
        }

        /* UI Overlays */
        .overlay {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 30px 20px; background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 40%);
            z-index: 10;
        }

        .sidebar {
            position: absolute; right: 15px; bottom: 140px;
            display: flex; flex-direction: column; gap: 24px; pointer-events: auto;
        }

        .action-btn { color: white; text-align: center; font-size: 12px; }
        .action-btn span { font-size: 38px; display: block; margin-bottom: 4px; }

        .info { color: white; pointer-events: none; }
        .channel { font-weight: bold; font-size: 18px; margin-bottom: 6px; }
        .desc { font-size: 15px; opacity: 0.9; max-width: 85%; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="auth-layer" class="auth-screen" style="display: none;">
        <div style="font-size: 40px; font-family: 'Google Sans'; color: var(--miko-purple);">Mikotok</div>
        <p style="opacity: 0.6; margin-top: 10px;">Connect to Twitch to load live clips</p>
        <a id="login-link" href="#" class="m3-button">Login with Twitch</a>
    </div>

    <div class="video-feed" id="main-feed"></div>

    <script>
        const CLIENT_ID = '3jj626mx59nwnepdlw2ezlwupu5yzt';
        const BROADCASTER_ID = '117181054'; // CodeMiko
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        // 1. Logic to handle Auth
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');

        if (!accessToken) {
            document.getElementById('auth-layer').style.display = 'flex';
            document.getElementById('login-link').href = `https://id.twitch.tv/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=`;
        } else {
            // Success! Remove the hash from URL and fetch
            window.history.replaceState({}, document.title, window.location.pathname);
            fetchLiveClips(accessToken);
        }

        async function fetchLiveClips(token) {
            try {
                const response = await fetch(`https://api.twitch.tv/helix/clips?broadcaster_id=${BROADCASTER_ID}&first=20`, {
                    headers: {
                        'Client-ID': CLIENT_ID,
                        'Authorization': `Bearer ${token}`
                    }
                });
                const result = await response.json();
                renderClips(result.data);
            } catch (err) {
                console.error("Twitch API Error:", err);
            }
        }

        function renderClips(clips) {
            const feed = document.getElementById('main-feed');
            const domain = window.location.hostname;

            clips.forEach((clip, i) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                
                // Construct the secure embed URL
                const embedUrl = `https://clips.twitch.tv/embed?clip=${clip.id}&parent=${domain}&autoplay=${i === 0}&muted=false`;

                card.innerHTML = `
                    <iframe src="${embedUrl}" allowfullscreen="true"></iframe>
                    <div class="overlay">
                        <div class="sidebar">
                            <div class="action-btn"><span class="material-symbols-rounded" style="color:var(--tiktok-red)">favorite</span>${(clip.view_count / 1000).toFixed(1)}K</div>
                            <div class="action-btn"><span class="material-symbols-rounded">chat</span>${Math.floor(Math.random() * 500)}</div>
                            <div class="action-btn"><span class="material-symbols-rounded">share</span></div>
                        </div>
                        <div class="info">
                            <div class="channel">@CodeMiko</div>
                            <div class="desc">${clip.title}</div>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }
    </script>
</body>
</html>
