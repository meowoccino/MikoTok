<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MikoTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        :root { --bg-color: #000000; --card-bg: #111113; --primary: #9146FF; --text-main: #ffffff; --text-muted: #71717a; --border-color: #27272a; --danger: #ef4444; --offline: #3f3f46; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg-color); color: var(--text-main); overflow: hidden; display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 480px; height: 100%; position: relative; overflow: hidden; }
        [v-cloak] { display: none; }
        .app-header { position: absolute; top: 0; left: 0; width: 100%; z-index: 100; padding: 50px 20px 15px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); }
        .gradient-text { background: linear-gradient(135deg, #fff 30%, var(--primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Outfit', sans-serif; }
        #feed { height: 100%; width: 100%; overflow-y: auto; padding: 110px 12px 100px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border-color); position: relative; }
        .avatar-ring { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; border: 2px solid var(--primary); overflow: hidden; flex-shrink: 0; position: relative; background: #000; }
        .avatar-ring img { width: 100%; height: 100%; object-fit: cover; }
        .source-badge { position: absolute; bottom: -2px; right: -2px; width: 16px; height: 16px; border-radius: 50%; background: #5865F2; display: flex; align-items: center; justify-content: center; border: 2px solid var(--card-bg); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; flex-direction: column; justify-content: flex-end; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-content { background: #111113; border-radius: 20px 20px 0 0; padding: 20px; transform: translateY(100%); transition: 0.3s; border-top: 1px solid var(--border-color); text-align: center; }
        .modal-overlay.open .modal-content { transform: translateY(0); }
        .input-box { width: 100%; background: #000; border: 1px solid var(--border-color); color: white; padding: 14px; border-radius: 8px; margin-bottom: 12px; text-align: left; }
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background: #000; border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 10px 0 30px; }
        .nav-item { color: var(--text-muted); font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: #fff; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; transition: all 0.3s ease; }
        .status-dot.offline { background: var(--offline); box-shadow: none; }
        .status-dot.live { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
    </style>
</head>
<body>
    <div id="app-container" v-cloak>
        <!-- HEADER WITH CORRECT OFFLINE STATUS -->
        <div class="app-header">
            <div style="font-size: 24px; font-weight: 800;"><span class="gradient-text">MikoTok</span></div>
            <div style="display:flex; align-items:center; gap:8px; font-size:10px; font-weight: 800; color:var(--text-muted);">
                <div class="status-dot" :class="isLive ? 'live' : 'offline'"></div> 
                {{ isLive ? 'LIVE' : 'OFFLINE' }}
            </div>
        </div>

        <div id="feed">
            <div class="card" v-for="post in posts" :key="post.id">
                <div style="display:flex; align-items:center; margin-bottom:10px;">
                    <div class="avatar-ring">
                        <!-- Using verbatim file reference -->
                        <img v-if="post.author === 'CodeMiko' || post.author === 'tomato_24'" src="1000018850.png">
                        <span v-else style="color:white; display:flex; justify-content:center; align-items:center; height:100%;">{{ post.author[0] }}</span>
                        <div v-if="post.source === 'discord'" class="source-badge">
                            <svg viewBox="0 0 127 96" style="width:10px; fill:white;"><path d="M107.7,8.07A105,105,0,0,0,81.47,0a72,72,0,0,0-3.36,6.83,97,97,0,0,0-49,0,72,72,0,0,0-3.36-6.83A105,105,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.1a105,105,0,0,0,32.19,16.18,77,77,0,0,0,6.89-11.11,64,64,0,0,1-10.85-5.18,75,75,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a64,64,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105,105,0,0,0,32.19-16.14c2.72-27-4.55-50.87-19.4-72.03ZM42.45,65.69C36.18,65.69,31,60,31,53s5.12-12.67,11.45-12.67S54,46,54,53,48.83,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5.12-12.67,11.44-12.67S96.2,46,96.2,53,91.06,65.69,84.69,65.69Z"/></svg>
                        </div>
                    </div>
                    <div>
                        <div style="font-weight:700; font-size:14px;">{{ post.author }}</div>
                        <div style="font-size:10px; color:var(--text-muted);">{{ new Date(post.created_at).toLocaleDateString() }}</div>
                    </div>
                </div>
                <div style="font-size:14px; line-height:1.5;">{{ post.text }}</div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active"><span class="material-symbols-rounded">home</span>Home</div>
            <a href="https://discord.gg/codemiko" target="_blank" class="nav-item">
                <svg viewBox="0 0 127 96" style="width:20px; fill:currentColor; opacity:0.8;"><path d="M107.7,8.07A105,105,0,0,0,81.47,0a72,72,0,0,0-3.36,6.83,97,97,0,0,0-49,0,72,72,0,0,0-3.36-6.83A105,105,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.1a105,105,0,0,0,32.19,16.18,77,77,0,0,0,6.89-11.11,64,64,0,0,1-10.85-5.18,75,75,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a64,64,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105,105,0,0,0,32.19-16.14c2.72-27-4.55-50.87-19.4-72.03ZM42.45,65.69C36.18,65.69,31,60,31,53s5.12-12.67,11.45-12.67S54,46,54,53,48.83,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5.12-12.67,11.44-12.67S96.2,46,96.2,53,91.06,65.69,84.69,65.69Z"/></svg>
                Discord
            </a>
            <div class="nav-item" @click="modals.profile = true"><span class="material-symbols-rounded">account_circle</span>Profile</div>
        </div>

        <!-- PROFILE PANEL -->
        <div class="modal-overlay" :class="{ open: modals.profile }" @click.self="modals.profile = false">
            <div class="modal-content">
                <div style="width:40px; height:4px; background:#333; border-radius:10px; margin:0 auto 20px;"></div>
                <div v-if="!currentUser">
                    <h2 style="margin-bottom:20px;">Welcome</h2>
                    <input type="text" v-model="loginNick" class="input-box" placeholder="Username">
                    <button class="input-box" style="background:var(--primary); font-weight:700; border:none; text-align:center;" @click="login">Login</button>
                </div>
                <div v-else>
                    <div class="avatar-ring" style="width:64px; height:64px; margin:0 auto 15px;"><img src="1000018850.png"></div>
                    <h2 style="margin-bottom:20px;">{{ currentUser }}</h2>
                    <button class="input-box" style="background:var(--danger); border:none; font-weight:700; text-align:center;" @click="logout">Logout</button>
                </div>
                <button style="background:none; border:none; color:var(--text-muted); margin-top:10px;" @click="modals.profile = false">Close</button>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const sb = supabase.createClient('https://yhxcuayiwqpjvalyrcqv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloeGN1YXlpd3FwanZhbHlyY3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Nzk1ODEsImV4cCI6MjA5NDE1NTU4MX0.z7EDgqRz1OT25UdxtmeJxFvwx4UCwaPRwWWJuzd46kc');
        
        createApp({
            setup() {
                const posts = ref([]), isLive = ref(false), currentUser = ref(localStorage.getItem('miko_user')), loginNick = ref(''), modals = ref({ profile: false });
                const load = async () => { const { data } = await sb.from('posts').select('*').order('created_at', { ascending: false }); posts.value = data || []; };
                const login = () => { if(loginNick.value) { localStorage.setItem('miko_user', loginNick.value); location.reload(); } };
                const logout = () => { localStorage.removeItem('miko_user'); location.reload(); };
                onMounted(load);
                return { posts, isLive, currentUser, loginNick, modals, login, logout };
            }
        }).mount('#app-container');
    </script>
</body>
</html>
