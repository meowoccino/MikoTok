<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MikoTok">
    <meta name="theme-color" content="#9146FF">
    <title>MikoTok</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
    <style>
        :root { --bg-color: #0b0b0e; --card-bg: #18181b; --primary: #9146FF; --primary-light: #a970ff; --text-main: #ffffff; --text-muted: #adadb8; --border-color: #2f2f35; --danger: #ff4d4d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: var(--text-main); overflow: hidden; display: flex; justify-content: center; }
        #app-container { width: 100%; max-width: 480px; height: 100%; position: relative; background: var(--bg-color); overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .simple-logo { display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; user-select: none; }
        .text-part1 { color: #ffffff; }
        .text-part2 { color: var(--primary); text-shadow: 0 0 12px rgba(145, 70, 255, 0.4); }
        #splash-screen { position: absolute; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; transition: opacity 0.5s ease; }
        #splash-icon { width: 100px; height: 100px; margin-bottom: 15px; }
        .app-header { position: absolute; top: 0; left: 0; width: 100%; background: var(--bg-color); z-index: 100; padding: 40px 20px 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border-color); }
        #feed { height: 100%; width: 100%; overflow-y: auto; padding: 95px 15px 90px; scroll-behavior: smooth; }
        #feed::-webkit-scrollbar { display: none; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .card-header { display: flex; align-items: center; margin-bottom: 12px; position: relative; }
        .card-avatar { width: 38px; height: 38px; border-radius: 50%; margin-right: 12px; border: 2px solid var(--primary); background: #000; object-fit: cover; }
        .meta-name { font-size: 14px; font-weight: 600; color: white; }
        .post-date { font-size: 11px; color: var(--text-muted); margin-left: auto; margin-right: 30px; }
        .admin-del { position: absolute; right: 0; top: 50%; transform: translateY(-50%); color: var(--danger); cursor: pointer; font-size: 20px; }
        .video-container { position: relative; width: 100%; border-radius: 8px; overflow: hidden; background: #000; aspect-ratio: 16/9; border: 1px solid var(--border-color); }
        iframe { width: 100%; height: 100%; border: none; }
        .clip-title { font-size: 15px; font-weight: 600; margin: 12px 0 4px; }
        .post-text-content { font-size: 14px; line-height: 1.5; color: #eaeaea; word-wrap: break-word; }
        .bottom-nav { position: absolute; bottom: 0; left: 0; width: 100%; background: var(--bg-color); border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 10px 15px 25px; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 60px; color: var(--text-muted); font-size: 10px; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-fab { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .fab-icon-svg { width: 100%; height: 100%; filter: drop-shadow(0 4px 10px rgba(145, 70, 255, 0.5)); }
        #login-modal, #add-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; display: none; flex-direction: column; justify-content: flex-end; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); border-radius: 20px 20px 0 0; padding: 25px 20px 40px; transform: translateY(100%); transition: transform 0.3s; border-top: 1px solid var(--border-color); }
        .input-box { width: 100%; background: #0e0e10; border: 1px solid var(--border-color); color: white; padding: 12px; border-radius: 6px; outline: none; margin-bottom: 12px; }
        #char-counter { color: var(--text-muted); font-size: 12px; text-align: right; margin-bottom: 12px; font-weight: 500; }
        #char-counter.limit-hit { color: var(--danger); font-weight: 800; }
        #toast { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 20px; border-radius: 6px; z-index: 9999; display: none; font-weight: 600; text-align: center; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="splash-screen"><div id="splash-icon"></div><div class="simple-logo"><span class="text-part1">Miko</span><span class="text-part2">Tok</span></div></div>
        <div class="app-header"><div class="simple-logo"><span class="text-part1">Miko</span><span class="text-part2">Tok</span></div></div>
        <div id="toast"></div>
        <div id="feed"><div id="feed-content"></div></div>
        
        <div id="login-modal"><div class="modal-content" id="login-panel">
            <input type="text" id="login-nick" class="input-box" placeholder="Nickname" maxlength="10">
            <input type="password" id="login-pass" class="input-box" placeholder="Password" minlength="8">
            <button class="input-box" style="background:var(--primary); color:white; font-weight:600;" onclick="handleLogin()">Sign In</button>
            <button class="input-box" style="background:transparent; color:var(--text-muted); border:none;" onclick="closeModal('login')">Cancel</button>
        </div></div>

        <div id="add-modal"><div class="modal-content" id="add-panel">
            <input type="text" id="clip-title" class="input-box" placeholder="Clip Title">
            <input type="url" id="clip-url" class="input-box" placeholder="Twitch URL">
            <button class="input-box" style="background:var(--primary); color:white; font-weight:600;" onclick="submitClip()">Upload</button>
            <button class="input-box" style="background:transparent; color:var(--text-muted); border:none;" onclick="closeModal('add')">Cancel</button>
        </div></div>

        <div class="bottom-nav">
            <div class="nav-item active" id="nav-home" onclick="switchTab('home')"><span class="material-symbols-rounded">home</span>Home</div>
            <div class="nav-item" id="nav-community" onclick="switchTab('community')"><span class="material-symbols-rounded">forum</span>Community</div>
            <div class="nav-fab" onclick="openModal('add')" id="upload-btn-container"></div>
            <div class="nav-item" id="nav-clips" onclick="switchTab('clips')"><span class="material-symbols-rounded">favorite</span>Favorites</div>
            <div class="nav-item" id="nav-login" onclick="openModal('login')"><span class="material-symbols-rounded">account_circle</span><span id="login-text">Login</span></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yhxcuayiwqpjvalyrcqv.supabase.co', SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloeGN1YXlpd3FwanZhbHlyY3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Nzk1ODEsImV4cCI6MjA5NDE1NTU4MX0.z7EDgqRz1OT25UdxtmeJxFvwx4UCwaPRwWWJuzd46kc';
        let sbClient = null, currentTab = 'home', currentUser = null, isAdmin = false, globalData = { clips: [], posts: [] };

        const getLogoSvg = (id) => `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="fab-icon-svg"><defs><linearGradient id="grad-${id}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#9146FF"/></linearGradient></defs><circle cx="50" cy="50" r="40" fill="none" stroke="url(#grad-${id})" stroke-width="7"/><path d="M 33 38 L 48 62 L 62 38 L 62 55 Q 62 65 69 64" fill="none" stroke="url(#grad-${id})" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        document.getElementById('upload-btn-container').innerHTML = getLogoSvg('nav');
        document.getElementById('splash-icon').innerHTML = getLogoSvg('splash');

        async function init() {
            if (window.supabase) { sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); loadData(); }
            else { setTimeout(init, 100); }
        }

        async function loadData() {
            const { data: clips } = await sbClient.from('clips').select('*').order('created_at', { ascending: false });
            const { data: posts } = await sbClient.from('posts').select('*').order('created_at', { ascending: false });
            globalData.clips = clips || []; globalData.posts = posts || [];
            render();
            setTimeout(() => { document.getElementById('splash-screen').style.opacity = '0'; setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 500); }, 800);
        }

        function updateCharCount(val) {
            const el = document.getElementById('char-counter');
            el.innerText = `${val.length} / 360`;
            if (val.length >= 360) el.classList.add('limit-hit');
            else el.classList.remove('limit-hit');
        }

        function handleLogin() {
            const n = document.getElementById('login-nick').value.trim(), p = document.getElementById('login-pass').value.trim();
            if (n === 'tomato_24' && p === '9ruwuF') { isAdmin = true; currentUser = 'tomato_24'; showToast("Admin Verified."); }
            else if (n && p.length >= 8) { isAdmin = false; currentUser = n; showToast("Logged in."); }
            else { showToast("Invalid Entry"); return; }
            document.getElementById('login-text').innerText = currentUser;
            closeModal('login'); render();
        }

        async function submitPost() {
            const t = document.getElementById('p-text').value.trim();
            if (!t || t.length > 360) return;
            const { error } = await sbClient.from('posts').insert([{ author: currentUser || 'Guest', text: t }]);
            if (!error) { document.getElementById('p-text').value = ''; loadData(); }
        }

        async function submitClip() {
            const u = document.getElementById('clip-url').value.trim(), t = document.getElementById('clip-title').value.trim();
            if (!u.includes('twitch.tv')) return;
            const id = u.split('/').pop().split('?')[0];
            const { error } = await sbClient.from('clips').insert([{ id, title: t || 'Clip', added_by: currentUser || 'Guest' }]);
            if (!error) { closeModal('add'); loadData(); }
        }

        async function deleteItem(table, id) {
            if (!isAdmin) return;
            await sbClient.from(table).delete().eq('id', id); loadData();
        }

        function render() {
            const f = document.getElementById('feed-content'); f.innerHTML = '';
            if (currentTab === 'community') {
                f.innerHTML = `<div class="card"><textarea id="p-text" class="input-box" style="height:60px; resize:none;" placeholder="Discuss..." maxlength="360" oninput="updateCharCount(this.value)"></textarea><div id="char-counter">0 / 360</div><button class="input-box" style="background:var(--primary); color:white; font-weight:600;" onclick="submitPost()">Post</button></div>`;
                globalData.posts.forEach(p => {
                    f.innerHTML += `<div class="card"><div class="card-header">
                        <img class="card-avatar" src="https://ui-avatars.com/api/?name=${p.author}&background=0b0b0e&color=fff&bold=true">
                        <div class="meta-name">${p.author}</div><div class="post-date">${new Date(p.created_at).toLocaleDateString()}</div>
                        ${isAdmin ? `<span class="material-symbols-rounded admin-del" onclick="deleteItem('posts', '${p.id}')">delete</span>` : ''}
                    </div><div class="post-text-content">${p.text}</div></div>`;
                });
            } else {
                globalData.clips.forEach(c => {
                    f.innerHTML += `<div class="card"><div class="card-header">
                        <img class="card-avatar" src="https://ui-avatars.com/api/?name=${c.added_by}&background=0b0b0e&color=fff&bold=true">
                        <div class="meta-name">${c.added_by}</div>
                        ${isAdmin ? `<span class="material-symbols-rounded admin-del" onclick="deleteItem('clips', '${c.id}')">delete</span>` : ''}
                    </div><div class="video-container"><iframe src="https://clips.twitch.tv/embed?clip=${c.id}&parent=${window.location.hostname}&autoplay=false" allow="autoplay; fullscreen"></iframe></div><div class="clip-title">${c.title}</div></div>`;
                });
            }
        }

        function switchTab(t) { currentTab = t; document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); document.getElementById('nav-' + t).classList.add('active'); render(); }
        function openModal(id) { document.getElementById(id + '-modal').style.display = 'flex'; setTimeout(() => document.getElementById(id + '-panel').style.transform = 'translateY(0)', 10); }
        function closeModal(id) { document.getElementById(id + '-panel').style.transform = 'translateY(100%)'; setTimeout(() => document.getElementById(id + '-modal').style.display = 'none', 300); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2500); }
        init();
    </script>
</body>
</html>
